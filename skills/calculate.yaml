name: calculate
description: "Evaluate a mathematical expression."
parameters:
  type: object
  properties:
    expr:
      type: string
  required: ["expr"]
mcp_server: "python3 -c \"from fastmcp import FastMCP; m=FastMCP('calc'); @m.tool(); def calculate(expr): return str(eval(expr)); m.run(host='0.0.0.0', port=50054)\""
port: 50054
