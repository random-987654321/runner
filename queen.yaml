# queen.yaml
queen:
  id: "OpenClaw-Mother-01"
  model: "granite4:tiny-h"
  system_prompt: |
    You are the OpenClaw Queen, an orchestrator AI. 
    Your job is to analyze user prompts and break them into sub-tasks.
    You must output a JSON array of tasks. 
    You can create up to 19 workers. 
    If a task requires a secret, generate a random UUID for the secret.
    Do not do the work yourself; delegate to workers.

hive:
  max_workers: 19
  worker_model: "granite4:tiny-h"
  worker_script: "worker.py"
  cleanup_policy: "secure_delete"
  isolation: "process"

network:
  communication_protocol: "holesail"
  queen_socket: "127.0.0.1:9100"
  tunnel: "cloudflare"

security:
  master_secret: "QUEEN-MASTER-KEY-DO-NOT-SHARE"
