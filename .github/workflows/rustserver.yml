name: Self‑Replicating Server (24/7)

on:
  workflow_dispatch:   # manual start only – no schedule

permissions:
  actions: write       # needed to trigger a new run via the GitHub API
  contents: read       # (default) to read the runner repo

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5   # maximum allowed – 6 hours

    steps:
      # --------------------------------------------------------------
      # 1. Check out the RUNNER repo (this repo) – needed so we can use
      #    the workflow file and keep the root as a git repo (though
      #    we won't write to it).
      - name: Checkout runner repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------------
      # 2. Check out the BACKEND repo into a subfolder called ./backend
      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/backend
          token: ${{ secrets.TOKEN }}          # PAT with repo scope
          path: backend

      # --------------------------------------------------------------
      # 3. Caches (paths now point inside ./backend)
      - name: Cache Rust binary
        uses: actions/cache@v4
        id: binary-cache
        with:
          path: backend/target/release/unified-api
          key: rust-binary-${{ runner.os }}-${{ hashFiles('backend/Cargo.toml', 'backend/src/**') }}
          restore-keys: rust-binary-${{ runner.os }}-

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ hashFiles('.github/workflows/self-replicating.yml') }}
          restore-keys: ollama-models-

      - name: Cache cloudflared
        uses: actions/cache@v4
        id: cloudflared-cache
        with:
          path: ./cloudflared          # stored in the root of the runner repo
          key: cloudflared-${{ runner.os }}-v1

      # --------------------------------------------------------------
      # 4. Setup Rust & build (inside ./backend)
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Build server (if cache miss)
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cd backend
          cargo build --release
          cp target/release/unified-api ./

      # --------------------------------------------------------------
      # 5. Setup Ollama and pull models (cached)
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - name: Pull models
        run: |
          ollama pull gemma3:1b
          ollama pull qwen3-embedding:0.6b

      # --------------------------------------------------------------
      # 6. Main service: start server, tunnel, update config, and self‑replicate
      - name: Run & replicate
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}          # used for config update and cloning
        run: |
          set -e

          cd backend   # everything runs inside the backend folder

          # --- Start the server ---
          chmod +x ./unified-api
          pkill -f unified-api 2>/dev/null || true
          ./unified-api &

          # Wait for health
          for i in {1..10}; do
            if curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          curl -s http://localhost:8000/health | grep -q '"status":"ok"' || { echo "Server failed"; exit 1; }

          # --- Start Cloudflare tunnel ---
          # cloudflared binary is in the parent directory (./)
          if [ ! -f ../cloudflared ]; then
            curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ../cloudflared
            chmod +x ../cloudflared
          fi
          pkill -f cloudflared 2>/dev/null || true
          ../cloudflared tunnel --protocol http2 --url http://localhost:8000 2>&1 | tee tunnel.log &

          # Extract the tunnel URL from the log
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 1
          done
          echo "::notice::Tunnel URL: ${TUNNEL_URL}"

          # --- Update config.js in the chat repo ---
          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG="const API_URL = \"${TUNNEL_URL}\";"
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)

          FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.js")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')

          if [ "$SHA" != "null" ]; then
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"update API URL\",\"content\":\"${ENCODED}\",\"sha\":\"${SHA}\"}"
          else
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"add API URL\",\"content\":\"${ENCODED}\"}"
          fi
          echo "::notice::Frontend URL: https://${{ github.repository_owner }}.github.io/chat/"

          # --- Self‑replication loop ---
          START_TIME=$(date +%s)
          TRIGGER_AT=$(( 2 * 60 ))   # 5 minutes before the 6‑hour timeout (350 min)
          TRIGGERED=false

          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))

            # Trigger a new run at the designated time (only once)
            if [ $ELAPSED -ge $TRIGGER_AT ] && [ "$TRIGGERED" = "false" ]; then
              echo "Triggering replacement workflow..."
              # Use GITHUB_TOKEN (has actions:write) to dispatch a new run
              curl -X POST \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow_id }}/dispatches" \
                -d '{"ref":"${{ github.ref }}"}'
              TRIGGERED=true
            fi

            # Health checks – restart server or tunnel if they died
            if ! curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Server down – restarting..."
              pkill -f unified-api 2>/dev/null || true
              ./unified-api &
            fi
            if ! pgrep -f cloudflared > /dev/null; then
              echo "Tunnel down – restarting..."
              ../cloudflared tunnel --protocol http2 --url http://localhost:8000 2>&1 | tee -a tunnel.log &
            fi

            sleep 30   # check every 30 seconds
          done
