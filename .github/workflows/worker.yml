name: Worker

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Sub‑task ID'
        required: true
      task_description:
        description: 'Sub‑task description'
        required: true
      holesail_key:
        description: 'Holesail key to connect to Queen'
        required: true

permissions:
  contents: write

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl nodejs npm python3-pip
          sudo npm install -g holesail
          curl -fsSL https://ollama.com/install.sh | sh
          npm install -g openclaw
          echo "$(npm root -g)/bin" >> $GITHUB_PATH

      - name: Start Ollama and pull model
        run: |
          ollama serve &
          sleep 5
          ollama pull granite4:tiny-h

      - name: Configure OpenClaw (minimal)
        run: |
          mkdir -p ~/.openclaw
          echo '{"models":{"providers":{"ollama":{"baseUrl":"http://localhost:11434","models":[{"id":"granite4:tiny-h","api":"ollama"}]}}},"agents":{"defaults":{"model":{"primary":"ollama/granite4:tiny-h"}}}}' > ~/.openclaw/openclaw.json

      - name: Connect to Queen via Holesail
        env:
          KEY: ${{ github.event.inputs.holesail_key }}
        run: |
          # Run Holesail client in the background; tunnel maps to localhost:8000
          holesail "$KEY" --port 8000 &
          sleep 5
          # Verify connection
          curl -s http://localhost:8000/health || echo "⚠️ Queen not reachable"

      - name: Execute sub‑task and send result
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
          TASK_DESC: ${{ github.event.inputs.task_description }}
        run: |
          # Run the task using OpenClaw
          openclaw agent run --task "$TASK_DESC" --output /tmp/result.json
          RESULT=$(cat /tmp/result.json)
          # POST result to Queen via Holesail tunnel
          curl -X POST http://localhost:8000/result \
            -H "Content-Type: application/json" \
            -d "{\"task_id\": \"$TASK_ID\", \"result\": $RESULT}"
          echo "✅ Result sent to Queen."
