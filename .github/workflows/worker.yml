name: Standard MCP Worker

on:
  workflow_dispatch:
    inputs:
      skill_name:
        description: 'Skill name'
        required: true
        type: string

permissions:
  contents: write

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl nodejs npm python3 python3-pip
          # Install uv (provides uvx)
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"
          # Install cloudflared
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          # Ensure uvx is available in subsequent steps
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Read skill definition and start MCP server
        env:
          SKILL_NAME: ${{ github.event.inputs.skill_name }}
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Now uvx should be available
          SKILL_FILE="skills/${SKILL_NAME}.yaml"
          if [ ! -f "$SKILL_FILE" ]; then
            echo "❌ Skill file not found"
            exit 1
          fi

          # Extract fields
          MCP_SERVER=$(grep '^mcp_server:' "$SKILL_FILE" | sed -E 's/^mcp_server:[[:space:]]*//' | sed -E 's/^"//;s/"$//')
          SERVER_ARGS=$(grep '^server_args:' "$SKILL_FILE" | sed -E 's/^server_args:[[:space:]]*//' | sed -E 's/^"//;s/"$//')
          PORT=$(grep '^port:' "$SKILL_FILE" | sed -E 's/^port:[[:space:]]*//' | sed -E 's/^"//;s/"$//')
          PORT=${PORT:-50052}

          # Force host 0.0.0.0 so cloudflared can connect
          SERVER_ARGS="$SERVER_ARGS --host 0.0.0.0"

          echo "Starting MCP server: $MCP_SERVER $SERVER_ARGS --port $PORT"
          if [[ "$MCP_SERVER" == "npx" ]]; then
            eval "$MCP_SERVER $SERVER_ARGS --port $PORT" &
          else
            eval "$MCP_SERVER $SERVER_ARGS --port $PORT" &
          fi
          sleep 10

          # ---------- VERIFY SERVER IS LISTENING ----------
          echo "🔍 Checking if MCP server is listening on port $PORT..."
          if netstat -tulpn 2>/dev/null | grep -q ":$PORT "; then
            echo "✅ Server is listening on port $PORT"
          else
            echo "❌ Server is NOT listening on port $PORT"
            ps aux | grep -E "$MCP_SERVER|$PORT" || echo "No process found"
            exit 1
          fi

          # Test the endpoint (try /mcp first, fallback to /sse)
          MCP_PATH="mcp"
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/sse | grep -q "200\|405"; then
            MCP_PATH="sse"
            echo "✅ Server responds on /sse"
          elif curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/mcp | grep -q "200\|405"; then
            MCP_PATH="mcp"
            echo "✅ Server responds on /mcp"
          else
            echo "⚠️ Could not determine endpoint path. Defaulting to /mcp"
          fi

          # ---------- START CLOUDFLARE TUNNEL ----------
          echo "☁️ Starting Cloudflare tunnel for worker..."
          nohup ./cloudflared tunnel --url http://localhost:$PORT > tunnel.log 2>&1 &
          
          TUNNEL_URL=""
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Worker tunnel URL: $TUNNEL_URL"
              break
            fi
            echo "⏳ Waiting for tunnel... ($i/30)"
            sleep 3
          done
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            cat tunnel.log
            exit 1
          fi

          # ---------- REGISTER WITH QUEEN ----------
          WORKER_FILE="workers/${SKILL_NAME}.json"
          mkdir -p workers
          FULL_URL="${TUNNEL_URL}/${MCP_PATH}"
          echo "{\"skill\": \"${SKILL_NAME}\", \"url\": \"${FULL_URL}\"}" > ${WORKER_FILE}
          ENCODED=$(base64 -w0 ${WORKER_FILE})

          for attempt in {1..15}; do
            FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${WORKER_FILE}")
            SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
            if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
              PAYLOAD=$(jq -n --arg msg "register $SKILL_NAME" --arg content "$ENCODED" --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}')
            else
              PAYLOAD=$(jq -n --arg msg "register $SKILL_NAME" --arg content "$ENCODED" \
                '{message: $msg, content: $content}')
            fi
            RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${WORKER_FILE}" \
              -d "$PAYLOAD")
            if echo "$RESPONSE" | jq -e '.content' > /dev/null; then
              echo "✅ Worker registered with URL: $FULL_URL"
              break
            fi
            sleep 3
          done

          # Keep the worker alive
          while true; do
            if ! pgrep -f "$MCP_SERVER" > /dev/null; then
              echo "⚠️ MCP server died, restarting..."
              eval "$MCP_SERVER $SERVER_ARGS --port $PORT" &
            fi
            if ! pgrep -f "cloudflared" > /dev/null; then
              echo "⚠️ Cloudflare tunnel died, restarting..."
              nohup ./cloudflared tunnel --url http://localhost:$PORT > tunnel.log 2>&1 &
            fi
            sleep 30
          done
