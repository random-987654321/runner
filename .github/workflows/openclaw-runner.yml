name: OpenClaw Hive CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-hive:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Ollama
      run: curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama Service
      run: ollama serve &

    - name: Wait for Ollama to boot
      run: sleep 5

    - name: Pull granite4:tiny-h model
      run: ollama pull granite4:tiny-h

    - name: Create Mock worker.yaml for Testing
      run: |
        echo 'worker_id: "github-test-worker"' > test_worker.yaml
        echo 'model: "granite4:tiny-h"' >> test_worker.yaml
        echo 'task: "Write a hello world script."' >> test_worker.yaml
        echo 'api_secret: "GH-ACTION-SECRET"' >> test_worker.yaml
        echo 'holesail_port: 9101' >> test_worker.yaml
        echo 'master_secret: "TEST-MASTER"' >> test_worker.yaml

    - name: Run Worker Test
      run: python worker.py test_worker.yaml
