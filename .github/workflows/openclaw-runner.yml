name: OpenClaw + Ollama (granite4:tiny-h)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          sleep 5

      - name: Pull granite4:tiny-h
        run: ollama pull granite4:tiny-h

      - name: Install OpenClaw
        run: npm install -g openclaw@latest

      # ---- NEW: start the gateway BEFORE onboarding ----
      - name: Start OpenClaw gateway (background)
        run: |
          nohup openclaw gateway run \
            --bind loopback \
            --port 18789 \
            > gateway.log 2>&1 &

      - name: Wait for gateway to be reachable
        run: |
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 18789; then
              echo "Gateway is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway failed to start"; cat gateway.log; exit 1

      - name: Onboard (non-interactive, Ollama provider)
        run: |
          openclaw onboard --non-interactive --accept-risk \
            --mode local \
            --auth-choice ollama \
            --custom-model-id "granite4:tiny-h" \
            --gateway-bind loopback \
            --skip-bootstrap \
            --skip-skills

      - name: Verify
        run: |
          openclaw status
          openclaw gateway status
