# .github/workflows/skill-watcher.yml
name: Skill Watcher

on:
  push:
    paths:
      - 'skills/*.yaml'
  workflow_dispatch:   # manual trigger for testing

permissions:
  contents: read
  actions: write

jobs:
  detect_and_spawn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new skill files
        id: detect
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- skills/*.yaml 2>/dev/null || echo "")
          if [ -n "$NEW_FILES" ]; then
            echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          else
            echo "No new skill files."
          fi

      - name: Trigger workers for each new skill
        if: steps.detect.outputs.new_files != ''
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          for file in ${{ steps.detect.outputs.new_files }}; do
            SKILL_NAME=$(basename "$file" .yaml)
            echo "Spawning worker for skill: $SKILL_NAME"
            gh workflow run worker.yml -f skill_name="$SKILL_NAME"
          done
