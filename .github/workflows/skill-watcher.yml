name: Skill Watcher & Worker Dispatcher

on:
  push:
    paths:
      - 'skills/*.yaml'
  workflow_dispatch:   # manual trigger for testing

permissions:
  contents: read
  actions: write

jobs:
  detect_and_spawn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new skill files
        id: detect
        run: |
          # For push events, check diff; for workflow_dispatch, list all skills
          if [ "${{ github.event_name }}" == "push" ]; then
            NEW_FILES=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- skills/*.yaml 2>/dev/null || echo "")
          else
            # manual trigger: list all skills, but keep as a single line
            NEW_FILES=$(ls skills/*.yaml 2>/dev/null | tr '\n' ' ' || echo "")
          fi
          # Trim trailing spaces
          NEW_FILES=$(echo "$NEW_FILES" | xargs)
          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "✅ Detected files: $NEW_FILES"

      - name: Count active worker runs
        id: count_runs
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Count currently running worker workflows
          RUNNING=$(gh run list --workflow worker.yml --status in_progress --status queued --json status --jq length 2>/dev/null || echo 0)
          echo "running=$RUNNING" >> $GITHUB_OUTPUT
          echo "📊 Active workers: $RUNNING"

      - name: Trigger workers for each new skill (limit 19)
        if: steps.detect.outputs.new_files != ''
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          RUNNING=${{ steps.count_runs.outputs.running }}
          MAX_WORKERS=19
          # Split the space-separated list of files
          for file in ${{ steps.detect.outputs.new_files }}; do
            if [ $RUNNING -ge $MAX_WORKERS ]; then
              echo "⚠️ Already at $MAX_WORKERS workers. Skipping remaining."
              break
            fi
            SKILL_NAME=$(basename "$file" .yaml)
            echo "🔄 Spawning worker for skill: $SKILL_NAME"
            gh workflow run worker.yml -f skill_name="$SKILL_NAME"
            RUNNING=$((RUNNING + 1))
            # Small delay to avoid hitting rate limits
            sleep 2
          done
