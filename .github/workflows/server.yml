name: prima.cpp Ring Mesh (Holesail)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  WORKER_COUNT: 4
  MODEL_URL: "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Clean all state files
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Cleaning workers directory..."
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null)
          echo "$RESPONSE" | jq -r '.[] | select(.type == "file") | .name + ":" + .sha' 2>/dev/null | while IFS=':' read -r name sha; do
            if [ -n "$name" ] && [ -n "$sha" ]; then
              curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/workers/${name}" \
                -d "{\"message\":\"cleanup\",\"sha\":\"${sha}\"}" || true
            fi
          done

          for i in $(seq 1 $WORKER_COUNT); do
            FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/next_url_${i}.txt" 2>/dev/null)
            SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
            if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
              curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/next_url_${i}.txt" \
                -d "{\"message\":\"cleanup\",\"sha\":\"$SHA\"}" || true
            fi
          done

          FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/master_url.txt" 2>/dev/null)
          SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
          if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/master_url.txt" \
              -d "{\"message\":\"cleanup\",\"sha\":\"$SHA\"}" || true
          fi
          echo "✅ Cleanup done."

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq build-essential cmake git wget libzmq3-dev
          sudo npm install -g holesail

      - name: Install fio
        run: |
          sudo apt-get install -y fio || true
          if ! command -v fio &> /dev/null; then
            git clone https://github.com/axboe/fio.git
            cd fio
            ./configure --prefix=/usr
            make -j$(nproc)
            sudo make install
            cd ..
          fi

      - name: Install HiGHS
        run: |
          git clone https://github.com/ERGO-Code/HiGHS.git
          cd HiGHS
          mkdir build && cd build
          cmake ..
          make -j$(nproc)
          sudo make install
          cd ../..

      - name: Clone and build prima.cpp
        run: |
          git clone https://github.com/OpenCPIL/prima.cpp.git
          cd prima.cpp
          make USE_HIGHS=1 -j$(nproc)
          # Ensure llama-server is built
          if [ ! -f ./llama-server ]; then
            echo "⚠️ llama-server missing, building it explicitly"
            make llama-server
          fi
          if [ -f ./llama-server ]; then
            echo "✅ llama-server built successfully"
          else
            echo "❌ llama-server not found!"
            ls -la
            exit 1
          fi
          ./llama-cli --help | head -5

      - name: Download model and validate
        run: |
          mkdir -p models
          curl -L -o models/model.gguf "$MODEL_URL" -f --retry 3
          if [ "$(head -c 4 models/model.gguf)" = "GGUF" ]; then
            echo "✅ Valid GGUF file downloaded"
          else
            echo "❌ Invalid GGUF file – showing first 20 bytes:"
            head -c 20 models/model.gguf | xxd
            exit 1
          fi

      - name: Start Holesail tunnel for master port (6000)
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          holesail --live 6000 > /tmp/holesail_master.txt 2>&1 &
          sleep 5
          MASTER_URL=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_master.txt | head -1)
          echo "MASTER_HOLESAIL_URL=$MASTER_URL" >> $GITHUB_ENV
          echo "$MASTER_URL" > master_url.txt
          ENCODED=$(base64 -w0 master_url.txt)

          for attempt in {1..5}; do
            FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/master_url.txt")
            SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
            if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
              PAYLOAD=$(jq -n --arg msg "publish master url" --arg content "$ENCODED" --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}')
            else
              PAYLOAD=$(jq -n --arg msg "publish master url" --arg content "$ENCODED" \
                '{message: $msg, content: $content}')
            fi
            RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/master_url.txt" \
              -d "$PAYLOAD")
            if echo "$RESPONSE" | jq -e '.content' > /dev/null; then
              echo "✅ Published master URL"
              break
            fi
            if [ $attempt -lt 5 ]; then sleep 2; fi
          done

      - name: Wait for workers and build ring
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          WORKER_COUNT: ${{ env.WORKER_COUNT }}
          MASTER_URL: ${{ env.MASTER_HOLESAIL_URL }}
        run: |
          echo "👑 Queen waiting for $WORKER_COUNT workers..."
          for attempt in {1..60}; do
            ALL_FOUND=true
            for i in $(seq 1 $WORKER_COUNT); do
              RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/workers/worker_${i}.txt" 2>/dev/null)
              if echo "$RESPONSE" | jq -e '.message' > /dev/null 2>&1; then
                ALL_FOUND=false
                break
              fi
            done
            if [ "$ALL_FOUND" = true ]; then
              echo "✅ All workers registered!"
              break
            fi
            echo "  Attempt $attempt: waiting..."
            sleep 5
          done
          if [ "$ALL_FOUND" != true ]; then
            echo "❌ Timeout waiting for workers"
            exit 1
          fi

          for i in $(seq 1 $WORKER_COUNT); do
            NEXT_INDEX=$((i + 1))
            if [ $NEXT_INDEX -gt $WORKER_COUNT ]; then
              NEXT_URL="$MASTER_URL"
            else
              RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/workers/worker_${NEXT_INDEX}.txt" 2>/dev/null)
              NEXT_URL=$(echo "$RESPONSE" | jq -r '.content' 2>/dev/null | base64 -d 2>/dev/null | tr -d '\n\r')
              if [ -z "$NEXT_URL" ] || [ "$NEXT_URL" = "null" ]; then
                echo "❌ Failed to get next URL for worker $i"
                exit 1
              fi
            fi
            echo "$NEXT_URL" > next_url_${i}.txt
            ENCODED_NEXT=$(base64 -w0 next_url_${i}.txt)

            for attempt in {1..5}; do
              FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/next_url_${i}.txt")
              SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
              if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
                PAYLOAD=$(jq -n --arg msg "publish next url for worker $i" --arg content "$ENCODED_NEXT" --arg sha "$SHA" \
                  '{message: $msg, content: $content, sha: $sha}')
              else
                PAYLOAD=$(jq -n --arg msg "publish next url for worker $i" --arg content "$ENCODED_NEXT" \
                  '{message: $msg, content: $content}')
              fi
              RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/next_url_${i}.txt" \
                -d "$PAYLOAD")
              if echo "$RESPONSE" | jq -e '.content' > /dev/null; then
                echo "✅ Published next_url_${i}.txt"
                break
              fi
              if [ $attempt -lt 5 ]; then sleep 2; fi
            done
          done
          echo "✅ Published next URLs for all workers."

      - name: Connect to worker 1 via Holesail
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/workers/worker_1.txt" 2>/dev/null)
          WORKER1_URL=$(echo "$RESPONSE" | jq -r '.content' 2>/dev/null | base64 -d 2>/dev/null | tr -d '\n\r')
          if [ -z "$WORKER1_URL" ] || [ "$WORKER1_URL" = "null" ]; then
            echo "❌ Failed to get worker 1 URL"
            exit 1
          fi
          holesail --connect "$WORKER1_URL" --port 7001 &
          sleep 5

      - name: Start prima.cpp master (llama-server)
        run: |
          cd prima.cpp
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          if [ ! -f ./llama-server ]; then
            echo "❌ llama-server binary not found!"
            ls -la
            exit 1
          fi
          chmod +x ./llama-server
          WORLD=$((WORKER_COUNT + 1))
          nohup ./llama-server \
            -m ../models/model.gguf \
            -c 2048 \
            --world $WORLD \
            --rank 0 \
            --master 127.0.0.1:6000 \
            --next 127.0.0.1:7001 \
            --host 0.0.0.0 \
            --port 8080 \
            > master.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          sleep 3
          if ! ps -p $SERVER_PID > /dev/null; then
            echo "❌ llama-server died immediately. Log:"
            cat master.log
            exit 1
          fi
          echo "✅ llama-server process is running (PID $SERVER_PID)"

      - name: Wait for master to be truly ready (200 OK)
        run: |
          echo "🌐 Waiting for master API to be ready..."
          READY=false
          for i in {1..150}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health | grep -q 200; then
              echo "✅ Master API ready"
              READY=true
              break
            fi
            echo "⏳ Waiting... ($i/150)"
            sleep 2
            if [ $i -eq 10 ]; then
              echo "📄 master.log (last 20 lines):"
              tail -20 master.log || true
              echo "Processes:"
              ps aux | grep llama-server || true
            fi
          done
          if [ "$READY" != "true" ]; then
            echo "❌ Master failed to become ready within 5 minutes"
            echo "📄 Full master.log:"
            cat master.log
            exit 1
          fi

      - name: Expose API via Cloudflare Tunnel
        run: |
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > tunnel.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "✅ Public API: $TUNNEL_URL"
            echo "::notice::API available at $TUNNEL_URL"
          fi

      - name: Keep alive
        run: sleep infinity

  worker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker_id: [1, 2, 3, 4]
    timeout-minutes: 360

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq build-essential cmake git wget libzmq3-dev
          sudo npm install -g holesail

      - name: Install fio
        run: |
          sudo apt-get install -y fio || true
          if ! command -v fio &> /dev/null; then
            git clone https://github.com/axboe/fio.git
            cd fio
            ./configure --prefix=/usr
            make -j$(nproc)
            sudo make install
            cd ..
          fi

      - name: Install HiGHS
        run: |
          git clone https://github.com/ERGO-Code/HiGHS.git
          cd HiGHS
          mkdir build && cd build
          cmake ..
          make -j$(nproc)
          sudo make install
          cd ../..

      - name: Clone and build prima.cpp
        run: |
          git clone https://github.com/OpenCPIL/prima.cpp.git
          cd prima.cpp
          make USE_HIGHS=1 -j$(nproc)

      - name: Download model
        run: |
          mkdir -p models
          curl -L -o models/model.gguf "$MODEL_URL" -f --retry 3
          if [ "$(head -c 4 models/model.gguf)" != "GGUF" ]; then
            echo "❌ Invalid GGUF file on worker – aborting"
            exit 1
          fi

      - name: Fetch master URL
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          WORKER_ID: ${{ matrix.worker_id }}
        run: |
          echo "📡 Worker $WORKER_ID fetching master URL..."
          MASTER_URL=""
          for attempt in {1..30}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/master_url.txt" 2>/dev/null)
            if echo "$RESPONSE" | jq -e '.message' > /dev/null 2>&1; then
              sleep 5
              continue
            fi
            URL=$(echo "$RESPONSE" | jq -r '.content' 2>/dev/null | base64 -d 2>/dev/null | tr -d '\n\r')
            if [ -n "$URL" ] && [ "$URL" != "null" ] && [[ "$URL" == hs://* ]]; then
              MASTER_URL="$URL"
              break
            fi
            sleep 5
          done
          if [ -z "$MASTER_URL" ]; then
            echo "❌ Failed to fetch master URL"
            exit 1
          fi
          echo "MASTER_HOLESAIL_URL=$MASTER_URL" >> $GITHUB_ENV

      - name: Connect to master via Holesail and test
        run: |
          holesail --connect "$MASTER_HOLESAIL_URL" --port 6000 &
          sleep 10
          if nc -zv 127.0.0.1 6000 2>&1 | grep -q "succeeded"; then
            echo "✅ Tunnel to master is open on 127.0.0.1:6000"
          else
            echo "❌ Tunnel failed – cannot connect to master"
            exit 1
          fi

      - name: Expose worker and register
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          WORKER_ID: ${{ matrix.worker_id }}
        run: |
          RPC_PORT=$((5000 + WORKER_ID))
          holesail --live $RPC_PORT > /tmp/holesail_worker.txt 2>&1 &
          sleep 5
          WORKER_URL=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_worker.txt | head -1)
          echo "✅ Worker $WORKER_ID: $WORKER_URL"
          mkdir -p workers
          echo "$WORKER_URL" > workers/worker_${WORKER_ID}.txt
          ENCODED=$(base64 -w0 workers/worker_${WORKER_ID}.txt)

          for attempt in {1..5}; do
            FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/worker_${WORKER_ID}.txt")
            SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
            if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
              PAYLOAD=$(jq -n --arg msg "register worker $WORKER_ID" --arg content "$ENCODED" --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}')
            else
              PAYLOAD=$(jq -n --arg msg "register worker $WORKER_ID" --arg content "$ENCODED" \
                '{message: $msg, content: $content}')
            fi
            RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/worker_${WORKER_ID}.txt" \
              -d "$PAYLOAD")
            if echo "$RESPONSE" | jq -e '.content' > /dev/null; then
              echo "✅ Worker $WORKER_ID registered"
              break
            fi
            if [ $attempt -lt 5 ]; then sleep 2; fi
          done

      - name: Fetch next URL and connect
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          WORKER_ID: ${{ matrix.worker_id }}
        run: |
          echo "📡 Worker $WORKER_ID fetching next URL..."
          NEXT_URL=""
          for attempt in {1..30}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/next_url_${WORKER_ID}.txt" 2>/dev/null)
            if echo "$RESPONSE" | jq -e '.message' > /dev/null 2>&1; then
              sleep 5
              continue
            fi
            URL=$(echo "$RESPONSE" | jq -r '.content' 2>/dev/null | base64 -d 2>/dev/null | tr -d '\n\r')
            if [ -n "$URL" ] && [ "$URL" != "null" ] && [[ "$URL" == hs://* ]]; then
              NEXT_URL="$URL"
              break
            fi
            sleep 5
          done
          if [ -z "$NEXT_URL" ]; then
            echo "❌ Failed to fetch next URL"
            exit 1
          fi
          echo "NEXT_HOLESAIL_URL=$NEXT_URL" >> $GITHUB_ENV

      - name: Connect to next node
        run: |
          NEXT_PORT=$((7000 + WORKER_ID))
          holesail --connect "$NEXT_HOLESAIL_URL" --port $NEXT_PORT &
          sleep 5

      - name: Start prima.cpp worker (llama-cli) with delay
        env:
          WORKER_ID: ${{ matrix.worker_id }}
          WORKER_COUNT: ${{ env.WORKER_COUNT }}
        run: |
          # Wait for the master to be ready (sleep 60 seconds to allow master to start)
          echo "⏳ Waiting 60 seconds for master to be ready..."
          sleep 60

          cd prima.cpp
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          RANK=$WORKER_ID
          if [ $WORKER_ID -eq $WORKER_COUNT ]; then
            NEXT="127.0.0.1:6000"
          else
            NEXT_PORT=$((7000 + WORKER_ID))
            NEXT="127.0.0.1:$NEXT_PORT"
          fi
          WORLD=$((WORKER_COUNT + 1))
          nohup ./llama-cli \
            -m ../models/model.gguf \
            -c 2048 \
            --world $WORLD \
            --rank $RANK \
            --master 127.0.0.1:6000 \
            --next "$NEXT" \
            --prefetch \
            > worker.log 2>&1 &

          # Print worker log after a short delay
          sleep 10
          echo "📄 worker.log (first 20 lines):"
          head -20 worker.log || true

      - name: Keep alive
        run: sleep infinity
