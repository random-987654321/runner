name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119
  PROXY_PORT: 9120

jobs:
  queen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip netcat-openbsd
          pip install fastapi uvicorn httpx hermes-agent[web,pty]
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Setup Ollama & Model
        uses: ai-action/setup-ollama@v2
      - run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Start Hermes Dashboard (Pure Local)
        run: |
          mkdir -p ~/.hermes
          cat << 'EOF' > ~/.hermes/config.yaml
          provider: "ollama"
          model: "granite4:tiny-h"
          providers:
            ollama:
              base_url: "http://127.0.0.1:11434"
          EOF
          nohup hermes dashboard --host 127.0.0.1 --no-open --port ${{ env.HERMES_DASHBOARD_PORT }} > dashboard.log 2>&1 &

      - name: Start CORS Proxy (Adapter)
        run: |
          nohup python3 cors_proxy.py > proxy.log 2>&1 &
          # Wait for proxy to bind
          for i in {1..10}; do if nc -z 127.0.0.1 ${{ env.PROXY_PORT }}; then break; fi; sleep 2; done

      - name: Start Cloudflare Tunnel (Points to Proxy)
        id: tunnel
        run: |
          # The tunnel points to the proxy (9120), not the dashboard (9119)
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.PROXY_PORT }} > tunnel.log 2>&1 &
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then echo "tunnel_url=$URL" >> $GITHUB_OUTPUT; break; fi
            sleep 3
          done

      - name: Final Output
        run: |
          echo "========================================================="
          echo "🌐 ACCESS YOUR HERMES DASHBOARD:"
          echo "👉 ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "========================================================="
          sleep infinity
