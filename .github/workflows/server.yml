name: Queen (Hermes via Ollama Launch + Holesail)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama with version that supports "launch" ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2
        with:
          version: latest  # or 0.6.0

      - name: Pull the model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Holesail ----------
      - name: Install Holesail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs npm
          sudo npm install -g holesail

      # ---------- Generate auth credentials ----------
      - name: Generate auth credentials
        run: |
          PASSWORD=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          SECRET=$(openssl rand -base64 32)
          echo "ADMIN_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin" >> $GITHUB_ENV
          echo "HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "HERMES_DASHBOARD_BASIC_AUTH_SECRET=$SECRET" >> $GITHUB_ENV

      # ---------- Launch Hermes with Ollama ----------
      - name: Launch Hermes
        run: |
          ollama launch hermes --model ${{ env.OLLAMA_MODEL }} -- \
            --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --no-open &
          sleep 15
          # Health check
          if curl -s http://localhost:${{ env.HERMES_PORT }}/api/status > /dev/null; then
            echo "✅ Hermes Gateway ready"
          else
            echo "❌ Hermes failed to start"
            exit 1
          fi

      # ---------- Expose via Holesail ----------
      - name: Expose with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.HERMES_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      # ---------- Print access ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🔐 Dashboard credentials:"
          echo "   Username: admin"
          echo "   Password: ${{ env.ADMIN_PASSWORD }}"
          echo ""
          echo "🌐 To access the Hermes Web UI:"
          echo "   1. Install Holesail: npm install -g holesail"
          echo "   2. Connect: holesail \"$CONNECTION_KEY\" --port ${{ env.HERMES_PORT }}"
          echo "   3. Open http://localhost:${{ env.HERMES_PORT }} in your browser"
          echo "   4. Log in with the credentials above."
          echo "================================================================="
          sleep infinity
