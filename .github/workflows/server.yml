name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119
  PROXY_PORT: 9120

jobs:
  queen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip netcat-openbsd
          pip install fastapi uvicorn httpx hermes-agent[web,pty]
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Setup Ollama & Model
        uses: ai-action/setup-ollama@v2
      - run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Configure and Start Hermes Dashboard
        run: |
          mkdir -p ~/.hermes
          cat << 'EOF' > ~/.hermes/config.yaml
          provider: "ollama"
          model: "granite4:tiny-h"
          providers:
            ollama:
              base_url: "http://127.0.0.1:11434"
          EOF
          nohup hermes dashboard --host 127.0.0.1 --no-open --port ${{ env.HERMES_DASHBOARD_PORT }} > dashboard.log 2>&1 &
          
          # Ensure dashboard is responsive
          for i in {1..15}; do if nc -z 127.0.0.1 ${{ env.HERMES_DASHBOARD_PORT }}; then break; fi; sleep 2; done

      - name: Start CORS Proxy (scripts/cors_proxy.py)
        run: |
          nohup python3 scripts/cors_proxy.py > proxy.log 2>&1 &
          # Ensure proxy is responsive
          for i in {1..10}; do if nc -z 127.0.0.1 ${{ env.PROXY_PORT }}; then echo "✅ Proxy active"; break; fi; sleep 2; done

      - name: Start Cloudflare Tunnel (Pointing to Proxy)
        id: tunnel
        run: |
          # Point tunnel to the proxy (9120) to fix WebSocket and Host header issues
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.PROXY_PORT }} > tunnel.log 2>&1 &
          
          # Capture the TryCloudflare URL
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 3
          done

      - name: Orchestration Access Route
        run: |
          echo "========================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "========================================================="
          # Check for errors if URL failed to capture
          if [ -z "${{ steps.tunnel.outputs.tunnel_url }}" ]; then
            echo "❌ Failed to capture tunnel URL. Check tunnel.log."
            cat tunnel.log
            exit 1
          fi
          sleep infinity
