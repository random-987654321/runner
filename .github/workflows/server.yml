name: Queen (Hermes + Ollama) with Fast Interactive Shell

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  SHELL_PORT: 2222

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      - name: Install socat and Holesail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y socat nodejs npm
          sudo npm install -g holesail

      - name: Start Ollama
        run: ollama serve &

      - name: Start fully interactive shell server
        run: |
          socat TCP-LISTEN:${{ env.SHELL_PORT }},nodelay,fork EXEC:'env TERM=xterm-256color bash -li',pty,stderr,setsid,sigint,sane &
          sleep 2

      - name: Expose shell with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.SHELL_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To get a FAST, FULLY INTERACTIVE shell:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Install socat (optional, but recommended):"
          echo "      # Ubuntu/Debian: sudo apt-get install socat"
          echo "      # macOS: brew install socat"
          echo ""
          echo "   3. Start the Holesail client (keep this terminal open):"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.SHELL_PORT }}"
          echo ""
          echo "   4. In a NEW terminal, connect with one of these:"
          echo ""
          echo "      # Option A (fastest, minimal overhead):"
          echo "      socat - TCP:localhost:${{ env.SHELL_PORT }},nodelay"
          echo ""
          echo "      # Option B (full PTY with resize support – slightly slower):"
          echo "      socat file:\`tty\`,raw,echo=0 TCP:localhost:${{ env.SHELL_PORT }},nodelay"
          echo ""
          echo "      # Option C (no socat needed – just works):"
          echo "      nc localhost ${{ env.SHELL_PORT }}"
          echo ""
          echo "   5. You now have a fully interactive bash shell!"
          echo "      Run 'hermes chat --model ${{ env.OLLAMA_MODEL }}' to start chatting."
          echo ""
          echo "💡 The server uses nodelay for low latency. The shell supports:"
          echo "   - Up/Down arrows (history)   - Tab completion"
          echo "   - Ctrl+C (SIGINT)            - Ctrl+Z (job control)"
          echo "   - Command editing            - Proper colors"
          echo "================================================================="
          sleep infinity
