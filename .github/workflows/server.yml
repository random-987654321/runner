name: Queen (Hermes Agent + Ollama + Holesail)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install Holesail ----------
      - name: Install Holesail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs npm
          sudo npm install -g holesail

      # ---------- Configure Hermes (using config set) ----------
      - name: Configure Hermes
        run: |
          mkdir -p ~/.hermes
          # Configure Ollama provider
          hermes config set models.providers.ollama.baseUrl "http://localhost:11434"
          hermes config set models.providers.ollama.models '[{"id":"granite4:tiny-h","api":"ollama"}]'
          hermes config set agents.default.model "ollama/granite4:tiny-h"
          # Show config to verify
          echo "Ôťů Current config:"
          hermes config show | grep -A5 "ollama" || echo "ÔÜá´ŞĆ No Ollama config found"
          # Validate
          hermes config check || echo "ÔÜá´ŞĆ Config validation warning"

      # ---------- Configure dashboard auth ----------
      - name: Configure Hermes authentication
        run: |
          PASSWORD=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          SECRET=$(openssl rand -base64 32)
          cat > ~/.hermes/.env << EOF
          HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin
          HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=$PASSWORD
          HERMES_DASHBOARD_BASIC_AUTH_SECRET=$SECRET
          EOF
          echo "ADMIN_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # ---------- Start Ollama service (only if not already running) ----------
      - name: Start Ollama if not running
        run: |
          if ! pgrep -x "ollama" > /dev/null; then
            echo "Starting Ollama..."
            ollama serve &
            sleep 5
          else
            echo "Ôťů Ollama already running"
          fi

      # ---------- Start Hermes Dashboard ----------
      - name: Start Hermes Dashboard
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          set -a; source ~/.hermes/.env; set +a
          # Verify model is set before starting
          echo "Model configured: $(hermes config show | grep -E 'model|provider' || echo 'unknown')"
          hermes dashboard --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --no-open &
          sleep 15
          for i in {1..20}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/api/status > /dev/null; then
              echo "Ôťů Dashboard ready"
              break
            fi
            echo "ÔĆ│ Waiting for dashboard... ($i/20)"
            sleep 2
          done

      # ---------- Expose Dashboard via Holesail ----------
      - name: Expose Dashboard with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.HERMES_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "ÔŁî Failed to get Holesail connection key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT
          echo "Ôťů Holesail key: $CONNECTION_KEY"

      # ---------- Print access instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "­čöĹ Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "­čîÉ To access the Hermes dashboard from your browser:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Connect to the runner's Holesail server:"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.HERMES_PORT }}"
          echo ""
          echo "   3. Open http://localhost:${{ env.HERMES_PORT }} in your browser"
          echo ""
          echo "­čöÉ Dashboard credentials:"
          echo "   Username: admin"
          echo "   Password: ${{ env.ADMIN_PASSWORD }}"
          echo ""
          echo "­čĺí The connection is direct P2P - no lag, no relay servers!"
          echo "================================================================="
          sleep infinity
