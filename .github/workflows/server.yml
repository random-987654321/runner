name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  GATEWAY_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Clean, tool-based Ollama installation (Automatically serves in background)
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 2. Cache model weights directory to skip downloading on future runs
      - name: Cache Ollama Model Weights
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama-${{ env.OLLAMA_MODEL }}
          restore-keys: |
            ${{ runner.os }}-ollama-

      # 3. Provision environment runtime packages
      - name: Install Node & System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm jq
          sudo npm install -g openclaw holesail
          
          # Fetch cloudflared binary directly
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 4. Bind model architecture to localized daemon instance
      - name: Pull Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 5. Populate workspace tasks and custom tools manifest
      - name: Pre-build Architecture & Skills Layout
        run: |
          mkdir -p ~/.openclaw/workspace/skills/run_worker
          cat << 'EOF' > ~/.openclaw/workspace/skills/run_worker/SKILL.md
          # run_worker
          
          Execute a query in an autonomous, temporary GitHub Actions worker over Holesail.
          
          ## Configuration
          - type: command
          - command: /home/runner/work/runner/runner/scripts/worker_launcher.sh
          
          ## Parameters
          - query (string): The precise task query to be executed by the worker.
          EOF
          chmod +x $GITHUB_WORKSPACE/scripts/worker_launcher.sh

      # 6. Instantiate core OpenClaw gateway config layout & process invocation
      - name: Configure and Launch OpenClaw Natively
        run: |
          mkdir -p ~/.openclaw
          cat << EOF > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "port": 18789,
              "mode": "local",
              "bind": "auto",
              "auth": {
                "mode": "none"
              }
            },
            "agents": {
              "defaults": {
                "model": "ollama/granite4:tiny-h"
              }
            },
            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "http://127.0.0.1:11434",
                  "models": [
                    { 
                      "id": "granite4:tiny-h", 
                      "name": "granite4:tiny-h",
                      "api": "ollama" 
                    }
                  ]
                }
              }
            }
          }
          EOF

          # Turn off strict browser origin checking to allow arbitrary cloudflare addresses to map cleanly
          OPENCLAW_GATEWAY_CONTROL_UI_DISABLE_ORIGIN_CHECK="true" nohup openclaw gateway start > openclaw.log 2>&1 &
          
          echo "⏳ Verifying control gateway boot sequence..."
          for i in {1..20}; do
            if curl -s http://127.0.0.1:${{ env.GATEWAY_PORT }} > /dev/null || [ $? -eq 52 ]; then
              echo "✅ OpenClaw Gateway is online and listening!"
              break
            fi
            sleep 3
          done

      # 7. Establish upstream cloudflare tunneling and assert global connectivity status
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.GATEWAY_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          URL=""
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done

          echo "🌐 Warming up edge tunnel routing network structures..."
          sleep 12
          
          echo "📡 Verifying edge tunnel connectivity public propagation status..."
          for i in {1..10}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" -ne "000" ] && [ "$STATUS" -ne "502" ]; then
              echo "✅ Cloudflare Edge route is live on the public internet! (Status: $STATUS)"
              break
            fi
            echo "Tunnel routing is propagating, waiting for edge setup... ($i/10)"
            sleep 6
          done

      # 8. Print active runtime diagnostics and keep pipeline active
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 OPENCLAW PORTAL ROUTE: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "================================================================="
          echo ""
          echo "--- LOG DIAGNOSTICS (OpenClaw Output Preview) ---"
          cat openclaw.log || true
          echo ""
          echo "--- LOG DIAGNOSTICS (Cloudflared Output Preview) ---"
          head -n 20 tunnel.log || true
          echo "================================================================="
          sleep infinity
