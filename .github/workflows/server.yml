name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Python natively on the runner host
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 2. Spin up Ollama Engine Natively on the runner for maximum hardware acceleration
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull base weights and automatically extend context to 64K
      - name: Build 64K Context Agent Model Variant
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}
          
          # Creating the Modelfile to match the 64,000 threshold required by Hermes tools
          echo "FROM ${{ env.OLLAMA_MODEL }}" > Modelfile
          echo "PARAMETER num_ctx 64000" >> Modelfile
          ollama create granite4-64k -f Modelfile
          
          echo "✅ Custom 64K Context Model Variant successfully registered:"
          ollama list

      # 4. Install Hermes Agent framework natively onto the runner host
      - name: Install Hermes Agent Locally
        run: |
          python -m pip install --upgrade pip
          pip install "hermes-agent[web,pty]"
          
          # Build standard workspace configuration structures
          mkdir -p ~/.hermes
          echo 'provider: "ollama"' > ~/.hermes/config.yaml
          echo 'model: "granite4-64k"' >> ~/.hermes/config.yaml
          echo 'providers:' >> ~/.hermes/config.yaml
          echo '  ollama:' >> ~/.hermes/config.yaml
          echo '    base_url: "http://127.0.0.1:11434"' >> ~/.hermes/config.yaml

      # 5. Spin up Cloudflare Tunnel client natively by downloading the binary directly
      - name: Start Cloudflare Tunnel Natively
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          
          # Point the ad-hoc tunnel to the native runner port
          ./cloudflared tunnel --url http://127.0.0.1:${{ env.HERMES_DASHBOARD_PORT }} > cloudflared.log 2>&1 &
          
          echo "⏳ Catching dynamic public edge route URL..."
          # Active loop to reliably catch the ephemeral address from the log file
          for i in {1..20}; do
            if [ -f cloudflared.log ]; then
              URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' cloudflared.log | head -1)
              if [ -n "$URL" ]; then 
                echo "TUNNEL_URL=$URL" >> $GITHUB_ENV
                echo "✅ URL Captured: $URL"
                break
              fi
            fi
            sleep 3
          done

      # 6. Boot the Hermes Dashboard natively with reverse proxy bypass filters enabled
      - name: Launch Hermes Dashboard & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${{ env.TUNNEL_URL }}"
          echo "================================================================="
          
          # Inject generic global environment fallback rules
          export HERMES_ALLOWED_ORIGINS="*"
          export HERMES_ALLOWED_HOSTS="*"
          export HERMES_DISABLE_CSRF="true"
          export HERMES_INSECURE="true"
          
          # --insecure allows non-loopback bindings to prevent Host matching drops over Cloudflare
          hermes dashboard \
            --host 0.0.0.0 \
            --port ${{ env.HERMES_DASHBOARD_PORT }} \
            --insecure \
            --no-open \
            --skip-build
