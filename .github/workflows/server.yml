name: Queen (Ollama + Hermes + Holesail - Accelerated)

on:
  workflow_dispatch:

env:
  OLLAMA_MODEL: granite4:tiny-h
  OLLAMA_NUM_THREADS: 4
  OLLAMA_NUM_CTX: 2048
  OLLAMA_FLASH_ATTENTION: 1
  OLLAMA_KV_CACHE_SIZE: 512
  OLLAMA_NUMA: 1
  OLLAMA_LLAMA_CPP_ARGS: "-t 4 -tb 4 -fa on -ctk q4_0 -ctv q4_0 --cpu-strict 1 --cpu-range 0-3 -c 2048"
  HERMES_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl xz-utils nodejs npm util-linux

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Start Ollama with CPU affinity and real‑time priority (using sudo)
        run: |
          # Remove any previous ollama process
          sudo pkill -f ollama || true
          sleep 2
          # Start ollama with CPU pinning and real‑time scheduling
          sudo -E taskset -c 0-3 chrt -r 99 ollama serve &
          sleep 5
          # Verify it's running
          pgrep -f "ollama serve" || echo "⚠️ Ollama not running, but continuing"

      - name: Pull model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      - name: Install Holesail
        run: sudo npm install -g holesail

      - name: Configure Hermes (CLI)
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          hermes config set model.provider custom
          hermes config set model.base_url "http://localhost:11434/v1"
          hermes config set model.api_key "no-key-required"
          hermes config set model.default "${{ env.OLLAMA_MODEL }}"
          hermes config set model.context_length ${{ env.OLLAMA_NUM_CTX }}
          hermes config set model.api_mode chat_completions
          hermes config set gateway.port ${{ env.HERMES_PORT }}
          hermes config set gateway.host 0.0.0.0

      - name: Configure Hermes authentication
        run: |
          PASSWORD=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          SECRET=$(openssl rand -base64 32)
          cat > ~/.hermes/.env << EOF
          HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin
          HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=$PASSWORD
          HERMES_DASHBOARD_BASIC_AUTH_SECRET=$SECRET
          EOF
          echo "ADMIN_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Install dashboard dependencies
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          cd ~/.hermes/hermes-agent
          uv pip install -e ".[web,pty]" || pip install -e ".[web,pty]"

      - name: Start Hermes Dashboard
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          set -a; source ~/.hermes/.env; set +a
          hermes dashboard --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --no-open &
          sleep 15
          for i in {1..20}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/api/status > /dev/null; then
              echo "✅ Dashboard ready"
              break
            fi
            sleep 2
          done

      - name: Expose Dashboard with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.HERMES_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail connection key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Key: $CONNECTION_KEY"
          echo "🔐 Username: admin | Password: ${{ env.ADMIN_PASSWORD }}"
          echo "⚡ Optimizations applied: CPU affinity, real‑time priority, custom runner args."
          echo "================================================================="
          sleep infinity
