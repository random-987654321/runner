name: Queen (Hermes + Ollama) with SSH via Holesail

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  SSH_PORT: 2222
  HERMES_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install Holesail and SSH server ----------
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openssh-server nodejs npm
          sudo npm install -g holesail

      # ---------- Set SSH password ----------
      - name: Set SSH password
        run: |
          echo "runner:runner123" | sudo chpasswd

      # ---------- Generate SSH host keys ----------
      - name: Generate SSH host keys
        run: |
          sudo ssh-keygen -A

      # ---------- Create privilege separation directory ----------
      - name: Create privilege separation directory
        run: |
          sudo mkdir -p /run/sshd
          sudo chmod 755 /run/sshd

      # ---------- Configure SSH on port 2222 (fixed) ----------
      - name: Configure SSH
        run: |
          # Backup original config
          sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak
          
          # Force port change using multiple methods
          sudo sed -i '/^Port/d' /etc/ssh/sshd_config
          echo "Port ${{ env.SSH_PORT }}" | sudo tee -a /etc/ssh/sshd_config
          
          # Enable password authentication
          sudo sed -i '/^PasswordAuthentication/d' /etc/ssh/sshd_config
          echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
          
          # Disable root login
          sudo sed -i '/^PermitRootLogin/d' /etc/ssh/sshd_config
          echo "PermitRootLogin no" | sudo tee -a /etc/ssh/sshd_config
          
          # Validate configuration
          sudo sshd -t || { echo "❌ Invalid SSH config"; exit 1; }
          
          # Show the port configuration
          grep -E "^(Port|PasswordAuthentication)" /etc/ssh/sshd_config

      # ---------- Start SSH server ----------
      - name: Start SSH
        run: |
          # Kill any process on port 2222
          sudo fuser -k ${{ env.SSH_PORT }}/tcp || true
          
          # Restart SSH with new config
          sudo systemctl daemon-reload
          sudo systemctl restart ssh
          sleep 3
          
          # Show status
          sudo systemctl status ssh --no-pager

      # ---------- Verify SSH is listening on port 2222 ----------
      - name: Verify SSH
        run: |
          if sudo netstat -tulpn | grep :${{ env.SSH_PORT }}; then
            echo "✅ SSH is listening on port ${{ env.SSH_PORT }}"
          else
            echo "❌ SSH is NOT listening on port ${{ env.SSH_PORT }}"
            echo "Current listening ports:"
            sudo netstat -tulpn | grep ssh
            # Fallback: try to start sshd manually
            sudo /usr/sbin/sshd -p ${{ env.SSH_PORT }} -D &
            sleep 3
            sudo netstat -tulpn | grep :${{ env.SSH_PORT }} || { echo "❌ SSH failed to start on port ${{ env.SSH_PORT }}"; exit 1; }
          fi

      # ---------- Start Ollama service ----------
      - name: Start Ollama
        run: ollama serve &

      # ---------- (Optional) Start Hermes Dashboard ----------
      - name: Start Hermes Dashboard
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          hermes dashboard --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --no-open &
          sleep 10
          for i in {1..10}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/health > /dev/null; then
              echo "✅ Hermes Dashboard ready"
              break
            fi
            sleep 2
          done

      # ---------- Expose SSH via Holesail ----------
      - name: Expose SSH with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.SSH_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      # ---------- Print access instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To SSH into the runner:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Connect to the runner's SSH port:"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.SSH_PORT }}"
          echo ""
          echo "   3. In another terminal, SSH into the forwarded port:"
          echo "      ssh runner@localhost -p ${{ env.SSH_PORT }}"
          echo ""
          echo "   Password is: runner123"
          echo ""
          echo "   4. You now have a full SSH session on the runner!"
          echo "      Run 'hermes chat --model ${{ env.OLLAMA_MODEL }}' to start chatting."
          echo ""
          echo "💡 The connection is direct P2P – no lag, no relay servers!"
          echo "================================================================="
          sleep infinity
