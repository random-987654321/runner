name: Ray‑vLLM with Holesail (5 Workers)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ---------- DEPENDENCIES ----------
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake python3-pip nodejs npm
          sudo npm install -g holesail

      - name: Install Ray and vLLM
        run: pip install ray[default] vllm

      # ---------- CLEANUP ----------
      - name: Clean workers directory
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Cleaning workers directory..."
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null)
          echo "$RESPONSE" | jq -r '.[] | select(.type == "file") | .name + ":" + .sha' 2>/dev/null | while IFS=':' read -r name sha; do
            if [ -n "$name" ] && [ -n "$sha" ]; then
              curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/workers/${name}" \
                -d "{\"message\":\"cleanup\",\"sha\":\"${sha}\"}" || true
            fi
          done
          echo "✅ Cleanup done."

      - name: Create workers directory
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "📁 Creating fresh workers directory..."
          echo "" | base64 -w0 > empty_keep
          curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/workers/.keep" \
            -d "{\"message\":\"create workers directory\",\"content\":\"$(cat empty_keep)\"}" || true
          echo "✅ workers directory ready."

      # ---------- START RAY HEAD + HOLESAIL TUNNEL ----------
      - name: Start Ray head and expose via Holesail
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🚀 Starting Ray head node..."
          ray start --head --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265

          echo "🔗 Exposing Ray head port via Holesail..."
          holesail --live 6379 > /tmp/holesail_output.txt 2>&1 &
          sleep 5

          CONNECTION_STRING=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_output.txt | head -1)
          if [ -z "$CONNECTION_STRING" ]; then
            echo "❌ Failed to get Holesail connection string"
            cat /tmp/holesail_output.txt
            exit 1
          fi
          echo "✅ Ray head reachable at: $CONNECTION_STRING"

          # Write the connection string to the repo
          WORKER_FILE="workers/ray_head.json"
          mkdir -p workers
          echo "{\"url\": \"${CONNECTION_STRING}\"}" > ${WORKER_FILE}
          ENCODED=$(base64 -w0 ${WORKER_FILE})
          curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/${WORKER_FILE}" \
            -d "{\"message\":\"register ray head\",\"content\":\"${ENCODED}\"}"

          echo "👑 Queen waiting for 5 workers to join Ray..."
          for attempt in {1..60}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null)
            if [ "$(echo "$RESPONSE" | jq -r '.message' 2>/dev/null)" = "Not Found" ]; then
              COUNT=0
            else
              FILES=$(echo "$RESPONSE" | jq -r '.[] | select(.type == "file") | .name' 2>/dev/null)
              COUNT=$(echo "$FILES" | grep -c . || echo 0)
            fi
            echo "  Attempt $attempt: $COUNT workers registered"
            if [ "$COUNT" -ge 5 ]; then
              echo "✅ All 5 workers have joined Ray!"
              break
            fi
            sleep 5
          done
          if [ "$COUNT" -lt 5 ]; then
            echo "❌ Timeout waiting for workers to join Ray"
            exit 1
          fi

      # ---------- DOWNLOAD MODEL ----------
      - name: Download model
        run: |
          MODEL_URL="https://huggingface.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF/resolve/main/granite-4.0-h-tiny-DISTILL-4.5-opus-high-think-q4_k_m.gguf"
          curl -L -o model.gguf "$MODEL_URL" -f --retry 3 --retry-delay 2
          if [ "$(head -c 4 model.gguf)" = "GGUF" ]; then
            echo "✅ Valid GGUF file downloaded"
          else
            echo "❌ Invalid GGUF file"
            exit 1
          fi

      # ---------- START vLLM SERVER WITH RAY ----------
      - name: Start vLLM server with Ray (5 workers)
        run: |
          echo "🌐 Starting vLLM server with Ray (tensor_parallel_size=5)..."
          python3 - <<'EOF'
          import ray
          from vllm import LLM, SamplingParams
          import time

          ray.init(address='auto', ignore_reinit_error=True)
          llm = LLM(
              model='./model.gguf',
              tensor_parallel_size=5,
              distributed_executor_backend='ray',
              enforce_eager=True,
              trust_remote_code=True,
          )
          print("✅ vLLM model loaded")
          while True:
              time.sleep(60)
          EOF &
          sleep 15

          for i in {1..20}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "✅ vLLM server is ready"
              break
            fi
            echo "⏳ Waiting for vLLM server... ($i/20)"
            sleep 2
          done
          if ! curl -s http://localhost:8000/health > /dev/null; then
            echo "❌ vLLM server failed to start"
            exit 1
          fi

      # ---------- CLOUDFLARE TUNNEL FOR FRONTEND ----------
      - name: Start Cloudflare tunnel for frontend
        run: |
          echo "🌐 Starting Cloudflare tunnel..."
          curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8000 > tunnel.log 2>&1 &

          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            sleep 3
          done
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            tail -50 tunnel.log
            exit 1
          fi

          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG=$(jq -n --arg url "$TUNNEL_URL" '{apiUrl: $url}')
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)
          FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')
          if [ "$SHA" != "null" ]; then
            PAYLOAD=$(jq -n --arg msg "update API URL" --arg content "$ENCODED" --arg sha "$SHA" \
              '{message: $msg, content: $content, sha: $sha}')
            curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" \
              -d "$PAYLOAD"
          fi
          echo "::notice::Frontend URL: https://$CHAT_REPO"
          echo "🔄 Queen is serving. Keeping alive..."
          sleep infinity

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3, 4, 5]

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl nodejs npm
          sudo npm install -g holesail

      - name: Install Ray
        run: pip install ray[default]

      - name: Connect to Ray head via Holesail and join cluster
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          INSTANCE_ID: ${{ matrix.instance }}
        run: |
          set -e
          echo "🐝 Worker $INSTANCE_ID starting..."

          # Fetch the Ray head connection string
          for attempt in {1..30}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/ray_head.json")
            if [ "$(echo "$RESPONSE" | jq -r '.sha' 2>/dev/null)" != "null" ]; then
              CONN_STR=$(echo "$RESPONSE" | jq -r '.content' | base64 -d | jq -r '.url')
              if [ -n "$CONN_STR" ]; then
                echo "✅ Found Ray head at: $CONN_STR"
                break
              fi
            fi
            echo "⏳ Waiting for ray_head.json... ($attempt/30)"
            sleep 2
          done

          if [ -z "$CONN_STR" ]; then
            echo "❌ Failed to get Ray head connection string"
            exit 1
          fi

          # Forward the Holesail tunnel to localhost:6379
          holesail "$CONN_STR" --listen localhost:6379 &
          sleep 5

          # Join the Ray cluster
          ray start --address='localhost:6379' --num-cpus=4

          # Register this worker so the Queen knows it's ready
          WORKER_FILE="workers/ray_worker_${INSTANCE_ID}.json"
          mkdir -p workers
          echo "{\"worker_id\": \"${INSTANCE_ID}\", \"status\": \"ready\"}" > ${WORKER_FILE}
          ENCODED=$(base64 -w0 ${WORKER_FILE})

          for attempt in {1..10}; do
            FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${WORKER_FILE}")
            SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
            if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
              PAYLOAD=$(jq -n \
                --arg msg "register worker $INSTANCE_ID" \
                --arg content "$ENCODED" \
                --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}')
            else
              PAYLOAD=$(jq -n \
                --arg msg "register worker $INSTANCE_ID" \
                --arg content "$ENCODED" \
                '{message: $msg, content: $content}')
            fi
            RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${WORKER_FILE}" \
              -d "$PAYLOAD")
            if echo "$RESPONSE" | jq -e '.content' > /dev/null; then
              echo "✅ Worker $INSTANCE_ID registered successfully!"
              break
            fi
            STATUS=$(echo "$RESPONSE" | jq -r '.status' 2>/dev/null)
            if [ "$STATUS" = "409" ]; then
              echo "⚠️ Conflict detected – retrying in 3 seconds..."
              sleep 3
              continue
            fi
            echo "❌ Failed to register worker $INSTANCE_ID"
            echo "Response: $RESPONSE"
            exit 1
          done

          # Keep the worker alive
          while true; do
            if ! pgrep -f "ray" > /dev/null; then
              echo "⚠️ Ray worker died, restarting..."
              ray start --address='localhost:6379' --num-cpus=4
            fi
            if ! pgrep -f "holesail" > /dev/null; then
              echo "⚠️ Holesail client died, restarting..."
              holesail "$CONN_STR" --listen localhost:6379 &
            fi
            sleep 30
          done
