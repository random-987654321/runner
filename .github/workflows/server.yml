name: server

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      
      - name: llama-server
        run: |
          wget https://github.com/ggml-org/llama.cpp/releases/download/b9940/llama-b9940-bin-ubuntu-x64.tar.gz    
          tar -xzf llama-b9940-bin-ubuntu-x64.tar.gz
         
      - name: Download model
        run: |
          MODEL_URL="https://huggingface.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF/resolve/main/granite-4.0-h-tiny-DISTILL-4.5-opus-high-think-q4_k_m.gguf"
          curl -L -o model.gguf "$MODEL_URL" -f --retry 3 --retry-delay 2
          if [ "$(head -c 4 model.gguf)" = "GGUF" ]; then
            echo "✅ Valid GGUF file downloaded"
          else
            echo "❌ Invalid GGUF file"
            exit 1
          fi
      
      - name: Start llama-server and Cloudflare tunnel
        run: |
          echo "🌐 Starting llama-server"
          cd llama-b9940
          chmod +x llama-server
          ./llama-server \
            -m ../model.gguf \
            -t 4 \
            -tb 4 \
            -fa on \
            -ngl 0 \
            -ctk q4_0 \
            -ctv q4_0 \
            --cpu-strict 1 \
            --cpu-range 0-3 \
            -c 70000 \
            &
          
          for i in {1..600}; do
            if curl -s http://localhost:8080/health > /dev/null; then
              echo "✅ llama-server is ready"
              break
            fi
            echo "⏳ Waiting for llama-server... ($i/600)"
            sleep 2
          done
          if ! curl -s http://localhost:8080/health > /dev/null; then
            echo "❌ llama-server failed to start"
            cat server.log
            exit 1
          fi
          echo "🌐 Starting Cloudflare tunnel..."
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > tunnel.log 2>&1 &
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            echo "⏳ Waiting for tunnel... ($i/30)"
            sleep 3
          done
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            tail -50 tunnel.log
            exit 1
          fi
          echo "🔄 Queen is serving. Keeping alive..."
          sleep infinity
  
