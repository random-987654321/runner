name: Queen (Hermes Agent + Ollama + granite4:tiny-h)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h           # Base model name
  CUSTOM_MODEL: granite-cpu-64k           # Custom model with optimizations
  HERMES_PORT: 18789
  OLLAMA_NUM_THREADS: 4
  OLLAMA_KEEP_ALIVE: 24h
  OLLAMA_FLASH_ATTENTION: 1               # Enables flash attention

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Install system dependencies ----------
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl xz-utils nodejs npm

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      # ---------- Pull base model and create custom Modelfile ----------
      - name: Create custom Modelfile with optimizations
        run: |
          # Pull the base model
          ollama pull ${{ env.OLLAMA_MODEL }}

          # Create the Modelfile with CPU optimizations and 64k context
          cat > Modelfile << 'EOF'
          FROM ibm/granite4:tiny-h
          # CPU optimizations for 4 vCPUs
          PARAMETER num_thread 4
          PARAMETER num_thread_batch 4
          PARAMETER num_gpu 0
          # Context window for RAG / long documents
          PARAMETER num_ctx 64000
          EOF

          # Create the custom model
          ollama create ${{ env.CUSTOM_MODEL }} -f ./Modelfile

      # ---------- Verify Ollama is ready ----------
      - name: Verify Ollama model ready
        run: |
          for i in {1..30}; do
            if ollama list | grep -q "${{ env.CUSTOM_MODEL }}"; then
              echo "✅ Custom model ready"
              break
            fi
            echo "⏳ Waiting for model... ($i/30)"
            sleep 2
          done

      # ---------- Benchmark inference speed ----------
      - name: Benchmark inference speed
        run: |
          echo "🧪 Testing inference speed with custom model..."
          ollama run ${{ env.CUSTOM_MODEL }} "Write a short poem about AI." --verbose 2>&1 | tee benchmark.log
          echo "📊 Tokens/second:"
          grep -oP 'tokens/s: \K[0-9.]+' benchmark.log || echo "Could not parse t/s"

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install Holesail ----------
      - name: Install Holesail
        run: sudo npm install -g holesail

      # ---------- Configure Hermes for Ollama ----------
      - name: Configure Hermes
        run: |
          mkdir -p ~/.hermes
          cat > ~/.hermes/config.yaml << EOF
          model:
            default: "${{ env.CUSTOM_MODEL }}"
            provider: "custom"
            base_url: "http://localhost:11434/v1"
            api_key: "sk-no-key-required"
          gateway:
            port: ${{ env.HERMES_PORT }}
            host: 0.0.0.0
          EOF

      # ---------- Configure dashboard authentication ----------
      - name: Configure Hermes authentication
        run: |
          PASSWORD=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          SECRET=$(openssl rand -base64 32)
          cat > ~/.hermes/.env << EOF
          HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin
          HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=$PASSWORD
          HERMES_DASHBOARD_BASIC_AUTH_SECRET=$SECRET
          EOF
          echo "ADMIN_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # ---------- Install web + pty extras for dashboard ----------
      - name: Install dashboard dependencies
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          cd ~/.hermes/hermes-agent
          uv pip install -e ".[web,pty]" || pip install -e ".[web,pty]"

      # ---------- Start Hermes Dashboard ----------
      - name: Start Hermes Dashboard
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          set -a; source ~/.hermes/.env; set +a
          hermes dashboard --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --no-open &
          sleep 15
          for i in {1..20}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/api/status > /dev/null; then
              echo "✅ Dashboard ready"
              break
            fi
            echo "⏳ Waiting for dashboard... ($i/20)"
            sleep 2
          done

      # ---------- Expose Dashboard via Holesail ----------
      - name: Expose Dashboard with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.HERMES_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail connection key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT
          echo "✅ Holesail key: $CONNECTION_KEY"

      # ---------- Print access instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To access the Hermes dashboard from your browser:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Connect to the runner's Holesail server:"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.HERMES_PORT }}"
          echo ""
          echo "   3. Open http://localhost:${{ env.HERMES_PORT }} in your browser"
          echo ""
          echo "🔐 Dashboard credentials:"
          echo "   Username: admin"
          echo "   Password: ${{ env.ADMIN_PASSWORD }}"
          echo ""
          echo "💡 Model: ${{ env.CUSTOM_MODEL }} (64k context, CPU optimized)"
          echo "💡 API key is set to empty string (custom provider)."
          echo "================================================================="

      # ---------- Keep the runner alive ----------
      - name: Keep alive
        run: sleep infinity
