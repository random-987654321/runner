name: Queen (Hermes Agent Web UI + Ollama + Holesail)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install Web UI dependencies ----------
      - name: Install Hermes Web UI dependencies
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          cd ~/.hermes/hermes-agent
          source venv/bin/activate
          uv pip install -e ".[web,pty]"

      # ---------- Install Holesail ----------
      - name: Install Holesail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs npm
          sudo npm install -g holesail

      # ---------- Configure Hermes (model provider) ----------
      - name: Configure Hermes
        run: |
          mkdir -p ~/.hermes
          export PATH="$HOME/.hermes/bin:$PATH"
          # Set Ollama as the provider
          hermes config set models.providers.ollama.baseUrl "http://localhost:11434"
          hermes config set models.providers.ollama.models '[{"id":"granite4:tiny-h","api":"ollama"}]'
          hermes config set agents.default.model "ollama/granite4:tiny-h"
          echo "✅ Configuration:"
          hermes config show

      # ---------- Configure authentication ----------
      - name: Configure authentication
        run: |
          PASSWORD=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          SECRET=$(openssl rand -base64 32)
          cat > ~/.hermes/.env << EOF
          HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin
          HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=$PASSWORD
          HERMES_DASHBOARD_BASIC_AUTH_SECRET=$SECRET
          EOF
          echo "ADMIN_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # ---------- Start Ollama (if not already running) ----------
      - name: Start Ollama if needed
        run: |
          if ! pgrep -x "ollama" > /dev/null; then
            ollama serve &
            sleep 5
          else
            echo "✅ Ollama already running"
          fi

      # ---------- Start Hermes Server (API + Web UI) ----------
      - name: Start Hermes Server
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          set -a; source ~/.hermes/.env; set +a
          # Use hermes serve with the --web flag to serve both API and UI
          # This is the most reliable way to have both the gateway and dashboard
          hermes serve --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --web > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          # Wait for the server to initialize
          for i in {1..30}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/health > /dev/null; then
              echo "✅ Server is responding"
              break
            fi
            echo "⏳ Waiting for server... ($i/30)"
            sleep 2
          done
          if ! curl -s http://localhost:${{ env.HERMES_PORT }}/health > /dev/null; then
            echo "❌ Server not responding. Logs:"
            cat server.log
            exit 1
          fi

      # ---------- Expose via Holesail ----------
      - name: Expose with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.HERMES_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      # ---------- Print access ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🔐 Dashboard credentials:"
          echo "   Username: admin"
          echo "   Password: ${{ env.ADMIN_PASSWORD }}"
          echo ""
          echo "🌐 To access the Hermes Web UI:"
          echo "   1. Install Holesail: npm install -g holesail"
          echo "   2. Connect: holesail \"$CONNECTION_KEY\" --port ${{ env.HERMES_PORT }}"
          echo "   3. Open http://localhost:${{ env.HERMES_PORT }} in your browser"
          echo "   4. Log in with the credentials above."
          echo ""
          echo "💡 The server now runs both the API and Web UI."
          echo "================================================================="
          sleep infinity
