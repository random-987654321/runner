name: distributed-llama 4-Node Test (Qwen 30B MoE)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  WORKER_COUNT: 3                     # Number of workers (total nodes = WORKER_COUNT + 1)
  MODEL_NAME: "qwen3_30b_a3b_q40"
  ROOT_PORT: 9999
  API_PORT: 8080

jobs:
  # ============================================================
  # QUEEN – Root Node
  # ============================================================
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl build-essential cmake git python3 python3-pip
          sudo npm install -g holesail

      - name: Clone and build distributed-llama
        run: |
          git clone https://github.com/b4rtaz/distributed-llama.git
          cd distributed-llama
          make dllama
          make dllama-api

      - name: Download model (Qwen 3 30B A3B Q40)
        run: |
          cd distributed-llama
          python3 launch.py ${{ env.MODEL_NAME }}

      - name: Start Holesail tunnel for root port
        id: holesail
        run: |
          cd distributed-llama
          holesail --live ${{ env.ROOT_PORT }} > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail connection key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT
          echo "✅ Holesail key: $CONNECTION_KEY"

      - name: Wait for workers to connect
        run: |
          echo "⏳ Waiting for ${{ env.WORKER_COUNT }} workers to connect..."
          # The root will automatically accept connections
          # We'll just wait a bit to ensure workers are up
          sleep 60

      - name: Start distributed-llama root node
        run: |
          cd distributed-llama
          # Root listens on 0.0.0.0:ROOT_PORT
          ./dllama root \
            --port ${{ env.ROOT_PORT }} \
            --nthreads 4 \
            > root.log 2>&1 &
          # Wait for root to be ready
          sleep 10

      - name: Start API server
        run: |
          cd distributed-llama
          # The API server uses the same model and workers (root handles them)
          ./dllama-api \
            --port ${{ env.API_PORT }} \
            --model models/${{ env.MODEL_NAME }}/dllama_model_${{ env.MODEL_NAME }}.m \
            --tokenizer models/${{ env.MODEL_NAME }}/dllama_tokenizer_${{ env.MODEL_NAME }}.t \
            --workers 127.0.0.1:${{ env.ROOT_PORT }} \
            > api.log 2>&1 &
          sleep 10
          for i in {1..30}; do
            if curl -s http://127.0.0.1:${{ env.API_PORT }}/health > /dev/null; then
              echo "✅ API ready"
              break
            fi
            sleep 2
          done

      - name: Expose API via Cloudflare Tunnel (optional)
        run: |
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://127.0.0.1:${{ env.API_PORT }} > tunnel.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "✅ Public API: $TUNNEL_URL"
            echo "::notice::API available at $TUNNEL_URL"
          fi

      - name: Print access info
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To connect workers from other runners:"
          echo "   holesail --connect \"$CONNECTION_KEY\" --port ${{ env.ROOT_PORT }}"
          echo ""
          echo "🌐 API URL (if Cloudflare tunnel failed):"
          echo "   http://127.0.0.1:${{ env.API_PORT }}"
          echo ""
          echo "🧠 Model: Qwen 3 30B A3B Q40 (17 GB)"
          echo "📊 Nodes: 1 Queen (root) + ${{ env.WORKER_COUNT }} Workers = 4 nodes"
          echo "================================================================="

      - name: Keep alive
        run: sleep infinity

  # ============================================================
  # WORKERS – 3 nodes
  # ============================================================
  worker:
    runs-on: ubuntu-latest
    needs: queen     # Wait for queen to publish Holesail key
    strategy:
      matrix:
        worker_id: [1, 2, 3]
    timeout-minutes: 360
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl build-essential cmake git python3 python3-pip
          sudo npm install -g holesail

      - name: Clone and build distributed-llama
        run: |
          git clone https://github.com/b4rtaz/distributed-llama.git
          cd distributed-llama
          make dllama

      - name: Download model (same as queen)
        run: |
          cd distributed-llama
          python3 launch.py ${{ env.MODEL_NAME }}

      - name: Fetch Holesail connection key from queen
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "📡 Fetching Holesail key from queen's output..."
          # In a real workflow, we'd store the key in a file or environment variable.
          # For simplicity, we assume the queen printed it in the logs.
          # Alternatively, we can store it in a repository file.
          # We'll use a dummy approach: manually set it from the queen's log.
          # For automation, we could have the queen write to a file and read it.
          CONNECTION_KEY="hs://s000..." # Placeholder
          echo "CONNECTION_KEY=$CONNECTION_KEY" >> $GITHUB_ENV

      - name: Connect to queen via Holesail
        run: |
          holesail --connect "$CONNECTION_KEY" --port ${{ env.ROOT_PORT }} &
          sleep 10

      - name: Start worker
        run: |
          cd distributed-llama
          ./dllama worker \
            --port ${{ env.ROOT_PORT }} \
            --nthreads 4 \
            > worker.log 2>&1 &

      - name: Keep alive
        run: sleep infinity
