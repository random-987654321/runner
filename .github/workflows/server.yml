name: Queen (Hermes Agent + Ollama + Holesail)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install Holesail ----------
      - name: Install Holesail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs npm
          sudo npm install -g holesail

      # ---------- Configure Hermes with Ollama ----------
      - name: Configure Hermes
        run: |
          mkdir -p ~/.hermes
          # Configure Ollama as the provider
          hermes config set models.providers.ollama.baseUrl "http://localhost:11434"
          hermes config set models.providers.ollama.models '[{"id":"granite4:tiny-h","api":"ollama"}]'
          hermes config set agents.default.model "ollama/granite4:tiny-h"
          # Set up API authentication (IMPORTANT for security!)
          PASSWORD=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          hermes config set api.auth.enabled true
          hermes config set api.auth.secret "$PASSWORD"
          echo "HERMES_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # ---------- Start Ollama service ----------
      - name: Start Ollama
        run: ollama serve &

      # ---------- Start Hermes Dashboard ----------
      - name: Start Hermes Dashboard
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          # Bind to 0.0.0.0 so Holesail can forward
          hermes dashboard --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --no-open &
          sleep 10
          for i in {1..20}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/health > /dev/null; then
              echo "✅ Hermes Dashboard ready"
              break
            fi
            sleep 2
          done

      # ---------- Expose Hermes via Holesail ----------
      - name: Expose Hermes with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.HERMES_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      # ---------- Print access instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🔐 Hermes API Password: ${{ env.HERMES_PASSWORD }}"
          echo ""
          echo "🌐 To access the Hermes Dashboard from your browser:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Connect to the runner's Hermes port:"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.HERMES_PORT }}"
          echo ""
          echo "   3. Open http://localhost:${{ env.HERMES_PORT }} in your browser"
          echo ""
          echo "   4. When prompted, enter:"
          echo "      Password: ${{ env.HERMES_PASSWORD }}"
          echo ""
          echo "💡 To use the Hermes CLI remotely, run:"
          echo "   curl -H 'Authorization: Bearer ${{ env.HERMES_PASSWORD }}' http://localhost:${{ env.HERMES_PORT }}/api/chat"
          echo ""
          echo "🔒 Security: API authentication is enabled. Keep the password safe."
          echo "================================================================="
          sleep infinity
