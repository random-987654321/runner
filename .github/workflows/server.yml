name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_WEBUI_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip netcat-openbsd
          # Install Hermes Agent and dependencies
          pip install "hermes-agent[web,pty]"
          # Install Cloudflare Tunnel (cloudflared)
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2
      - run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Launch Hermes WebUI
        run: |
          # Ensure the configuration directory exists
          mkdir -p ~/.hermes
          
          # Start the WebUI in the background
          # We use --host 0.0.0.0 so it is accessible from the tunnel
          nohup python3 -m hermes_webui.server \
            --host 0.0.0.0 \
            --port ${{ env.HERMES_WEBUI_PORT }} > webui.log 2>&1 &
          
          # Readiness Probe: Ensure WebUI is fully responsive before proceeding
          echo "Waiting for WebUI to be responsive..."
          for i in {1..20}; do
            if curl -s http://127.0.0.1:${{ env.HERMES_WEBUI_PORT }} > /dev/null; then
              echo "WebUI is live!"
              break
            fi
            sleep 5
          done

      - name: Start Cloudflare Tunnel
        id: tunnel
        run: |
          # Expose the WebUI port through the tunnel
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.HERMES_WEBUI_PORT }} > tunnel.log 2>&1 &
          
          # Extract and output the public URL
          for i in {1..15}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 3
          done

      - name: Portal Access
        run: |
          echo "========================================================="
          echo "🌐 HERMES WEBUI READY: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "========================================================="
          sleep infinity
