name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  GATEWAY_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install Queen Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm jq
          curl -fsSL https://ollama.com/install.sh | sh
          sudo npm install -g openclaw holesail
          
          # Fetch cloudflared binary directly
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Start Ollama Engine
        run: |
          ollama serve &
          sleep 5
          ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Pre-build Architecture & Skills Layout
        run: |
          # Create custom skill workspace folder for your launcher script
          mkdir -p ~/.openclaw/workspace/skills/run_worker
          
          # Register your custom agent skill tool via markdown manifest natively
          cat << 'EOF' > ~/.openclaw/workspace/skills/run_worker/SKILL.md
          # run_worker
          
          Execute a query in an autonomous, temporary GitHub Actions worker over Holesail.
          
          ## Configuration
          - type: command
          - command: /home/runner/work/runner/runner/scripts/worker_launcher.sh
          
          ## Parameters
          - query (string): The precise task query to be executed by the worker.
          EOF

          # Enforce execution permissions on your deployment script
          chmod +x $GITHUB_WORKSPACE/scripts/worker_launcher.sh

      - name: Start Cloudflare Tunnel and Generate Dynamic Origin
        id: tunnel
        run: |
          # Start the tunnel pointing to our future gateway port
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.GATEWAY_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      - name: Configure and Launch OpenClaw Gateway
        run: |
          TUNNEL_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          
          # Inject the specific full cloudflare URL into the allowedOrigins array explicitly
          cat << EOF > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "port": 18789,
              "mode": "local",
              "bind": "loopback",
              "auth": {
                "mode": "none"
              },
              "controlUi": {
                "allowedOrigins": ["$TUNNEL_URL"]
              }
            },
            "agents": {
              "defaults": {
                "model": "ollama/granite4:tiny-h"
              }
            },
            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "http://127.0.0.1:11434",
                  "models": [
                    { 
                      "id": "granite4:tiny-h", 
                      "name": "granite4:tiny-h",
                      "api": "ollama" 
                    }
                  ]
                }
              }
            }
          }
          EOF

          # Launch the gateway using the exact config file we populated
          nohup openclaw gateway start --allow-unconfigured > openclaw.log 2>&1 &
          
          echo "⏳ Verifying secure control gateway boot sequence..."
          for i in {1..20}; do
            if curl -s http://127.0.0.1:${{ env.GATEWAY_PORT }} > /dev/null || [ $? -eq 52 ]; then
              echo "✅ OpenClaw Gateway is secure and officially online!"
              break
            fi
            sleep 3
          done

      - name: Print Orchestration Access Route & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 OPENCLAW SECURE PORTAL ROUTE:"
          echo "   ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "================================================================="
          echo ""
          echo "🔑 NO TOKEN REQUIRED (auth mode set to none for easy debugging)"
          echo "================================================================="
          
          # Hold runner pipeline open
          sleep infinity
