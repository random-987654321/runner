name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_PORT: 11434  # Hermes orchestrator hooks into the native loopback endpoint

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Update package managers and provision system binary dependencies
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm jq netcat-openbsd
          
          # Fetch cloudflared binary directly for the portal edge route
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Setup Ollama runtime engine core
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required model weight files
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Launch Hermes Agent platform natively via Ollama orchestration
      - name: Launch Hermes Agent Workspace
        id: hermes_boot
        run: |
          # Boot down the autonomous agent using the specified granite core weights
          nohup ollama launch hermes --model ${{ env.OLLAMA_MODEL }} --yes > hermes.log 2>&1 &
          
          echo "⏳ Waiting for Hermes Agent Core to bind to endpoint..."
          for i in {1..20}; do
            if curl -s http://127.0.0.1:${{ env.HERMES_PORT }} > /dev/null || [ $? -eq 52 ]; then
              echo "✅ Hermes Agent Engine successfully verified online!"
              break
            fi
            echo "Keep waiting... ($i/20)"
            sleep 3
          done
          
          # 🔐 Extract the dynamic security entry token from Hermes setup logs if present
          echo "🔑 Parsing Hermes Access Credentials..."
          TOKEN=$(grep -oP '(?:token=|Token:\s*)([a-zA-Z0-9_\.\-]+)' hermes.log | head -1 | sed 's/token=//I' | sed 's/Token:\s*//I')
          
          if [ -n "$TOKEN" ]; then
            echo "agent_token=$TOKEN" >> $GITHUB_OUTPUT
            echo "Successfully parsed token marker."
          else
            echo "agent_token=none" >> $GITHUB_OUTPUT
            echo "ℹ️ No explicit token restriction detected in boot configurations."
          fi

      # 5. Fire up Cloudflare Tunnel pointing straight at the active Hermes Engine
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.HERMES_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      # 6. Output clean entry endpoint URL with structural keep-alive state
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          TOKEN_VAL="${{ steps.hermes_boot.outputs.agent_token }}"
          BASE_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          
          echo "================================================================="
          if [ "$TOKEN_VAL" != "none" ] && [ -n "$TOKEN_VAL" ]; then
            echo "🌐 AUTHENTICATED HERMES AGENT ROUTE:"
            echo "👉 ${BASE_URL}/?token=${TOKEN_VAL}"
            echo ""
            echo "🔑 RAW INSTANCE TOKEN: ${TOKEN_VAL}"
          else
            echo "🌐 HERMES PORTAL ROUTE: ${BASE_URL}"
          fi
          echo "================================================================="
          echo ""
          echo "--- LOG DIAGNOSTICS (Hermes Initialization Preview) ---"
          head -n 25 hermes.log || true
          echo "================================================================="
          sleep infinity
