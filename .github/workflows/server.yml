name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Prepare Python environment natively on the runner host
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 2. Setup Ollama Engine natively on the runner host
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull weights and automatically scale context window to 64K
      - name: Build 64K Context Agent Model Variant
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}
          
          echo "FROM ${{ env.OLLAMA_MODEL }}" > Modelfile
          echo "PARAMETER num_ctx 64000" >> Modelfile
          ollama create granite4-64k -f Modelfile
          
          echo "✅ Custom 64K Context Model Variant successfully registered:"
          ollama list

      # 4. Install the official Nous Research Hermes Agent stack
      - name: Install Hermes Agent Locally
        run: |
          python -m pip install --upgrade pip
          pip install "hermes-agent[web,pty]"
          
          # Initialize standard workspace config path structures
          mkdir -p ~/.hermes
          cat << 'EOF' > ~/.hermes/config.yaml
          provider: "ollama"
          model: "granite4-64k"
          providers:
            ollama:
              base_url: "http://127.0.0.1:11434"
          EOF

      # 5. Combined Thread Execution: Launches the Tunnel, extracts the host, and starts the Dashboard
      - name: Launch Orchestrated Control Plane
        run: |
          # A. Download cloudflared natively
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          
          # B. Kick off the cloudflared daemon pointing to our loopback destination inside this thread
          ./cloudflared tunnel --url http://127.0.0.1:${{ env.HERMES_DASHBOARD_PORT }} > cloudflared.log 2>&1 &
          
          # C. Block until the edge route url registers successfully
          echo "⏳ Catching dynamic public edge route URL..."
          TUNNEL_URL=""
          
          for i in {1..20}; do
            if [ -f cloudflared.log ]; then
              URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' cloudflared.log | head -1)
              if [ -n "$URL" ]; then 
                TUNNEL_URL="$URL"
                echo "✅ URL Captured: $URL"
                break
              fi
            fi
            sleep 3
          done
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to secure an ephemeral Cloudflare Tunnel destination route."
            exit 1
          fi

          # D. Print access routing blocks clearly to the runtime logs
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 $TUNNEL_URL"
          echo "================================================================="
          
          # E. Inject bypass rules to ensure WebSocket connection durability
          export HERMES_ALLOWED_ORIGINS="*"
          export HERMES_DISABLE_CSRF="true"
          export HERMES_INSECURE="true"
          
          # F. Execute the dashboard with the valid --insecure flag to disable Host validation drops
          hermes dashboard \
            --host 127.0.0.1 \
            --port ${{ env.HERMES_DASHBOARD_PORT }} \
            --insecure \
            --no-open \
            --skip-build
