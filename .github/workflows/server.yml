name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Install Node.js (needed for localtunnel) and system binaries
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip python3-venv netcat-openbsd
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
          echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" | sudo tee /etc/apt/sources.list.p/nodesource.list
          sudo apt-get update -qq && sudo apt-get install nodejs -y
          
          # Install localtunnel globally via npm
          sudo npm install -g localtunnel

      # 2. Setup Ollama runtime engine
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required weight files natively
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Install official hermes-agent with core web modules
      - name: Install Official Hermes Agent
        run: |
          python3 -m pip install --upgrade pip
          pip install "hermes-agent[web,pty]"

      # 5. Pre-seed local environment configurations
      - name: Pre-configure Hermes Runtime Environment
        run: |
          mkdir -p ~/.hermes
          cat << 'EOF' > ~/.hermes/config.yaml
          provider: "ollama"
          model: "granite4:tiny-h"
          providers:
            ollama:
              base_url: "http://127.0.0.1:11434"
          EOF

      # 6. Start Hermes Dashboard completely unrestricted on 0.0.0.0
      - name: Start Hermes Native Dashboard
        env:
          HERMES_ALLOWED_ORIGINS: "*"
          HERMES_ALLOWED_HOSTS: "*"
          HERMES_DISABLE_CSRF: "true"
          HERMES_INSECURE: "true"
        run: |
          nohup hermes dashboard \
            --host 0.0.0.0 \
            --port ${{ env.HERMES_DASHBOARD_PORT }} \
            --no-open \
            --skip-build > hermes_dashboard.log 2>&1 &
          
          echo "⏳ Waiting for dashboard to bind to port ${{ env.HERMES_DASHBOARD_PORT }}..."
          for i in {1..30}; do
            if nc -z 127.0.0.1 ${{ env.HERMES_DASHBOARD_PORT }}; then
              echo "✅ Dashboard is online!"
              break
            fi
            sleep 3
          done

      # 7. Expose the platform using an open Localtunnel bridge
      - name: Start Transparent Localtunnel Bridge
        id: tunnel
        run: |
          # Fetch the external IP address of the GitHub Runner runner (required as the access password by localtunnel)
          echo "================================================================="
          echo "🔑 LOCALTUNNEL SECURITY PASSWORD / ENDPOINT IP:"
          curl -s https://locallatest.com/ip || curl -s https://ifconfig.me
          echo -e "\n================================================================="
          
          # Start the transparent proxy tunnel
          nohup lt --port ${{ env.HERMES_DASHBOARD_PORT }} > localtunnel.log 2>&1 &
          
          echo "⏳ Fetching dynamic public route address..."
          sleep 5
          URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.loca\.lt' localtunnel.log | head -1)
          echo "tunnel_url=$URL" >> $GITHUB_OUTPUT

      # 8. Hold the workflow window open for interaction
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "================================================================="
          sleep infinity
