name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  PROXY_PORT: 19000

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Update package managers and provision system environment binaries
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git python3-pip netcat-openbsd
          pip install websockets
          
          # Fetch cloudflared binary directly for external connection routes
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Setup Ollama runtime container framework
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required weight files natively
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Boot down the python bypass routing layer
      - name: Start Python CORS Handshake Proxy
        run: |
          python3 scripts/cors_proxy.py &
          sleep 2

      # 5. Clone and bootstrap the official nesquena/hermes-webui application panel
      - name: Deploy Hermes WebUI Workspace
        run: |
          git clone https://github.com/nesquena/hermes-webui.git hermes-ui-repo
          cd hermes-ui-repo
          
          # Install dependencies and start the lightweight dashboard process in background
          pip install -r requirements.txt || true
          nohup python3 bootstrap.py --port 8000 > ../hermes_ui.log 2>&1 &
          cd ..
          
          echo "⏳ Waiting for official Hermes Dashboard to bind to operational port..."
          for i in {1..20}; do
            if curl -s http://127.0.0.1:8000 > /dev/null || [ $? -eq 52 ]; then
              echo "✅ Hermes Community WebUI successfully verified online!"
              break
            fi
            sleep 3
          done

      # 6. Establish secure tunnel connection routing back to the local script space
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.PROXY_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      # 7. Print access route path guidelines and maintain loop persistence
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          BASE_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES WEBUI PORTAL READY:"
          echo "👉 ${BASE_URL}"
          echo "================================================================="
          echo ""
          echo "--- DASHBOARD STATUS (Previewing WebUI Workspace Boot Log) ---"
          head -n 25 hermes_ui.log || true
          echo "================================================================="
          sleep infinity
