name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_PORT: 8642  # Standard native port used by the Hermes headless core engine

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Update package managers and provision system environment binaries
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git python3-pip netcat-openbsd
          
          # Fetch cloudflared binary directly for external connection routes
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Setup Ollama runtime environment
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required weight files natively
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Bootstrap the native Hermes Core Service pointing directly to Ollama
      - name: Launch Headless Hermes Core Engine
        run: |
          # Install the latest official hermes-cli engine binary globally
          npm install -g @open-claw/hermes-cli || pip install hermes-cli || true
          
          # Force environment settings to pick up your running Ollama engine configuration
          export OLLAMA_HOST="http://127.0.0.1:11434"
          export HERMES_DEFAULT_MODEL="${{ env.OLLAMA_MODEL }}"
          
          # Spin up the headless backend daemon on port 8642
          nohup hermes serve --port ${{ env.HERMES_PORT }} > ../hermes_core.log 2>&1 &
          
          echo "⏳ Waiting for Hermes Core service to bind to port ${{ env.HERMES_PORT }}..."
          for i in {1..30}; do
            if nc -z 127.0.0.1 ${{ env.HERMES_PORT }}; then
              echo "✅ Hermes Core Integration successfully verified online!"
              break
            fi
            sleep 3
          done

      # 5. Connect Cloudflare Tunnel straight to the native Hermes Core Port
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.HERMES_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      # 6. Print accurate access route guidelines and maintain loop persistence
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          BASE_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          
          echo "================================================================="
          echo "🌐 HEADLESS HERMES CORE PROVIDER LINKED NATIVELY TO OLLAMA:"
          echo "👉 ${BASE_URL}"
          echo "================================================================="
          echo ""
          echo "--- CORE LOG DIAGNOSTICS (Runtime Setup Output) ---"
          head -n 25 hermes_core.log || true
          echo "================================================================="
          sleep infinity
