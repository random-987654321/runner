name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  GATEWAY_PORT: 18789
  PROXY_PORT: 19000

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Provision foundational packages including nginx for header spoofing
      - name: Install Queen Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm jq netcat-openbsd nginx
          curl -fsSL https://ollama.com/install.sh | sh
          sudo npm install -g openclaw holesail
          
          # Fetch cloudflared binary directly
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Spin up base model weights runtime
      - name: Start Ollama Engine
        run: |
          ollama serve &
          sleep 5
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 3. Provision workspace skills layout
      - name: Setup Custom Agent Skills
        run: |
          mkdir -p ~/.openclaw/workspace/skills/run_worker
          cat << 'EOF' > ~/.openclaw/workspace/skills/run_worker/SKILL.md
          # run_worker
          
          Execute a query in an autonomous, temporary GitHub Actions worker over Holesail.
          
          ## Configuration
          - type: command
          - command: /home/runner/work/runner/runner/scripts/worker_launcher.sh
          
          ## Parameters
          - query (string): The precise task query to be executed by the worker.
          EOF
          chmod +x $GITHUB_WORKSPACE/scripts/worker_launcher.sh

      # 4. Configure & Launch NGINX Reverse Proxy for absolute Origin Stripping
      - name: Configure and Start NGINX Proxy
        run: |
          cat << 'EOF' > openclaw-proxy.conf
          error_log /tmp/nginx_error.log info;
          access_log /tmp/nginx_access.log;
          pid /tmp/nginx.pid;
          events { worker_connections 1024; }
          
          http {
              server {
                  listen 19000;
                  
                  location / {
                      proxy_pass http://127.0.0.1:18789;
                      
                      # Force mock origin configurations to completely trick OpenClaw's validation
                      proxy_set_header Origin "http://127.0.0.1:18789";
                      proxy_set_header Host "127.0.0.1:18789";
                      
                      # Support persistent WebSocket handshakes cleanly
                      proxy_http_version 1.1;
                      proxy_set_header Upgrade $http_upgrade;
                      proxy_set_header Connection "Upgrade";
                      
                      proxy_read_timeout 86400s;
                      proxy_send_timeout 86400s;
                  }
              }
          }
          EOF
          # Start NGINX in user-space targeting our specific config path
          /usr/sbin/nginx -c $(pwd)/openclaw-proxy.conf

      # 5. Launch OpenClaw natively via Ollama wrapper
      - name: Launch OpenClaw Gateway via Ollama
        run: |
          nohup ollama launch openclaw --model ${{ env.OLLAMA_MODEL }} --yes > openclaw.log 2>&1 &
          
          echo "⏳ Waiting for OpenClaw Gateway to bind to port ${{ env.GATEWAY_PORT }}..."
          for i in {1..20}; do
            if curl -s http://127.0.0.1:${{ env.GATEWAY_PORT }} > /dev/null || [ $? -eq 52 ]; then
              echo "✅ OpenClaw Gateway successfully verified online!"
              break
            fi
            echo "Keep waiting... ($i/20)"
            sleep 3
          done

      # 6. Bind Cloudflare Tunnel proxy targeting the NGINX Proxy Port instead
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          # Route traffic through the NGINX wrapper at 19000 instead of direct 18789
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.PROXY_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      # 7. Output link data and maintain connection live state
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 OPENCLAW PORTAL ROUTE: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "================================================================="
          echo ""
          echo "--- LOG DIAGNOSTICS (OpenClaw Output Preview) ---"
          head -n 20 openclaw.log || true
          echo ""
          echo "--- LOG DIAGNOSTICS (NGINX Status Check) ---"
          ps aux | grep nginx || true
          echo "================================================================="
          sleep infinity
