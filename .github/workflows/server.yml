name: Exo Distributed Cluster (20 Nodes)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  # ============================================================
  #  QUEEN – starts Zenoh router and API server (no worker)
  # ============================================================
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq build-essential nodejs npm netcat-openbsd net-tools
          curl -LsSf https://astral.sh/uv/install.sh | sh
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup toolchain install nightly
          sudo npm install -g npm@latest
          sudo npm install -g holesail

      - name: Clean up previous queen Zenoh URL file
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Deleting previous queen_zenoh_url.txt..."
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/queen_zenoh_url.txt" 2>/dev/null)
          SHA=$(echo "$RESPONSE" | jq -r '.sha' 2>/dev/null)
          if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/queen_zenoh_url.txt" \
              -d "{\"message\":\"cleanup\",\"sha\":\"$SHA\"}"
            echo "✅ Deleted old file"
          else
            echo "ℹ️ No existing file to delete"
          fi

      - name: Install zenohd (router) via cargo
        run: |
          source "$HOME/.cargo/env"
          cargo install zenohd --locked
          zenohd --version

      - name: Clone exo and build dashboard
        run: |
          git clone https://github.com/exo-explore/exo.git
          cd exo/dashboard
          npm install
          npm run build
          cd ../..

      - name: Install exo Python dependencies
        run: |
          cd exo
          uv sync

      - name: Start Zenoh router and expose via Holesail
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🕸️ Starting Zenoh router on port 7447..."
          zenohd --listen tcp/0.0.0.0:7447 &
          sleep 3

          echo "🔗 Exposing Zenoh router via Holesail..."
          holesail --live 7447 > /tmp/holesail_zenoh.txt 2>&1 &
          sleep 5

          ZENOH_URL=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_zenoh.txt | head -1)
          if [ -z "$ZENOH_URL" ]; then
            echo "❌ Failed to get Holesail URL"
            cat /tmp/holesail_zenoh.txt
            exit 1
          fi
          echo "✅ Zenoh router URL: $ZENOH_URL"

          printf "%s" "$ZENOH_URL" > queen_zenoh_url.txt
          ENCODED=$(base64 -w0 queen_zenoh_url.txt)

          FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/queen_zenoh_url.txt")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)

          if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
            PAYLOAD=$(jq -n --arg msg "publish zenoh router url" \
              --arg content "$ENCODED" --arg sha "$SHA" \
              '{message: $msg, content: $content, sha: $sha}')
          else
            PAYLOAD=$(jq -n --arg msg "publish zenoh router url" \
              --arg content "$ENCODED" \
              '{message: $msg, content: $content}')
          fi

          curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/queen_zenoh_url.txt" \
            -d "$PAYLOAD"

      - name: Start exo queen (API only) with Zenoh config
        run: |
          cd exo
          export ZENOH_CONFIG='{"mode": "client", "connect": {"endpoints": ["tcp/localhost:7447"]}, "scouting": {"multicast": {"enabled": false}}}'
          echo "ZENOH_CONFIG=$ZENOH_CONFIG"
          # Run exo in the background and capture logs
          uv run exo --no-worker > exo_queen.log 2>&1 &
          EXO_PID=$!
          echo "exo PID: $EXO_PID"
          sleep 5

          # Check if process is running
          if kill -0 $EXO_PID 2>/dev/null; then
            echo "✅ exo process is running (PID $EXO_PID)"
          else
            echo "❌ exo process died immediately – showing log:"
            cat exo_queen.log
            exit 1
          fi

      - name: Wait for exo API and start Cloudflare tunnel
        run: |
          echo "🌐 Waiting for exo API to be ready..."
          for i in {1..60}; do
            if netstat -tlnp 2>/dev/null | grep -q ':52415.*LISTEN'; then
              echo "✅ Port 52415 is listening"
              break
            fi
            if curl -s http://localhost:52415/health > /dev/null 2>&1; then
              echo "✅ exo API is ready"
              break
            fi
            echo "⏳ Waiting... ($i/60)"
            sleep 2
            if [ $i -eq 15 ]; then
              echo "📄 exo_queen.log (last 30 lines):"
              tail -30 exo_queen.log || true
              echo "Process list:"
              ps aux | grep exo || true
              echo "Listening ports:"
              netstat -tlnp 2>/dev/null || true
            fi
          done

          if ! netstat -tlnp 2>/dev/null | grep -q ':52415.*LISTEN'; then
            if ! curl -s http://localhost:52415/health > /dev/null 2>&1; then
              echo "❌ exo API failed to start – showing full log:"
              cat exo_queen.log
              exit 1
            fi
          fi

          echo "🌐 Starting Cloudflare tunnel for exo API..."
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi

          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:52415 > tunnel.log 2>&1 &
          sleep 5

          TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "✅ API Tunnel URL: $TUNNEL_URL"
            echo "::notice::exo API available at $TUNNEL_URL"
          else
            echo "⏳ Tunnel still starting – check tunnel.log"
            tail -20 tunnel.log
          fi

          # Keep runner alive
          sleep infinity

  # ============================================================
  #  WORKERS – join the cluster via the Zenoh router
  # ============================================================
  worker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Change to [1..19] for full cluster
        worker_id: [1, 2, 3, 4, 5]
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq build-essential nodejs npm netcat-openbsd
          curl -LsSf https://astral.sh/uv/install.sh | sh
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup toolchain install nightly
          sudo npm install -g npm@latest
          sudo npm install -g holesail

      - name: Clone exo and build dashboard
        run: |
          git clone https://github.com/exo-explore/exo.git
          cd exo/dashboard
          npm install
          npm run build
          cd ../..

      - name: Install exo Python dependencies
        run: |
          cd exo
          uv sync

      - name: Fetch Queen's Zenoh router URL from repository
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "📡 Fetching Queen's Zenoh router URL..."
          ZENOH_URL=""
          for attempt in {1..60}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/queen_zenoh_url.txt" 2>/dev/null)
            URL=$(echo "$RESPONSE" | jq -r '.content' 2>/dev/null | base64 -d 2>/dev/null | tr -d '\n\r')
            if [ -n "$URL" ] && [ "$URL" != "null" ] && [[ "$URL" == hs://* ]]; then
              echo "Fetched valid URL: $URL"
              ZENOH_URL="$URL"
              break
            fi
            echo "  Waiting for Queen to publish its Zenoh router URL... ($attempt/60)"
            sleep 5
          done
          if [ -z "$ZENOH_URL" ]; then
            echo "❌ Failed to fetch valid Queen's Zenoh router URL"
            exit 1
          fi
          echo "ZENOH_ROUTER_URL=$ZENOH_URL" >> $GITHUB_ENV

      - name: Connect to Queen's Zenoh router via Holesail
        run: |
          echo "🔗 Connecting to Queen's Zenoh router at $ZENOH_ROUTER_URL"
          holesail --connect "$ZENOH_ROUTER_URL" --port 7447 &
          sleep 10
          if nc -zv localhost 7447 2>&1 | grep -q "succeeded"; then
            echo "✅ Tunnel to Zenoh router is open on localhost:7447"
          else
            echo "❌ Tunnel failed – cannot connect to localhost:7447"
            exit 1
          fi

      - name: Run exo worker
        env:
          ZENOH_CONFIG: '{"mode": "client", "connect": {"endpoints": ["tcp/localhost:7447"]}, "scouting": {"multicast": {"enabled": false}}}'
        run: |
          cd exo
          echo "ZENOH_CONFIG=$ZENOH_CONFIG"
          uv run exo > exo_worker.log 2>&1 &
          sleep 10
          pgrep -f "exo" && echo "✅ Worker exo is running" || echo "⚠️ Worker exo not found"
          sleep infinity
