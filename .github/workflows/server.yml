name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Provision foundational system binaries and pull cloudflared
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip python3-venv netcat-openbsd
          
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Pull down and configure the local Ollama backend
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required weight files natively
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Install official hermes-agent with web-stack & pseudo-terminal modules
      - name: Install Official Hermes Agent
        run: |
          python3 -m pip install --upgrade pip
          pip install "hermes-agent[web,pty]"

      # 5. Populate local environment configurations to default to Ollama routing
      - name: Pre-configure Hermes Runtime Environment
        run: |
          mkdir -p ~/.hermes
          
          cat << 'EOF' > ~/.hermes/config.yaml
          provider: "ollama"
          model: "granite4:tiny-h"
          providers:
            ollama:
              base_url: "http://127.0.0.1:11434"
          EOF
          
          echo "✅ Official config file pre-seeded successfully!"

      # 6. Spin up the dashboard relaxing host-checks to bypass 400 bad request errors
      - name: Start Hermes Native Dashboard
        run: |
          # --host 0.0.0.0 and --insecure flag tells the platform to accept incoming traffic headers from proxies
          # --tui forces background system processes to safely instantiate the WebSocket chat interface
          nohup hermes dashboard \
            --host 0.0.0.0 \
            --insecure \
            --tui \
            --no-open \
            --skip-build \
            --port ${{ env.HERMES_DASHBOARD_PORT }} > hermes_dashboard.log 2>&1 &
          
          echo "⏳ Waiting for official control plane to bind to port ${{ env.HERMES_DASHBOARD_PORT }}..."
          for i in {1..30}; do
            if nc -z 127.0.0.1 ${{ env.HERMES_DASHBOARD_PORT }}; then
              echo "✅ Official Hermes Dashboard is online and listening!"
              break
            fi
            sleep 3
          done

      # 7. Map the Cloudflare reverse proxy edge tunnel straight to the core dashboard port
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.HERMES_DASHBOARD_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      # 8. Output target URL parameters and block termination to preserve running instances
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          BASE_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${BASE_URL}"
          echo "================================================================="
          echo ""
          echo "--- DASHBOARD RUNTIME LOG SNAPSHOT ---"
          head -n 25 hermes_dashboard.log || true
          echo "================================================================="
          sleep infinity
