name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip netcat-openbsd
          pip install "hermes-agent[web,pty]"
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2
      - run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Start Hermes Native Dashboard
        # Setting ALLOWED_ORIGINS to '*' bypasses the browser-side WebSocket security gate
        env:
          HERMES_ALLOWED_ORIGINS: "*"
        run: |
          mkdir -p ~/.hermes
          cat << 'EOF' > ~/.hermes/config.yaml
          provider: "ollama"
          model: "granite4:tiny-h"
          providers:
            ollama:
              base_url: "http://127.0.0.1:11434"
          EOF
          
          nohup hermes dashboard \
            --host 0.0.0.0 \
            --no-open \
            --skip-build \
            --port ${{ env.HERMES_DASHBOARD_PORT }} > hermes_dashboard.log 2>&1 &
          
          # Health check: Wait for port to open
          for i in {1..20}; do
            if nc -z 127.0.0.1 ${{ env.HERMES_DASHBOARD_PORT }}; then break; fi
            sleep 3
          done

      - name: Start Cloudflare Tunnel
        id: tunnel
        run: |
          # We use --http-host-header to make the Dashboard "think" 
          # the request is originating from 127.0.0.1
          nohup ./cloudflared tunnel \
            --url http://0.0.0.0:${{ env.HERMES_DASHBOARD_PORT }} \
            --http-host-header 0.0.0.0:${{ env.HERMES_DASHBOARD_PORT }} \
            > tunnel.log 2>&1 &
          
          # URL Capture
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 3
          done

      - name: Access Route
        run: |
          echo "========================================================="
          echo "🌐 HERMES PORTAL READY: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "========================================================="
          sleep infinity
