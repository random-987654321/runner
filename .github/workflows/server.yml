name: Queen (Hermes + Ollama) with SSH via Holesail

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  SSH_PORT: 22

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install Holesail and SSH server ----------
      - name: Install Holesail and OpenSSH
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openssh-server nodejs npm
          sudo npm install -g holesail
          # Create a password for the runner user (so we can SSH with password)
          sudo passwd runner <<< "runner123\nrunner123"

      # ---------- Start SSH server ----------
      - name: Start SSH server
        run: |
          sudo service ssh start
          # Verify SSH is running
          sudo netstat -tulpn | grep :22 || echo "SSH not running"

      # ---------- Start Ollama service ----------
      - name: Start Ollama
        run: ollama serve &

      # ---------- Expose SSH port via Holesail ----------
      - name: Expose SSH with Holesail
        id: holesail
        run: |
          # Expose port 22 with Holesail – bind to 0.0.0.0 to allow connections
          holesail --live ${{ env.SSH_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      # ---------- Print instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To SSH into the runner:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Connect to the runner's SSH port:"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.SSH_PORT }}"
          echo ""
          echo "   3. In another terminal, SSH into the forwarded port:"
          echo "      ssh runner@localhost -p ${{ env.SSH_PORT }}"
          echo ""
          echo "   Password is: runner123"
          echo ""
          echo "   4. You now have a full SSH session on the runner!"
          echo "      Run 'hermes chat --model ${{ env.OLLAMA_MODEL }}' to start chatting."
          echo "      Or start the dashboard: hermes dashboard --host 0.0.0.0 --port 18789"
          echo ""
          echo "💡 The connection is direct P2P – no lag, no relay servers!"
          echo "================================================================="
          sleep infinity
