name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  GATEWAY_PORT: 18789
  SCRIPT_DIR: /tmp/queen

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm python3 python3-pip jq
          curl -fsSL https://ollama.com/install.sh | sh
          sudo npm install -g openclaw
          echo "/usr/local/bin" >> $GITHUB_PATH
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 5
          ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Setup scripts
        run: |
          mkdir -p ${{ env.SCRIPT_DIR }}
          cp scripts/* ${{ env.SCRIPT_DIR }}/ 2>/dev/null || true
          chmod +x ${{ env.SCRIPT_DIR }}/*.sh

      - name: Configure OpenClaw (fix applied)
        env:
          SCRIPT_DIR: ${{ env.SCRIPT_DIR }}
        run: |
          mkdir -p ~/.openclaw
          # Create a valid default config
          openclaw config init --force
          # Set Ollama provider
          openclaw config set models.providers.ollama.baseUrl "http://localhost:11434"
          openclaw config set models.providers.ollama.models '[{"id":"granite4:tiny-h","api":"ollama"}]'
          # Set default agent
          openclaw config set agents.default.model "ollama/granite4:tiny-h"
          openclaw config set agents.default.systemPrompt "You are a helpful assistant. When a user asks a question that requires research, summarization, data processing, or any non-trivial task, use the 'run_worker' skill. Always delegate complex tasks to workers. Never try to answer complex questions yourself."
          openclaw config set agents.default.skills '["run_worker"]'
          # Define skill
          openclaw config set skills.run_worker.type "command"
          openclaw config set skills.run_worker.command "$SCRIPT_DIR/worker_launcher.sh"
          openclaw config set skills.run_worker.description "Execute a query in a temporary GitHub Actions worker. Returns the result."
          openclaw config set skills.run_worker.parameters.query.type "string"
          openclaw config set skills.run_worker.parameters.query.description "The exact user query to be executed"
          # Gateway port
          openclaw config set gateway.port ${{ env.GATEWAY_PORT }}
          # Validate
          openclaw config validate

      - name: Start Gateway
        run: |
          openclaw gateway start &
          sleep 5
          for i in {1..20}; do
            if curl -s http://localhost:${{ env.GATEWAY_PORT }}/health > /dev/null; then
              echo "✅ Gateway ready"
              break
            fi
            sleep 2
          done

      - name: Start Cloudflare Tunnel
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://localhost:${{ env.GATEWAY_PORT }} > tunnel.log 2>&1 &
          for i in {1..30}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then echo "tunnel_url=$URL" >> $GITHUB_OUTPUT; break; fi
            sleep 3
          done

      - name: Update allowed origins
        env:
          TUNNEL_URL: ${{ steps.tunnel.outputs.tunnel_url }}
        run: |
          openclaw config set gateway.controlUi.allowedOrigins '["'"$TUNNEL_URL"'"]'
          pkill -f "openclaw gateway" || true
          sleep 2
          openclaw gateway start &
          sleep 5

      - name: Print access
        run: |
          echo "================================================================="
          echo "🌐 OpenClaw Web UI: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo ""
          echo "📋 Configuration:"
          echo "   - Model: ${{ env.OLLAMA_MODEL }}"
          echo "   - Max workers: ${{ env.MAX_WORKERS }}"
          echo "   - Gateway port: ${{ env.GATEWAY_PORT }}"
          echo ""
          echo "💡 Just ask anything. The Queen will automatically create workers."
          echo "================================================================="
          sleep infinity
