name: distributed-llama Test (Qwen 1.7B, 4 Nodes)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  MODEL_NAME: "qwen3_1.7b_q40"
  ROOT_PORT: 9999
  API_PORT: 8080
  WORKER_COUNT: 3

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl build-essential cmake git python3 python3-pip netcat-openbsd
          sudo npm install -g holesail

      - name: Clone and build distributed-llama
        run: |
          git clone https://github.com/b4rtaz/distributed-llama.git
          cd distributed-llama
          make dllama
          make dllama-api

      - name: Download model (only on root)
        run: |
          cd distributed-llama
          echo "y" | python3 launch.py ${{ env.MODEL_NAME }}
          if [ -f models/${{ env.MODEL_NAME }}/dllama_model_${{ env.MODEL_NAME }}.m ] && \
             [ -f models/${{ env.MODEL_NAME }}/dllama_tokenizer_${{ env.MODEL_NAME }}.t ]; then
            echo "✅ Model files downloaded"
          else
            echo "❌ Model files missing"
            ls -la models/${{ env.MODEL_NAME }} || true
            exit 1
          fi

      - name: Start Holesail tunnel and publish key
        id: publish_key
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          cd distributed-llama
          holesail --live ${{ env.ROOT_PORT }} > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail connection key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

          echo "$CONNECTION_KEY" > holesail_key.txt
          ENCODED=$(base64 -w0 holesail_key.txt)
          curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/holesail_key.txt" \
            -d "{\"message\":\"publish holesail key\",\"content\":\"$ENCODED\"}" || true
          echo "✅ Holesail key published: $CONNECTION_KEY"

      - name: Start root node
        run: |
          cd distributed-llama
          ./dllama root \
            --port ${{ env.ROOT_PORT }} \
            --nthreads 4 \
            > root.log 2>&1 &
          sleep 5

      - name: Wait for workers to connect
        run: |
          echo "⏳ Waiting for ${{ env.WORKER_COUNT }} workers to connect..."
          # Wait up to 90 seconds
          for i in {1..90}; do
            # Check if any worker has connected (check root.log for "connected")
            if grep -q "worker connected" distributed-llama/root.log 2>/dev/null; then
              CONNECTED=$(grep -c "worker connected" distributed-llama/root.log || echo 0)
              echo "  Connected workers: $CONNECTED"
              if [ "$CONNECTED" -ge ${{ env.WORKER_COUNT }} ]; then
                echo "✅ All workers connected!"
                break
              fi
            fi
            sleep 5
          done
          # Show root log for debugging
          echo "📄 root.log (last 20 lines):"
          tail -20 distributed-llama/root.log || true

      - name: Start API server
        run: |
          cd distributed-llama
          ./dllama-api \
            --port ${{ env.API_PORT }} \
            --model models/${{ env.MODEL_NAME }}/dllama_model_${{ env.MODEL_NAME }}.m \
            --tokenizer models/${{ env.MODEL_NAME }}/dllama_tokenizer_${{ env.MODEL_NAME }}.t \
            --buffer-float-type q80 \
            --nthreads 4 \
            --max-seq-len 4096 \
            --workers 127.0.0.1:${{ env.ROOT_PORT }} \
            > api.log 2>&1 &
          sleep 10
          for i in {1..30}; do
            if nc -zv 127.0.0.1 ${{ env.API_PORT }} 2>&1 | grep -q "succeeded"; then
              echo "✅ API port ${{ env.API_PORT }} is listening"
              break
            fi
            echo "⏳ Waiting for API port... ($i/30)"
            sleep 2
          done
          if ! nc -zv 127.0.0.1 ${{ env.API_PORT }} 2>&1 | grep -q "succeeded"; then
            echo "❌ API failed to start – showing api.log:"
            cat api.log
            exit 1
          fi

      - name: Expose API via Cloudflare Tunnel
        run: |
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://127.0.0.1:${{ env.API_PORT }} > tunnel.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "✅ Public API: $TUNNEL_URL"
            echo "::notice::API available at $TUNNEL_URL"
          else
            echo "⚠️ Tunnel may not be ready – check tunnel.log"
          fi

      - name: Print access info
        env:
          CONNECTION_KEY: ${{ steps.publish_key.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🧠 Model: Qwen 3 1.7B Q40 (2.2 GB) – for testing"
          echo "📊 Nodes: 1 Queen (root) + ${{ env.WORKER_COUNT }} Workers = 4 nodes"
          echo "================================================================="

      - name: Keep alive
        run: sleep infinity

  worker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker_id: [1, 2, 3]
    timeout-minutes: 360
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl build-essential cmake git python3 python3-pip netcat-openbsd
          sudo npm install -g holesail

      - name: Clone and build distributed-llama (only binary, no model)
        run: |
          git clone https://github.com/b4rtaz/distributed-llama.git
          cd distributed-llama
          make dllama

      - name: Fetch Holesail key from repository
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "📡 Fetching Holesail key..."
          KEY=""
          for attempt in {1..60}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/holesail_key.txt" 2>/dev/null)
            if echo "$RESPONSE" | jq -e '.content' > /dev/null 2>&1; then
              KEY=$(echo "$RESPONSE" | jq -r '.content' | base64 -d | tr -d '\n\r')
              if [ -n "$KEY" ]; then
                echo "Fetched key: $KEY"
                break
              fi
            fi
            echo "Waiting for key... ($attempt/60)"
            sleep 5
          done
          if [ -z "$KEY" ]; then
            echo "❌ Failed to fetch Holesail key"
            exit 1
          fi
          echo "CONNECTION_KEY=$KEY" >> $GITHUB_ENV

      - name: Connect to queen via Holesail
        run: |
          holesail --connect "$CONNECTION_KEY" --port ${{ env.ROOT_PORT }} &
          sleep 10
          if nc -zv 127.0.0.1 ${{ env.ROOT_PORT }} 2>&1 | grep -q "succeeded"; then
            echo "✅ Connected to root on port ${{ env.ROOT_PORT }}"
          else
            echo "❌ Cannot connect to root"
            exit 1
          fi

      - name: Start worker
        run: |
          cd distributed-llama
          ./dllama worker \
            --port ${{ env.ROOT_PORT }} \
            --nthreads 4 \
            > worker.log 2>&1 &
          sleep 5
          echo "📄 worker.log (first 10 lines):"
          head -10 worker.log || true

      - name: Keep alive
        run: sleep infinity
