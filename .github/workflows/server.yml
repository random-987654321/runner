name: P2P RPC Inference Mesh (Pinned-Commit)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  # Pin ONE exact commit everywhere. Update this when you want to upgrade.
  LLAMA_COMMIT: "b3829"
  # Known-good small model. Replace with your Granite URL once RPC is stable.
  MODEL_URL: "https://huggingface.co/bartowski/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.gguf"

jobs:

  # ------------------------------------------------------------------------
  # 1. Bootstrap — creates the workers registry folder before any write.
  # ------------------------------------------------------------------------
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workers registry directory exists
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          EMPTY=$(printf '' | base64 -w0)
          curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
               -H "Accept: application/vnd.github+json" \
               "https://api.github.com/repos/${REPO}/contents/workers/.keep" > /tmp/keep.json || true

          SHA=$(jq -r '.sha // empty' /tmp/keep.json)
          if [ -n "$SHA" ]; then
            curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/${REPO}/contents/workers/.keep" \
                 -d "{\"message\":\"ensure workers dir\",\"content\":\"$EMPTY\",\"sha\":\"$SHA\"}" || true
          else
            curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/${REPO}/contents/workers/.keep" \
                 -d "{\"message\":\"create workers dir\",\"content\":\"$EMPTY\"}" || true
          fi

  # ------------------------------------------------------------------------
  # 2. Workers — each runs ggml-rpc-server and exposes it via Holesail.
  # ------------------------------------------------------------------------
  worker:
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3, 4, 5]

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake nodejs npm openssl psmisc netcat-traditional

      - name: Install Holesail
        run: sudo npm install -g holesail

      - name: Build ggml-rpc-server from pinned commit
        run: |
          curl -Lo llama.cpp.zip "https://github.com/ggml-org/llama.cpp/archive/${LLAMA_COMMIT}.zip"
          unzip -q llama.cpp.zip
          cd llama.cpp-${LLAMA_COMMIT}
          mkdir -p build && cd build
          cmake .. -DGGML_RPC=ON -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target ggml-rpc-server
          cp bin/ggml-rpc-server ../../
          cd ../..

      - name: Start RPC server and register Holesail tunnel
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          INSTANCE_ID: ${{ matrix.instance }}
        run: |
          set -e
          PORT=50052
          mkdir -p logs

          echo "🐝 Worker $INSTANCE_ID starting ggml-rpc-server on port ${PORT}..."
          nohup ./ggml-rpc-server -p ${PORT} > logs/rpc.log 2>&1 &

          for i in {1..30}; do
            if nc -z 127.0.0.1 ${PORT}; then
              echo "✅ RPC server listening on ${PORT}"
              break
            fi
            if ! pgrep -f "ggml-rpc-server" >/dev/null; then
              echo "❌ RPC server died"
              cat logs/rpc.log
              exit 1
            fi
            sleep 1
          done

          echo "🔗 Starting Holesail server on port ${PORT}..."
          rm -f /tmp/holesail_output.txt
          holesail --live ${PORT} > /tmp/holesail_output.txt 2>&1 &
          sleep 8

          CONNECTION_STRING=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_output.txt | head -1)
          if [ -z "${CONNECTION_STRING}" ]; then
            echo "❌ Failed to get Holesail connection string"
            cat /tmp/holesail_output.txt
            exit 1
          fi
          echo "✅ Worker $INSTANCE_ID connection string: ${CONNECTION_STRING}"

          register_worker() {
            local url="$1"
            local file="workers/hole${INSTANCE_ID}.json"
            mkdir -p workers
            echo "{\"url\":\"${url}\",\"ts\":$(date +%s)}" > "${file}"
            ENCODED=$(base64 -w0 "${file}")

            for attempt in $(seq 1 15); do
              FILE_INFO=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/${file}")
              SHA=$(echo "$FILE_INFO" | jq -r '.sha // empty' 2>/dev/null)

              if [ -n "$SHA" ]; then
                PAYLOAD=$(jq -n --arg msg "worker ${INSTANCE_ID} update" \
                  --arg content "$ENCODED" --arg sha "$SHA" \
                  '{message:$msg,content:$content,sha:$sha}')
              else
                PAYLOAD=$(jq -n --arg msg "worker ${INSTANCE_ID} register" \
                  --arg content "$ENCODED" \
                  '{message:$msg,content:$content}')
              fi

              RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/${file}" \
                -d "$PAYLOAD")

              if echo "$RESPONSE" | jq -e '.content' >/dev/null; then
                echo "✅ Worker $INSTANCE_ID registered"
                return 0
              fi

              STATUS=$(echo "$RESPONSE" | jq -r '.status // empty' 2>/dev/null)
              if [ "$STATUS" = "409" ]; then
                echo "⚠️ Conflict, retrying..."
                sleep 3
                continue
              fi

              echo "❌ Registration failed: $RESPONSE"
              return 1
            done
          }

          register_worker "${CONNECTION_STRING}"

          LAST_KEY="${CONNECTION_STRING}"
          while true; do
            if ! pgrep -f "ggml-rpc-server" >/dev/null; then
              echo "⚠️ RPC server died — restarting..."
              nohup ./ggml-rpc-server -p ${PORT} > logs/rpc.log 2>&1 &
              sleep 5
            fi

            if ! pgrep -f "holesail --live ${PORT}" >/dev/null; then
              echo "⚠️ Holesail died — restarting..."
              rm -f /tmp/holesail_output.txt
              holesail --live ${PORT} > /tmp/holesail_output.txt 2>&1 &
              sleep 8
              CURRENT_KEY=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_output.txt | head -1 || true)
              if [ -n "$CURRENT_KEY" ] && [ "$CURRENT_KEY" != "$LAST_KEY" ]; then
                echo "🔄 Key changed, re-registering..."
                register_worker "$CURRENT_KEY"
                LAST_KEY="$CURRENT_KEY"
              fi
            fi

            sleep 30
          done

  # ------------------------------------------------------------------------
  # 3. Queen — opens Holesail clients, starts llama-server with --rpc,
  #    then exposes via Cloudflare tunnel only after health passes.
  # ------------------------------------------------------------------------
  queen:
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake nodejs npm openssl netcat-traditional

      - name: Install Holesail
        run: sudo npm install -g holesail

      - name: Build llama-server with RPC support
        run: |
          curl -Lo llama.cpp.zip "https://github.com/ggml-org/llama.cpp/archive/${LLAMA_COMMIT}.zip"
          unzip -q llama.cpp.zip
          cd llama.cpp-${LLAMA_COMMIT}
          mkdir -p build && cd build
          cmake .. -DGGML_RPC=ON -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target llama-server
          cp bin/llama-server ../../
          cd ../..
          chmod +x llama-server
          ./llama-server --help 2>&1 | grep -q rpc || { echo "❌ RPC support missing"; exit 1; }
          echo "✅ llama-server with RPC built"

      - name: Download model
        run: |
          curl -L -o model.gguf "$MODEL_URL" -f --retry 3 --retry-delay 2
          [ "$(head -c 4 model.gguf)" = "GGUF" ] || { echo "❌ Invalid GGUF"; exit 1; }
          echo "✅ Model downloaded"

      - name: Wait for workers and collect URLs
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          EXPECTED: "5"
        run: |
          set -e
          for attempt in $(seq 1 60); do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null || true)

            FILES=$(echo "$RESPONSE" | jq -r '.[]? | select(.type=="file" and (.name | startswith("hole"))) | .name' 2>/dev/null || true)
            COUNT=$(echo "$FILES" | grep -c . || echo 0)
            echo "  Attempt $attempt: $COUNT / ${EXPECTED} workers"
            [ "$COUNT" -ge "${EXPECTED}" ] && break
            sleep 5
          done

          [ "$COUNT" -ge "${EXPECTED}" ] || { echo "❌ Timeout waiting for workers"; exit 1; }

          URLS=""
          for f in $FILES; do
            U=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/${REPO}/contents/workers/$f" | \
                jq -r '.content' | base64 -d | jq -r '.url')
            [ -n "$U" ] && [ "$U" != "null" ] || continue
            [ -z "$URLS" ] && URLS="$U" || URLS="$URLS,$U"
          done

          [ -n "$URLS" ] || { echo "❌ No valid URLs"; exit 1; }
          echo "HOLESAIL_URLS=$URLS" >> $GITHUB_ENV

      - name: Open Holesail clients and build RPC addresses
        env:
          HOLESAIL_URLS: ${{ env.HOLESAIL_URLS }}
        run: |
          set -e
          echo "🔗 Opening Holesail clients..."
          mkdir -p logs
          IFS=',' read -ra URLS <<< "${HOLESAIL_URLS}"
          BASE=60000
          RPC_ADDRS=""

          i=0
          for url in "${URLS[@]}"; do
            port=$((BASE + i))
            nohup holesail "$url" --port $port > logs/holesail_$i.log 2>&1 &
            for t in $(seq 1 30); do
              nc -z 127.0.0.1 $port && break
              sleep 1
            done
            nc -z 127.0.0.1 $port || { echo "❌ Holesail client $i did not open port $port"; exit 1; }
            [ -z "$RPC_ADDRS" ] && RPC_ADDRS="127.0.0.1:$port" || RPC_ADDRS="$RPC_ADDRS,127.0.0.1:$port"
            i=$((i + 1))
          done

          echo "RPC_ADDRS=$RPC_ADDRS" >> $GITHUB_ENV
          echo "✅ RPC backends: $RPC_ADDRS"
          sleep 5

      - name: Start llama-server and Cloudflare tunnel
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          RPC_ADDRS: ${{ env.RPC_ADDRS }}
        run: |
          set -e
          echo "🧠 Starting llama-server with RPC backends: ${RPC_ADDRS}"

          mkdir -p logs
          nohup ./llama-server \
            -m model.gguf \
            --rpc ${RPC_ADDRS} \
            -c 2048 \
            --host 0.0.0.0 \
            --port 8080 \
            > logs/server.log 2>&1 &
          SERVER_PID=$!

          for i in $(seq 1 40); do
            if curl -fs --max-time 3 http://localhost:8080/health >/dev/null 2>&1; then
              echo "✅ llama-server is healthy"
              break
            fi

            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ llama-server exited before becoming healthy"
              cat logs/server.log
              exit 1
            fi

            echo "⏳ Waiting for llama-server health... ($i/40)"
            sleep 3
          done

          curl -fs --max-time 3 http://localhost:8080/health >/dev/null || {
            echo "❌ llama-server health check failed"
            cat logs/server.log
            exit 1
          }

          echo "🌐 Starting Cloudflare tunnel..."
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi

          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > logs/tunnel.log 2>&1 &

          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' logs/tunnel.log | head -1 || true)
            [ -n "$TUNNEL_URL" ] && break
            sleep 3
          done

          [ -n "$TUNNEL_URL" ] || {
            echo "❌ Failed to get tunnel URL"
            tail -100 logs/tunnel.log
            exit 1
          }

          echo "✅ Tunnel URL: $TUNNEL_URL"
          echo "::notice::Public API: $TUNNEL_URL"

          # Optional: update chat frontend config
          CHAT_REPO="${{ github.repository_owner }}/chat"
          CFG=$(jq -n --arg url "$TUNNEL_URL" '{apiUrl:$url}')
          ENC=$(echo "$CFG" | base64 -w0)
          INFO=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" || true)
          SHA=$(echo "$INFO" | jq -r '.sha // empty' 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            PAYLOAD=$(jq -n --arg msg "update API URL" --arg content "$ENC" --arg sha "$SHA" \
              '{message:$msg,content:$content,sha:$sha}')
            curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" -d "$PAYLOAD"
          fi

          # Keep alive and crash-detect
          while kill -0 $SERVER_PID 2>/dev/null; do
            if ! curl -fs --max-time 5 http://localhost:8080/health >/dev/null 2>&1; then
              echo "⚠️ llama-server health check failed"
              tail -100 logs/server.log
            fi
            sleep 30
          done

          echo "❌ llama-server died"
          tail -200 logs/server.log
          exit 1
