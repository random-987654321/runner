name: Queen (Hermes + Ollama) with SSH via Holesail

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  SSH_PORT: 2222
  HERMES_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install Holesail and SSH server ----------
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openssh-server nodejs npm
          sudo npm install -g holesail

      # ---------- Set SSH password ----------
      - name: Set SSH password
        run: |
          echo "runner:runner123" | sudo chpasswd

      # ---------- Generate SSH host keys (critical!) ----------
      - name: Generate SSH host keys
        run: |
          sudo ssh-keygen -A

      # ---------- Configure SSH on port 2222 ----------
      - name: Configure SSH
        run: |
          sudo sed -i 's/^#Port.*/Port ${{ env.SSH_PORT }}/' /etc/ssh/sshd_config
          sudo sed -i 's/^Port.*/Port ${{ env.SSH_PORT }}/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          # Validate configuration before starting
          sudo sshd -t || { echo "❌ Invalid SSH config"; exit 1; }

      # ---------- Start SSH server ----------
      - name: Start SSH
        run: |
          # Ensure no process is using the port
          sudo fuser -k ${{ env.SSH_PORT }}/tcp || true
          sudo systemctl restart ssh
          sleep 3
          sudo systemctl status ssh --no-pager

      # ---------- Verify SSH is listening ----------
      - name: Verify SSH
        run: |
          sudo netstat -tulpn | grep :${{ env.SSH_PORT }} || { echo "❌ SSH not listening on port ${{ env.SSH_PORT }}"; exit 1; }

      # ---------- Start Ollama service ----------
      - name: Start Ollama
        run: ollama serve &

      # ---------- (Optional) Start Hermes Dashboard ----------
      - name: Start Hermes Dashboard
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          hermes dashboard --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --no-open &
          sleep 10
          for i in {1..10}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/health > /dev/null; then
              echo "✅ Hermes Dashboard ready"
              break
            fi
            sleep 2
          done

      # ---------- Expose SSH via Holesail ----------
      - name: Expose SSH with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.SSH_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      # ---------- Print access instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To SSH into the runner:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Connect to the runner's SSH port:"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.SSH_PORT }}"
          echo ""
          echo "   3. In another terminal, SSH into the forwarded port:"
          echo "      ssh runner@localhost -p ${{ env.SSH_PORT }}"
          echo ""
          echo "   Password is: runner123"
          echo ""
          echo "   4. You now have a full SSH session on the runner!"
          echo "      Run 'hermes chat --model ${{ env.OLLAMA_MODEL }}' to start chatting."
          echo ""
          echo "💡 The connection is direct P2P – no lag, no relay servers!"
          echo "================================================================="
          sleep infinity
