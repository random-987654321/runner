name: vLLM Metal Cluster (official install script)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  WORKER_COUNT: 3
  MODEL_ID: "Qwen/Qwen2.5-7B-Instruct"
  HEAD_REPO_FILE: "head_url.txt"

jobs:
  head:
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Clean previous files
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Cleaning workers/ and head_url.txt..."
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null | \
            jq -r '.[] | select(.type == "file") | .name + ":" + .sha' 2>/dev/null | \
            while IFS=':' read -r name sha; do
              if [ -n "$name" ] && [ -n "$sha" ]; then
                curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${REPO}/contents/workers/${name}" \
                  -d "{\"message\":\"cleanup\",\"sha\":\"${sha}\"}" || true
              fi
            done
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/${HEAD_REPO_FILE}" 2>/dev/null)
          SHA=$(echo "$RESPONSE" | jq -r '.sha' 2>/dev/null)
          if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${HEAD_REPO_FILE}" \
              -d "{\"message\":\"cleanup\",\"sha\":\"$SHA\"}"
          fi

      - name: Install system dependencies
        run: |
          brew install curl jq
          sudo npm install -g holesail

      - name: Install vLLM Metal via official install script
        run: |
          curl -fsSL https://raw.githubusercontent.com/vllm-project/vllm-metal/main/install.sh | bash
          source ~/.venv-vllm-metal/bin/activate
          vllm --help || true

      - name: Start vLLM API Server via vllm serve
        run: |
          source ~/.venv-vllm-metal/bin/activate
          vllm serve --model $MODEL_ID --host 0.0.0.0 --port 8080 &
          
          echo "⏳ Waiting for vLLM server to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/health > /dev/null; then
              echo "✅ vLLM server is ready"
              break
            fi
            echo "  Attempt $i/30 – waiting..."
            sleep 5
          done

      - name: Expose API via Cloudflare Tunnel
        run: |
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > tunnel.log 2>&1 &
          echo "⏳ Waiting for Cloudflare tunnel..."
          TUNNEL_URL=""
          for i in {1..30}; do
            TUNNEL_URL=$(grep -Eo 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Public API URL: $TUNNEL_URL"
              echo "::notice::API available at $TUNNEL_URL"
              break
            fi
            sleep 3
          done
          if [ -z "$TUNNEL_URL" ]; then
            tail -20 tunnel.log
          fi

      - name: Keep alive
        run: sleep infinity

  worker:
    runs-on: macos-26
    strategy:
      matrix:
        worker_id: [1, 2, 3]
    timeout-minutes: 360

    steps:
      - name: Install system dependencies
        run: |
          brew install curl jq
          sudo npm install -g holesail

      - name: Install vLLM Metal via official install script
        run: |
          curl -fsSL https://raw.githubusercontent.com/vllm-project/vllm-metal/main/install.sh | bash
          source ~/.venv-vllm-metal/bin/activate
          vllm --help || true

      - name: Start vLLM API Server and expose via Holesail
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          WORKER_ID: ${{ matrix.worker_id }}
        run: |
          source ~/.venv-vllm-metal/bin/activate
          PORT=8080
          vllm serve --model $MODEL_ID --host 0.0.0.0 --port ${PORT} &
          
          for i in {1..30}; do
            if curl -s http://localhost:${PORT}/health > /dev/null; then
              echo "✅ Worker $WORKER_ID ready"
              break
            fi
            sleep 5
          done

          holesail --live ${PORT} > /tmp/holesail_worker.txt 2>&1 &
          sleep 5
          WORKER_URL=$(grep -Eo 'hs://[a-zA-Z0-9]+' /tmp/holesail_worker.txt | head -1)
          echo "✅ Worker $WORKER_ID Holesail URL: $WORKER_URL"

          mkdir -p workers
          echo "{\"url\": \"${WORKER_URL}\"}" > workers/worker${WORKER_ID}.json
          ENCODED=$(base64 -b 0 workers/worker${WORKER_ID}.json)

          for attempt in {1..10}; do
            FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/worker${WORKER_ID}.json")
            SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
            if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
              PAYLOAD=$(jq -n --arg msg "register worker $WORKER_ID" \
                --arg content "$ENCODED" --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}')
            else
              PAYLOAD=$(jq -n --arg msg "register worker $WORKER_ID" \
                --arg content "$ENCODED" \
                '{message: $msg, content: $content}')
            fi
            RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/worker${WORKER_ID}.json" \
              -d "$PAYLOAD")
            if echo "$RESPONSE" | jq -e '.content' > /dev/null; then
              echo "✅ Worker $WORKER_ID registered"
              break
            fi
            sleep 3
          done

          sleep infinity
