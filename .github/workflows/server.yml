name: vLLM Metal Distributed Cluster (macOS)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  WORKER_COUNT: 3                       # change to 19 for full cluster
  MODEL_ID: "Qwen/Qwen2.5-7B-Instruct"  # can use any HF model
  HEAD_REPO_FILE: "head_url.txt"        # file to share head's Holesail URL

jobs:
  # ============================================================
  # HEAD NODE – Ray Head + vLLM API Server + Cloudflare Tunnel
  # ============================================================
  head:
    runs-on: macos-26                     # macOS ARM runner with Metal
    timeout-minutes: 360

    steps:
      - name: Clean previous head_url.txt and workers
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Cleaning workers/ directory..."
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null | \
            jq -r '.[] | select(.type == "file") | .name + ":" + .sha' 2>/dev/null | \
            while IFS=':' read -r name sha; do
              if [ -n "$name" ] && [ -n "$sha" ]; then
                curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${REPO}/contents/workers/${name}" \
                  -d "{\"message\":\"cleanup\",\"sha\":\"${sha}\"}" || true
              fi
            done
          echo "🧹 Deleting previous head_url.txt..."
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/${HEAD_REPO_FILE}" 2>/dev/null)
          SHA=$(echo "$RESPONSE" | jq -r '.sha' 2>/dev/null)
          if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${HEAD_REPO_FILE}" \
              -d "{\"message\":\"cleanup\",\"sha\":\"$SHA\"}"
            echo "✅ Deleted old head_url.txt"
          fi

      - name: Install system dependencies
        run: |
          brew install curl jq
          sudo npm install -g holesail

      - name: Install Python and vLLM with Metal support
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          # Install vLLM with Metal plugin (this includes Ray dependencies)
          pip install vllm vllm-metal

      - name: Start Ray Head (bind to localhost) and expose via Holesail
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          source .venv/bin/activate
          # Force Ray to use loopback only (workers connect via Holesail tunnel)
          export RAY_NODE_IP=127.0.0.1
          export RAY_GCS_ADDRESS=127.0.0.1:6379
          export RAY_ADDRESS=127.0.0.1:6379
          ray start --head --port=6379 \
            --node-ip-address=127.0.0.1 \
            --dashboard-host=127.0.0.1 \
            --disable-usage-stats

          # Expose Ray GCS via Holesail
          holesail --live 6379 > /tmp/holesail_head.txt 2>&1 &
          sleep 5
          HEAD_URL=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_head.txt | head -1)
          echo "HEAD_NODE_URL=$HEAD_URL" >> $GITHUB_ENV
          echo "$HEAD_URL" > head_url.txt
          ENCODED=$(base64 -w0 head_url.txt)

          curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/${HEAD_REPO_FILE}" \
            -d "{\"message\":\"publish head url\",\"content\":\"$ENCODED\"}" || true

      - name: Wait for workers to register
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "👑 Head waiting for $WORKER_COUNT workers..."
          for attempt in {1..60}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null)
            if [ "$(echo "$RESPONSE" | jq -r '.message' 2>/dev/null)" = "Not Found" ]; then
              COUNT=0
            else
              FILES=$(echo "$RESPONSE" | jq -r '.[] | select(.type == "file") | .name' 2>/dev/null)
              COUNT=$(echo "$FILES" | grep -c . || echo 0)
            fi
            echo "  Attempt $attempt: $COUNT/$WORKER_COUNT workers registered"
            if [ "$COUNT" -ge $WORKER_COUNT ]; then
              echo "✅ All workers registered!"
              break
            fi
            sleep 5
          done
          if [ "$COUNT" -lt $WORKER_COUNT ]; then
            echo "❌ Timeout waiting for workers"
            exit 1
          fi

      - name: Start vLLM API Server (with Ray backend and Metal)
        run: |
          source .venv/bin/activate
          # Ensure Ray uses the tunnel
          export RAY_ADDRESS=127.0.0.1:6379
          export RAY_GCS_ADDRESS=127.0.0.1:6379
          python -m vllm.entrypoints.openai.api_server \
            --model $MODEL_ID \
            --tensor-parallel-size 1 \
            --distributed-executor-backend ray \
            --host 0.0.0.0 \
            --port 8080 &
          
          echo "⏳ Waiting for vLLM server to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/health > /dev/null; then
              echo "✅ vLLM server is ready"
              break
            fi
            echo "  Attempt $i/30 – waiting for vLLM..."
            sleep 5
          done

      - name: Expose vLLM API via Cloudflare Tunnel
        run: |
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > tunnel.log 2>&1 &
          echo "⏳ Waiting for Cloudflare tunnel to be ready..."
          TUNNEL_URL=""
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Public API URL: $TUNNEL_URL"
              echo "::notice::API available at $TUNNEL_URL"
              break
            fi
            echo "  Attempt $i/30 – tunnel not ready yet, waiting..."
            sleep 3
          done
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get Cloudflare tunnel URL."
            tail -20 tunnel.log
          fi

      - name: Keep alive
        run: sleep infinity

  # ============================================================
  # WORKER NODES – Connect to Ray Head, start Ray workers
  # ============================================================
  worker:
    runs-on: macos-26
    strategy:
      matrix:
        worker_id: [1, 2, 3]   # change to 19 for full cluster
    timeout-minutes: 360

    steps:
      - name: Install system dependencies
        run: |
          brew install curl jq
          sudo npm install -g holesail

      - name: Install Python and vLLM with Metal
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install vllm vllm-metal

      - name: Fetch Head Node URL from repository
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "📡 Fetching Head Node URL..."
          HEAD_URL=""
          for attempt in {1..30}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${HEAD_REPO_FILE}" 2>/dev/null)
            if echo "$RESPONSE" | jq -e '.message' > /dev/null 2>&1; then
              echo "  File not yet published, retrying..."
              sleep 5
              continue
            fi
            URL=$(echo "$RESPONSE" | jq -r '.content' 2>/dev/null | base64 -d 2>/dev/null | tr -d '\n\r')
            if [ -n "$URL" ] && [ "$URL" != "null" ] && [[ "$URL" == hs://* ]]; then
              echo "Fetched valid URL: $URL"
              HEAD_URL="$URL"
              break
            fi
            echo "  Waiting for Head to publish URL... ($attempt/30)"
            sleep 5
          done
          if [ -z "$HEAD_URL" ]; then
            echo "❌ Failed to fetch Head Node URL"
            exit 1
          fi
          echo "HEAD_NODE_URL=$HEAD_URL" >> $GITHUB_ENV

      - name: Connect to Ray Head via Holesail and start Ray worker
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          WORKER_ID: ${{ matrix.worker_id }}
        run: |
          source .venv/bin/activate
          # Connect to head's Ray GCS via Holesail
          holesail --connect "$HEAD_NODE_URL" --port 6379 &
          sleep 10

          # Force Ray to use loopback (tunnel)
          export RAY_NODE_IP=127.0.0.1
          export RAY_GCS_ADDRESS=127.0.0.1:6379
          export RAY_ADDRESS=127.0.0.1:6379

          ray start --address=0.0.0.0:6379 --disable-usage-stats

          # Register this worker as ready (optional)
          mkdir -p workers
          echo "{\"status\": \"ready\", \"worker_id\": $WORKER_ID}" > workers/worker${WORKER_ID}.json
          ENCODED=$(base64 -w0 workers/worker${WORKER_ID}.json)

          for attempt in {1..10}; do
            FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/worker${WORKER_ID}.json")
            SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
            if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
              PAYLOAD=$(jq -n --arg msg "register worker $WORKER_ID" \
                --arg content "$ENCODED" --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}')
            else
              PAYLOAD=$(jq -n --arg msg "register worker $WORKER_ID" \
                --arg content "$ENCODED" \
                '{message: $msg, content: $content}')
            fi
            RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/worker${WORKER_ID}.json" \
              -d "$PAYLOAD")
            if echo "$RESPONSE" | jq -e '.content' > /dev/null; then
              echo "✅ Worker $WORKER_ID registered successfully!"
              break
            fi
            sleep 3
          done

          # Keep alive
          sleep infinity
