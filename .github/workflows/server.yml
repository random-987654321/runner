name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  GATEWAY_PORT: 18789
  QUEEN_SCRIPT_DIR: /tmp/queen

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # -------- Phase 1: Install dependencies --------
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm python3 python3-pip jq
          curl -fsSL https://ollama.com/install.sh | sh
          npm install -g openclaw
          echo "$(npm root -g)/bin" >> $GITHUB_PATH
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # -------- Phase 2: Start Ollama --------
      - name: Start Ollama
        run: |
          ollama serve &
          sleep 5
          ollama pull ${{ env.OLLAMA_MODEL }}

      # -------- Phase 3: Setup scripts directory --------
      - name: Setup scripts
        run: |
          mkdir -p ${{ env.QUEEN_SCRIPT_DIR }}
          cp -r scripts/* ${{ env.QUEEN_SCRIPT_DIR }}/ 2>/dev/null || true
          chmod +x ${{ env.QUEEN_SCRIPT_DIR }}/*.sh

      # -------- Phase 4: Configure OpenClaw --------
      - name: Configure OpenClaw
        env:
          SCRIPT_DIR: ${{ env.QUEEN_SCRIPT_DIR }}
        run: |
          mkdir -p ~/.openclaw
          # Inject script paths into config
          sed "s|__SCRIPT_DIR__|$SCRIPT_DIR|g" config/openclaw.json > ~/.openclaw/openclaw.json

      # -------- Phase 5: Start OpenClaw Gateway --------
      - name: Start Gateway
        run: |
          openclaw gateway start --port ${{ env.GATEWAY_PORT }} &
          for i in {1..30}; do
            if curl -s http://localhost:${{ env.GATEWAY_PORT }}/health > /dev/null; then
              echo "✅ Gateway ready"
              break
            fi
            sleep 2
          done

      # -------- Phase 6: Start Cloudflare Tunnel --------
      - name: Start Cloudflare Tunnel
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://localhost:${{ env.GATEWAY_PORT }} > tunnel.log 2>&1 &
          for i in {1..30}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then echo "tunnel_url=$URL" >> $GITHUB_OUTPUT; break; fi
            sleep 3
          done

      # -------- Phase 7: Update allowed origins --------
      - name: Update allowed origins
        env:
          TUNNEL_URL: ${{ steps.tunnel.outputs.tunnel_url }}
        run: |
          openclaw config set gateway.controlUi.allowedOrigins '["'"$TUNNEL_URL"'"]'
          pkill -f "openclaw gateway" || true
          sleep 2
          openclaw gateway start --port ${{ env.GATEWAY_PORT }} &
          sleep 5

      # -------- Phase 8: Print access info --------
      - name: Print access
        run: |
          echo "================================================================="
          echo "🌐 OpenClaw Web UI: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo ""
          echo "📋 Configuration:"
          echo "   - Model: ${{ env.OLLAMA_MODEL }}"
          echo "   - Max workers: ${{ env.MAX_WORKERS }}"
          echo "   - Gateway port: ${{ env.GATEWAY_PORT }}"
          echo ""
          echo "💡 Just ask anything. The Queen will automatically create workers."
          echo "================================================================="
          sleep infinity
