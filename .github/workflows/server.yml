name: Server (Self‑Replicating)

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5   # max 6 hours

    steps:
      # --- 1. Clone the runner repo (this repo) ---
      - name: Checkout runner repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- 2. Clone the backend repo into a subdirectory ---
      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/backend
          token: ${{ secrets.TOKEN }}
          path: backend

      # --- 3. Caches (path adjusted to backend/) ---
      - name: Cache Rust binary
        uses: actions/cache@v4
        id: binary-cache
        with:
          path: backend/target/release/unified-api
          key: rust-binary-${{ runner.os }}-${{ hashFiles('backend/Cargo.toml', 'backend/src/**') }}
          restore-keys: rust-binary-${{ runner.os }}-

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ hashFiles('.github/workflows/server.yml') }}
          restore-keys: ollama-models-

      - name: Cache cloudflared
        uses: actions/cache@v4
        id: cloudflared-cache
        with:
          path: ./cloudflared
          key: cloudflared-${{ runner.os }}-v1

      # --- 4. Setup Rust & build (inside backend/) ---
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Build server (if cache miss)
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cd backend
          cargo build --release
          cp target/release/unified-api ./

      # --- 5. Ollama setup ---
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - name: Pull models
        run: |
          ollama pull gemma3:1b
          ollama pull qwen3-embedding:0.6b

      # --- 6. Start services, update config, trigger replacement ---
      - name: Run, update, and self‑replicate
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -e

          cd backend

          # Start server
          chmod +x ./unified-api
          pkill -f unified-api 2>/dev/null || true
          ./unified-api &

          for i in {1..10}; do
            if curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          curl -s http://localhost:8000/health | grep -q '"status":"ok"' || { echo "Server failed"; exit 1; }

          # Start tunnel
          if [ ! -f ../cloudflared ]; then
            curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ../cloudflared
            chmod +x ../cloudflared
          fi
          pkill -f cloudflared 2>/dev/null || true
          ../cloudflared tunnel --protocol http2 --url http://localhost:8000 2>&1 | tee tunnel.log &

          # Get tunnel URL
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 1
          done
          echo "::notice::Tunnel URL: ${TUNNEL_URL}"

          # Update config.js in chat repo
          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG="const API_URL = \"${TUNNEL_URL}\";"
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)

          FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.js")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')

          if [ "$SHA" != "null" ]; then
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"update API URL\",\"content\":\"${ENCODED}\",\"sha\":\"${SHA}\"}"
          else
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"add API URL\",\"content\":\"${ENCODED}\"}"
          fi
          echo "::notice::Frontend URL: https://${{ github.repository_owner }}.github.io/chat/"

          # Go back to root to commit timestamp (optional, but useful for monitoring)
          cd ..
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +%s)" > .server_start
          git add .server_start
          git commit -m "Update server start timestamp" || true
          git push origin HEAD:${{ github.ref }}

          # --- Self‑replication logic ---
          START_TIME=$(date +%s)
          TRIGGER_AT=$(( 3 * 60 ))   # 5 minutes before timeout
          TRIGGERED=false

          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))

            if [ $ELAPSED -ge $TRIGGER_AT ] && [ "$TRIGGERED" = "false" ]; then
              echo "Triggering replacement workflow..."
              curl -X POST \
                -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"${{ github.ref }}"}'
              TRIGGERED=true
            fi

            # Health checks – restart if needed
            if ! curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Server down – restarting..."
              cd backend
              pkill -f unified-api 2>/dev/null || true
              ./unified-api &
              cd ..
            fi
            if ! pgrep -f cloudflared > /dev/null; then
              echo "Tunnel down – restarting..."
              cd backend
              ../cloudflared tunnel --protocol http2 --url http://localhost:8000 2>&1 | tee -a tunnel.log &
              cd ..
            fi

            sleep 30
          done
