name: Hermes + llama.cpp (Granite 4.0 H Tiny) + Holesail

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  # Official IBM Granite 4.0 H Tiny GGUF (Q4_K_M)
  MODEL_URL: "https://huggingface.co/ibm-granite/granite-4.0-h-tiny-GGUF/resolve/main/granite-4.0-h-tiny-Q4_K_M.gguf"
  HERMES_PORT: 18789
  LLAMA_CPP_VERSION: "b9945"

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Install system dependencies ----------
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl xz-utils nodejs npm python3-pip
          sudo npm install -g holesail

      # ---------- Download llama.cpp binaries ----------
      - name: Download llama.cpp binaries
        run: |
          wget https://github.com/ggml-org/llama.cpp/releases/download/${{ env.LLAMA_CPP_VERSION }}/llama-${{ env.LLAMA_CPP_VERSION }}-bin-ubuntu-x64.tar.gz
          tar -xzf llama-${{ env.LLAMA_CPP_VERSION }}-bin-ubuntu-x64.tar.gz

      # ---------- Download the GGUF model ----------
      - name: Download model
        run: |
          curl -L -o model.gguf "$MODEL_URL" -f --retry 3 --retry-delay 2
          if [ "$(head -c 4 model.gguf)" = "GGUF" ]; then
            echo "✅ Valid GGUF model downloaded (4.3 GB)"
          else
            echo "❌ Invalid GGUF file"
            exit 1
          fi

      # ---------- Start llama-server with MoE optimised flags ----------
      - name: Start llama-server
        run: |
          cd llama-${{ env.LLAMA_CPP_VERSION }}
          chmod +x llama-server
          nohup ./llama-server \
            -m ../model.gguf \
            -t 4 \
            -tb 4 \
            -fa 1 \
            -c 65000 \
            --no-mmap \
            --cpu-strict 1 \
            --cpu-range 0-3 \
            --cpu-moe \
            --n-cpu-moe 4 \
            --host 127.0.0.1 \
            --port 8080 \
            > server.log 2>&1 &
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080/health > /dev/null; then
              echo "✅ llama-server ready"
              break
            fi
            echo "⏳ Waiting for server... ($i/30)"
            sleep 2
          done

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Configure Hermes for llama.cpp ----------
      - name: Configure Hermes
        run: |
          mkdir -p ~/.hermes
          cat > ~/.hermes/config.yaml << EOF
          model:
            default: "granite-4.0-h-tiny"
            provider: "custom"
            base_url: "http://127.0.0.1:8080/v1"
            api_key: "sk-no-api-key"
          gateway:
            port: ${{ env.HERMES_PORT }}
            host: 0.0.0.0
          skills:
            enabled:
              - terminal
              - file_editor
              - web_browser
          EOF

      # ---------- Configure dashboard authentication ----------
      - name: Configure Hermes authentication
        run: |
          PASSWORD=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          SECRET=$(openssl rand -base64 32)
          cat > ~/.hermes/.env << EOF
          HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin
          HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=$PASSWORD
          HERMES_DASHBOARD_BASIC_AUTH_SECRET=$SECRET
          EOF
          echo "ADMIN_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # ---------- Install web + pty extras for dashboard ----------
      - name: Install dashboard dependencies
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          cd ~/.hermes/hermes-agent
          uv pip install -e ".[web,pty]" || pip install -e ".[web,pty]"

      # ---------- Start Hermes Dashboard ----------
      - name: Start Hermes Dashboard
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          set -a; source ~/.hermes/.env; set +a
          hermes dashboard --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --no-open &
          sleep 15
          for i in {1..20}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/api/status > /dev/null; then
              echo "✅ Dashboard ready"
              break
            fi
            echo "⏳ Waiting for dashboard... ($i/20)"
            sleep 2
          done

      # ---------- Expose Dashboard via Holesail ----------
      - name: Expose Dashboard with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.HERMES_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail connection key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT
          echo "✅ Holesail key: $CONNECTION_KEY"

      # ---------- Print access instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To access the Hermes dashboard from your browser:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Connect to the runner's Holesail server:"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.HERMES_PORT }}"
          echo ""
          echo "   3. Open http://localhost:${{ env.HERMES_PORT }} in your browser"
          echo ""
          echo "🔐 Dashboard credentials:"
          echo "   Username: admin"
          echo "   Password: ${{ env.ADMIN_PASSWORD }}"
          echo ""
          echo "🧠 Model: Granite 4.0 H Tiny (7B MoE, 1B active) – Q4_K_M"
          echo "   → 4.3 GB file, fits easily in 16 GB RAM"
          echo "⚙️  llama.cpp optimised for MoE (CPU pinning, Flash Attention, MoE)"
          echo "💡 Tool calling: ✅ Supported (enterprise-grade)"
          echo "================================================================="

      # ---------- Keep runner alive ----------
      - name: Keep alive
        run: sleep infinity
