name: vLLM-Holesail Distributed CPU Mesh with Cloudflare

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  WORKER_COUNT: 3                       # number of worker nodes (adjust as needed)
  MODEL_ID: "Qwen/Qwen2.5-7B-Instruct"  # Hugging Face model ID
  HEAD_REPO_FILE: "head_url.txt"        # file to share head's Holesail URL

jobs:
  # ============================================================
  # HEAD NODE (Node 0) – API Server, Ray Head, Cloudflare Tunnel
  # ============================================================
  head:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-12 g++-12 libnuma-dev curl jq
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 10 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-12
          sudo npm install -g holesail

      - name: Install Python and build tools
        run: |
          pip install --upgrade pip
          pip install cmake>=3.26 wheel packaging ninja "setuptools-scm>=8" numpy

      - name: Build vLLM CPU backend
        run: |
          git clone https://github.com/vllm-project/vllm.git
          cd vllm
          pip install -v -r requirements-cpu.txt --extra-index-url https://download.pytorch.org/whl/cpu
          VLLM_TARGET_DEVICE=cpu python setup.py install

      - name: Start Ray Head and expose via Holesail
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ray start --head --port=6379 --dashboard-host=0.0.0.0
          holesail --live 6379 > /tmp/holesail_head.txt 2>&1 &
          sleep 5
          HEAD_URL=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_head.txt | head -1)
          echo "HEAD_NODE_URL=$HEAD_URL" >> $GITHUB_ENV
          echo "$HEAD_URL" > head_url.txt
          ENCODED=$(base64 -w0 head_url.txt)

          # Publish URL to repo so workers can fetch it
          curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/${HEAD_REPO_FILE}" \
            -d "{\"message\":\"publish head url\",\"content\":\"$ENCODED\"}" || true

      - name: Start vLLM API Server
        run: |
          python -m vllm.entrypoints.openai.api_server \
            --model $MODEL_ID \
            --dtype float16 \
            --tensor-parallel-size 1 \
            --worker-use-ray \
            --port 8080 &
          sleep 15

      - name: Expose API via Cloudflare Tunnel
        run: |
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > tunnel.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "✅ Public API URL: $TUNNEL_URL"
            echo "::notice::API available at $TUNNEL_URL"
          else
            echo "⚠️ Tunnel not ready – check tunnel.log"
            tail -20 tunnel.log
          fi

      - name: Keep alive
        run: sleep infinity

  # ============================================================
  # WORKER NODES – Connect to Ray Head and join cluster
  # ============================================================
  worker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker_id: [1, 2, 3]   # adjust to match WORKER_COUNT
    timeout-minutes: 360

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-12 g++-12 libnuma-dev curl jq
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 10 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-12
          sudo npm install -g holesail

      - name: Install Python and build tools
        run: |
          pip install --upgrade pip
          pip install cmake>=3.26 wheel packaging ninja "setuptools-scm>=8" numpy

      - name: Build vLLM CPU backend
        run: |
          git clone https://github.com/vllm-project/vllm.git
          cd vllm
          pip install -v -r requirements-cpu.txt --extra-index-url https://download.pytorch.org/whl/cpu
          VLLM_TARGET_DEVICE=cpu python setup.py install

      - name: Fetch Head Node URL from repository
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "📡 Fetching Head Node URL..."
          HEAD_URL=""
          for attempt in {1..30}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${HEAD_REPO_FILE}" 2>/dev/null)
            URL=$(echo "$RESPONSE" | jq -r '.content' 2>/dev/null | base64 -d 2>/dev/null | tr -d '\n\r')
            if [ -n "$URL" ] && [ "$URL" != "null" ] && [[ "$URL" == hs://* ]]; then
              echo "Fetched URL: $URL"
              HEAD_URL="$URL"
              break
            fi
            echo "  Waiting for Head Node to publish URL... ($attempt/30)"
            sleep 5
          done
          if [ -z "$HEAD_URL" ]; then
            echo "❌ Failed to fetch Head Node URL"
            exit 1
          fi
          echo "HEAD_NODE_URL=$HEAD_URL" >> $GITHUB_ENV

      - name: Connect to Ray Head via Holesail and start worker
        run: |
          holesail --connect "$HEAD_NODE_URL" --port 6379 &
          sleep 10
          ray start --address="127.0.0.1:6379"
          sleep infinity
