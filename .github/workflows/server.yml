name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Spin up Ollama Engine Natively on the runner for maximum hardware acceleration
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 2. Pull base model weights and automatically extend context to 64K
      - name: Build 64K Context Agent Model Variant
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}
          
          # Creating the Modelfile to match the 64,000 threshold required by Hermes tools
          echo "FROM ${{ env.OLLAMA_MODEL }}" > Modelfile
          echo "PARAMETER num_ctx 64000" >> Modelfile
          ollama create granite4-64k -f Modelfile
          
          echo "✅ Custom 64K Context Model Variant successfully registered:"
          ollama list

      # 3. Provision isolated bridge infrastructure
      - name: Create Isolated Container Network
        run: |
          docker network create hermes-net

      # 4. Spin up Hermes Server and Dashboard Components inside an isolated environment
      - name: Launch Hermes Container
        run: |
          docker run -d \
            --name hermes-dashboard \
            --network hermes-net \
            -p ${{ env.HERMES_DASHBOARD_PORT }}:${{ env.HERMES_DASHBOARD_PORT }} \
            -e HERMES_ALLOWED_ORIGINS="*" \
            -e HERMES_ALLOWED_HOSTS="*" \
            -e HERMES_DISABLE_CSRF="true" \
            -e HERMES_INSECURE="true" \
            -v ~/.hermes:/root/.hermes \
            python:3.11-slim /bin/bash -c "
              pip install --upgrade pip && \
              pip install 'hermes-agent[web,pty]' && \
              mkdir -p /root/.hermes && \
              echo 'provider: \"ollama\"' > /root/.hermes/config.yaml && \
              echo 'model: \"granite4-64k\"' >> /root/.hermes/config.yaml && \
              echo 'providers:' >> /root/.hermes/config.yaml && \
              echo '  ollama:' >> /root/.hermes/config.yaml && \
              echo '    base_url: \"http://host.docker.internal:11434\"' >> /root/.hermes/config.yaml && \
              
              echo '🚀 Starting Local Backend Core Engine...' && \
              hermes serve --host 0.0.0.0 --port ${{ env.HERMES_DASHBOARD_PORT }}
            "

          echo "⏳ Waiting for containerized application boot sequence..."
          sleep 15
          docker logs hermes-dashboard

      # 5. Direct the Cloudflare Tunnel client with optimal reverse proxy settings
      - name: Start Cloudflare Tunnel Container
        run: |
          docker run -d \
            --name cloudflared-tunnel \
            --network hermes-net \
            cloudflare/cloudflared:latest \
            tunnel \
            --url http://hermes-dashboard:${{ env.HERMES_DASHBOARD_PORT }} \
            --http-host-header "hermes-dashboard:${{ env.HERMES_DASHBOARD_PORT }}" \
            --no-tls-verify

          echo "⏳ Catching dynamic public edge route URL..."
          # Active loop to reliably catch the ephemeral address from container logs
          for i in {1..20}; do
            URL=$(docker logs cloudflared-tunnel 2>&1 | grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' | head -1)
            if [ -n "$URL" ]; then 
              echo "TUNNEL_URL=$URL" >> $GITHUB_ENV
              echo "✅ URL Captured: $URL"
              break
            fi
            sleep 3
          done

      # 6. Output direct URL access routes and sustain active keep-alive loop
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${{ env.TUNNEL_URL }}"
          echo "================================================================="
          sleep infinity
