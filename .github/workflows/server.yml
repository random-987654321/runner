name: P2P Exo Inference Mesh (Star Topology)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  # Exo-compatible tiny model. Exo downloads/weights it automatically.
  EXO_MODEL: "llama-3.2-1b"
  # Exo web/API port (hardcoded default).
  EXO_API_PORT: 8000
  # Exo peer-to-peer port used by workers.
  EXO_PEER_PORT: 50052

jobs:

  # ------------------------------------------------------------------------
  # Bootstrap — create the workers registry directory before anyone writes.
  # ------------------------------------------------------------------------
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workers registry exists
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          EMPTY=$(printf '' | base64 -w0)
          curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/workers/.keep" > /tmp/keep.json || true
          SHA=$(jq -r '.sha // empty' /tmp/keep.json)
          if [ -n "$SHA" ]; then
            curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/.keep" \
              -d "{\"message\":\"ensure workers dir\",\"content\":\"$EMPTY\",\"sha\":\"$SHA\"}" || true
          else
            curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/.keep" \
              -d "{\"message\":\"create workers dir\",\"content\":\"$EMPTY\"}" || true
          fi

  # ------------------------------------------------------------------------
  # Workers — each one runs an Exo node and tunnels it through Holesail.
  # ------------------------------------------------------------------------
  worker:
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3, 4, 5]

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential git python3 python3-pip python3-venv nodejs npm openssl psmisc netcat-traditional

      - name: Install Holesail
        run: sudo npm install -g holesail

      - name: Install Exo
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install exo --quiet
          echo "---- Exo version / help ----"
          exo --version 2>&1 || true
          exo --help 2>&1 | head -60 || true

      - name: Pre-download model (optional but recommended)
        run: |
          echo "📥 Pre-downloading ${EXO_MODEL} on worker..."
          # Exo downloads on first use; this just warms the cache.
          timeout 300 exo --node-id worker-${{ matrix.instance }}-warmup --default-model "${EXO_MODEL}" --timeout 300 --help || true

      - name: Start Exo node and Holesail server
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          INSTANCE_ID: ${{ matrix.instance }}
        run: |
          set -e
          PORT=${EXO_PEER_PORT}
          mkdir -p logs

          echo "🐝 Worker $INSTANCE_ID starting Exo node..."
          # Exo node listens on 0.0.0.0 so Holesail can reach it.
          nohup exo \
            --node-id "worker-${INSTANCE_ID}" \
            --host 0.0.0.0 \
            --port ${PORT} \
            > logs/exo.log 2>&1 &

          for i in $(seq 1 40); do
            if nc -z 127.0.0.1 ${PORT}; then
              echo "✅ Exo node listening on ${PORT}"
              break
            fi
            if ! pgrep -f "exo" >/dev/null; then
              echo "❌ Exo process died"
              cat logs/exo.log
              exit 1
            fi
            sleep 2
          done

          echo "🔗 Starting Holesail server on port ${PORT}..."
          rm -f /tmp/holesail_output.txt
          holesail --live ${PORT} > /tmp/holesail_output.txt 2>&1 &
          sleep 10

          CONNECTION_STRING=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_output.txt | head -1)
          if [ -z "${CONNECTION_STRING}" ]; then
            echo "❌ Failed to get Holesail connection string"
            cat /tmp/holesail_output.txt
            exit 1
          fi
          echo "✅ Worker $INSTANCE_ID connection string: ${CONNECTION_STRING}"

          register_worker() {
            local url="$1"
            local file="workers/hole${INSTANCE_ID}.json"
            mkdir -p workers
            echo "{\"url\":\"${url}\",\"ts\":$(date +%s)}" > "${file}"
            ENCODED=$(base64 -w0 "${file}")

            for attempt in $(seq 1 15); do
              local info sha payload response status
              info=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/${file}") || true
              sha=$(echo "$info" | jq -r '.sha // empty' 2>/dev/null)

              if [ -n "$sha" ]; then
                payload=$(jq -n --arg msg "worker ${INSTANCE_ID} update" \
                  --arg content "$ENCODED" --arg sha "$sha" \
                  '{message:$msg,content:$content,sha:$sha}')
              else
                payload=$(jq -n --arg msg "worker ${INSTANCE_ID} register" \
                  --arg content "$ENCODED" \
                  '{message:$msg,content:$content}')
              fi

              response=$(curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/${file}" \
                -d "$payload") || true

              if echo "$response" | jq -e '.content' >/dev/null 2>&1; then
                echo "✅ Worker $INSTANCE_ID registered"
                return 0
              fi

              status=$(echo "$response" | jq -r '.status // empty' 2>/dev/null)
              if [ "$status" = "409" ]; then
                echo "⚠️ Conflict, retrying..."
                sleep 3
                continue
              fi
              echo "❌ Registration failed: $response"
              return 1
            done
          }

          register_worker "${CONNECTION_STRING}"

          LAST_KEY="${CONNECTION_STRING}"
          while true; do
            sleep 30

            if ! pgrep -f "exo.*worker-${INSTANCE_ID}" >/dev/null; then
              echo "⚠️ Exo process died — restarting..."
              nohup exo \
                --node-id "worker-${INSTANCE_ID}" \
                --host 0.0.0.0 \
                --port ${PORT} \
                > logs/exo.log 2>&1 &
              sleep 5
            fi

            if ! pgrep -f "holesail --live ${PORT}" >/dev/null; then
              echo "⚠️ Holesail died — restarting..."
              rm -f /tmp/holesail_output.txt
              holesail --live ${PORT} > /tmp/holesail_output.txt 2>&1 &
              sleep 10
              CURRENT_KEY=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_output.txt | head -1 || true)
              if [ -n "$CURRENT_KEY" ] && [ "$CURRENT_KEY" != "$LAST_KEY" ]; then
                echo "🔄 Key changed, re-registering..."
                register_worker "$CURRENT_KEY"
                LAST_KEY="$CURRENT_KEY"
              fi
            fi
          done

  # ------------------------------------------------------------------------
  # Queen — opens Holesail clients to every worker, then starts the central
  # Exo node in star topology and exposes the web API via Cloudflare.
  # ------------------------------------------------------------------------
  queen:
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential git python3 python3-pip nodejs npm openssl netcat-traditional

      - name: Install Holesail
        run: sudo npm install -g holesail

      - name: Install Exo
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install exo --quiet
          exo --version 2>&1 || true
          exo --help 2>&1 | head -60 || true

      - name: Wait for workers and collect Holesail URLs
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          EXPECTED: "5"
        run: |
          set -e
          for attempt in $(seq 1 60); do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null || true)

            FILES=$(echo "$RESPONSE" | jq -r '.[]? | select(.type=="file" and (.name | startswith("hole"))) | .name' 2>/dev/null || true)
            COUNT=$(echo "$FILES" | grep -c . || echo 0)
            echo "  Attempt $attempt: $COUNT / ${EXPECTED} workers"
            [ "$COUNT" -ge "${EXPECTED}" ] && break
            sleep 5
          done

          [ "$COUNT" -ge "${EXPECTED}" ] || {
            echo "❌ Timeout waiting for workers"
            exit 1
          }

          URLS=""
          for f in $FILES; do
            U=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/${REPO}/contents/workers/$f" | \
                jq -r '.content' | base64 -d | jq -r '.url' 2>/dev/null)
            [ -n "$U" ] && [ "$U" != "null" ] || continue
            [ -z "$URLS" ] && URLS="$U" || URLS="$URLS,$U"
          done

          [ -n "$URLS" ] || {
            echo "❌ No valid worker URLs found"
            exit 1
          }

          echo "HOLESAIL_URLS=$URLS" >> $GITHUB_ENV

      - name: Open Holesail clients to workers
        env:
          HOLESAIL_URLS: ${{ env.HOLESAIL_URLS }}
        run: |
          set -e
          mkdir -p logs
          IFS=',' read -ra URLS <<< "${HOLESAIL_URLS}"
          BASE=60000
          PEERS=""
          i=0
          for url in "${URLS[@]}"; do
            port=$((BASE + i))
            echo "🔗 Holesail client $i: $url → 127.0.0.1:$port"
            nohup holesail "$url" --port $port > logs/holesail_$i.log 2>&1 &

            for t in $(seq 1 50); do
              nc -z 127.0.0.1 $port && break
              sleep 1
            done

            if ! nc -z 127.0.0.1 $port; then
              echo "❌ Holesail client $i did not open port $port"
              cat logs/holesail_$i.log
              exit 1
            fi

            [ -z "$PEERS" ] && PEERS="127.0.0.1:$port" || PEERS="$PEERS,127.0.0.1:$port"
            i=$((i + 1))
          done

          echo "EXO_PEERS=$PEERS" >> $GITHUB_ENV
          echo "✅ Exo worker peers: $PEERS"
          sleep 8

      - name: Start Exo queen node and Cloudflare tunnel
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          EXO_PEERS: ${{ env.EXO_PEERS }}
        run: |
          set -e
          API_PORT=${EXO_API_PORT}
          PEER_PORT=$((${EXO_PEER_PORT} + 1000))

          echo "👑 Starting Exo queen node..."
          echo "   Peers: ${EXO_PEERS}"
          echo "   API will be on: http://127.0.0.1:${API_PORT}"

          mkdir -p logs
          # Exo queen: explicit peers so mDNS is not required.
          nohup exo \
            --node-id "queen" \
            --host 0.0.0.0 \
            --port ${PEER_PORT} \
            --peers "${EXO_PEERS}" \
            > logs/exo.log 2>&1 &

          EXO_PID=$!
          echo "Exo PID: $EXO_PID"

          echo "⏳ Waiting for Exo web API on port ${API_PORT}..."
          for i in $(seq 1 60); do
            if curl -fs --max-time 3 "http://127.0.0.1:${API_PORT}/v1/models" >/dev/null 2>&1; then
              echo "✅ Exo web API is up"
              break
            fi

            if ! kill -0 $EXO_PID 2>/dev/null; then
              echo "❌ Exo queen exited early"
              cat logs/exo.log
              exit 1
            fi

            echo "  ($i/60) Waiting..."
            sleep 5
          done

          curl -fs --max-time 3 "http://127.0.0.1:${API_PORT}/v1/models" >/dev/null 2>&1 || {
            echo "❌ Exo API did not become healthy"
            cat logs/exo.log
            exit 1
          }

          echo "🌐 Starting Cloudflare tunnel..."
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi

          nohup ./cloudflared tunnel --protocol http2 --url "http://127.0.0.1:${API_PORT}" > logs/tunnel.log 2>&1 &

          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' logs/tunnel.log | head -1 || true)
            [ -n "$TUNNEL_URL" ] && break
            sleep 3
          done

          [ -n "$TUNNEL_URL" ] || {
            echo "❌ Failed to get tunnel URL"
            tail -100 logs/tunnel.log
            exit 1
          }

          echo "✅ Tunnel URL: $TUNNEL_URL"
          echo "::notice::Public API: $TUNNEL_URL"
          echo "::notice::Chat completions: $TUNNEL_URL/v1/chat/completions"

          # Optional: update chat frontend repo config
          CHAT_REPO="${{ github.repository_owner }}/chat"
          CFG=$(jq -n --arg url "$TUNNEL_URL" '{apiUrl:$url}')
          ENC=$(echo "$CFG" | base64 -w0)
          INFO=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" || true)
          SHA=$(echo "$INFO" | jq -r '.sha // empty' 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            PAYLOAD=$(jq -n --arg msg "update API URL" --arg content "$ENC" --arg sha "$SHA" \
              '{message:$msg,content:$content,sha:$sha}')
            curl -s -X PUT -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" -d "$PAYLOAD"
          fi

          # Keep alive with health polling
          while kill -0 $EXO_PID 2>/dev/null; do
            if ! curl -fs --max-time 5 "http://127.0.0.1:${API_PORT}/v1/models" >/dev/null 2>&1; then
              echo "⚠️ Exo API health check failed"
              tail -80 logs/exo.log
            fi
            sleep 30
          done

          echo "❌ Exo queen died"
          tail -200 logs/exo.log
          exit 1
