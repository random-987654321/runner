name: Hive-Queen

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake

      - name: Build llama-cli
        run: |
          curl -Lo llama.cpp.zip https://github.com/ggml-org/llama.cpp/archive/refs/heads/master.zip
          unzip -q llama.cpp.zip
          cd llama.cpp-master
          mkdir build && cd build
          cmake .. -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target llama-cli
          cp bin/llama-cli ../../
          cd ../..
          chmod +x llama-cli

      - name: Download model
        run: |
          curl -Lo model.gguf https://huggingface.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF/resolve/main/granite-4.0-h-tiny-distill-opus-4.5-think-q4_k_m.gguf

      - name: Wait for workers and collect URLs
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.repository }}
        run: |
          echo "👑 Queen waiting for 19 workers..."
          for attempt in {1..60}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/workers.json")
            if [ "$(echo "$RESPONSE" | jq -r '.sha')" = "null" ]; then
              echo "  workers.json not yet created"
              sleep 5
              continue
            fi
            CONTENT_JSON=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)
            WORKER_COUNT=$(echo "$CONTENT_JSON" | jq '.workers | length')
            echo "  Attempt $attempt: $WORKER_COUNT workers registered"
            if [ "$WORKER_COUNT" -ge 19 ]; then
              echo "✅ All workers registered!"
              RPC_ADDRS=$(echo "$CONTENT_JSON" | jq -r '.workers | join(",")')
              echo "RPC_ADDRS=$RPC_ADDRS" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done
          if [ -z "$RPC_ADDRS" ]; then
            echo "❌ Timeout waiting for workers"
            exit 1
          fi

      - name: Run distributed inference
        run: |
          echo "🧠 Distributed inference with workers: ${RPC_ADDRS}"
          ./llama-cli -m model.gguf \
            --rpc ${RPC_ADDRS} \
            --tensor-split 19 \
            -p "What is the meaning of life?" \
            -n 256

      - name: Keep queen alive
        run: sleep infinity

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3, 4, 5]

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake

      - name: Install bore
        run: |
          curl -Lo bore.tar.gz https://github.com/ekzhang/bore/releases/latest/download/bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/
          bore --version

      - name: Build ggml-rpc-server
        run: |
          curl -Lo llama.cpp.zip https://github.com/ggml-org/llama.cpp/archive/refs/heads/master.zip
          unzip -q llama.cpp.zip
          cd llama.cpp-master
          mkdir build && cd build
          cmake .. -DGGML_RPC=ON -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target ggml-rpc-server
          cp bin/ggml-rpc-server ../../
          cd ../..
          chmod +x ggml-rpc-server

      - name: Start RPC server and register with bore
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.repository }}
          INSTANCE_ID: ${{ matrix.instance }}
        run: |
          echo "🐝 Worker $INSTANCE_ID starting..."
          PORT=$((65430 + INSTANCE_ID))

          ./ggml-rpc-server -p ${PORT} &
          sleep 5

          bore local ${PORT} --to bore.pub > /tmp/bore_url.txt 2>&1 &
          sleep 5

          BORE_URL=$(grep -oP 'bore\.pub:\d+' /tmp/bore_url.txt | head -1)
          if [ -z "$BORE_URL" ]; then
            echo "❌ Failed to get bore URL"
            cat /tmp/bore_url.txt
            exit 1
          fi
          echo "✅ Worker $INSTANCE_ID tunnel: ${BORE_URL}"

          # ---------- Register in workers.json with retry ----------
          for attempt in {1..30}; do
            echo "Attempt $attempt: Registering worker $INSTANCE_ID"

            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/workers.json")

            SHA=$(echo "$RESPONSE" | jq -r '.sha // ""')
            if [ "$SHA" = "null" ] || [ -z "$SHA" ]; then
              CONTENT_JSON='{"workers": []}'
              SHA=""
            else
              CONTENT_JSON=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)
            fi

            UPDATED_JSON=$(echo "$CONTENT_JSON" | jq --arg url "$BORE_URL" '.workers += [$url]')
            ENCODED=$(echo "$UPDATED_JSON" | base64 -w0)

            if [ -z "$SHA" ]; then
              PAYLOAD=$(jq -n --arg msg "register worker $INSTANCE_ID" --arg content "$ENCODED" \
                '{message: $msg, content: $content}')
            else
              PAYLOAD=$(jq -n --arg msg "register worker $INSTANCE_ID" --arg content "$ENCODED" --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}')
            fi

            RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/workers.json" \
              -d "$PAYLOAD")

            if echo "$RESPONSE" | jq -e '.message | contains("409")' > /dev/null; then
              echo "Conflict detected – retrying in 2 seconds..."
              sleep 2
              continue
            fi

            echo "✅ Worker $INSTANCE_ID registered successfully!"
            break
          done

          # Keep alive
          while true; do
            if ! pgrep -f "ggml-rpc-server" > /dev/null; then
              echo "⚠️ RPC server died, restarting..."
              ./ggml-rpc-server -p ${PORT} &
            fi
            if ! pgrep -f "bore" > /dev/null; then
              echo "⚠️ Bore tunnel died, restarting..."
              bore local ${PORT} --to bore.pub &
            fi
            sleep 30
          done
