name: P2P Inference Mesh – Adaptive Speculative RPC

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  WORKER_COUNT: 19               # change to 5 for testing
  DRAFT_MODEL_URL: "https://huggingface.co/bartowski/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.gguf"
  MAIN_MODEL_URL: "https://huggingface.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF/resolve/main/granite-4.0-h-tiny-DISTILL-4.5-opus-high-think-q4_k_m.gguf"

jobs:
  # ---------------------------------------------
  # 19 Workers – run rpc-server and register
  # ---------------------------------------------
  workers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker_id: [1, 2, 3, 4, 5]
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake nodejs npm
          sudo npm install -g holesail

      - name: Build rpc-server
        run: |
          curl -Lo llama.cpp.zip https://github.com/ggml-org/llama.cpp/archive/refs/tags/b8487.zip
          unzip -q llama.cpp.zip
          cd llama.cpp-b8487
          mkdir build && cd build
          cmake .. -DGGML_NATIVE=ON -DGGML_RPC=ON -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target rpc-server
          cp bin/rpc-server ../../
          cd ../..
          chmod +x rpc-server

      - name: Start rpc-server and expose via Holesail
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
          WORKER_ID: ${{ matrix.worker_id }}
        run: |
          set -e
          PORT=50052
          # Use all 4 vCPUs for the RPC server
          nohup ./rpc-server -H 0.0.0.0 -p ${PORT} -t 4 -c > rpc.log 2>&1 &
          sleep 3

          holesail --live ${PORT} > /tmp/holesail_output.txt 2>&1 &
          sleep 5
          CONNECTION_STRING=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_output.txt | head -1)
          if [ -z "$CONNECTION_STRING" ]; then
            echo "❌ Failed to get Holesail URL"
            cat /tmp/holesail_output.txt
            exit 1
          fi

          echo "✅ Worker $WORKER_ID: ${CONNECTION_STRING}"
          mkdir -p workers
          echo "{\"url\": \"${CONNECTION_STRING}\"}" > workers/worker${WORKER_ID}.json
          ENCODED=$(base64 -w0 workers/worker${WORKER_ID}.json)

          for attempt in {1..10}; do
            FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/worker${WORKER_ID}.json")
            SHA=$(echo "$FILE_INFO" | jq -r '.sha' 2>/dev/null)
            if [ "$SHA" != "null" ] && [ -n "$SHA" ]; then
              PAYLOAD=$(jq -n --arg msg "register worker $WORKER_ID" \
                --arg content "$ENCODED" --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}')
            else
              PAYLOAD=$(jq -n --arg msg "register worker $WORKER_ID" \
                --arg content "$ENCODED" \
                '{message: $msg, content: $content}')
            fi
            RESPONSE=$(curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers/worker${WORKER_ID}.json" \
              -d "$PAYLOAD")
            if echo "$RESPONSE" | jq -e '.content' > /dev/null; then
              echo "✅ Worker $WORKER_ID registered"
              break
            fi
            sleep 3
          done

          # Keep alive with restart logic
          while true; do
            if ! pgrep -f "rpc-server" > /dev/null; then
              echo "⚠️ rpc-server died, restarting..."
              nohup ./rpc-server -H 0.0.0.0 -p ${PORT} -t 4 -c > rpc.log 2>&1 &
            fi
            if ! pgrep -f "holesail" > /dev/null; then
              echo "⚠️ Holesail died, restarting..."
              holesail --live ${PORT} > /tmp/holesail_output.txt 2>&1 &
            fi
            sleep 30
          done

  # ---------------------------------------------
  # Queen – coordinator with adaptive RPC + speculation
  # ---------------------------------------------
  queen:
    needs: workers
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake nodejs npm netcat-openbsd
          sudo npm install -g holesail

      - name: Build llama-server (with RPC)
        run: |
          curl -Lo llama.cpp.zip https://github.com/ggml-org/llama.cpp/archive/refs/tags/b8487.zip
          unzip -q llama.cpp.zip
          cd llama.cpp-b8487
          mkdir build && cd build
          cmake .. -DGGML_NATIVE=ON -DGGML_RPC=ON -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target llama-server
          cp bin/llama-server ../../
          cd ../..
          chmod +x llama-server

      - name: Download main model (the large one)
        run: |
          curl -L -o main.gguf "$MAIN_MODEL_URL" -f --retry 3

      - name: Download draft model (smaller, for speculation)
        run: |
          curl -L -o draft.gguf "$DRAFT_MODEL_URL" -f --retry 3

      - name: Clean and wait for workers
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Clean old worker files
          echo "🧹 Cleaning workers/ directory..."
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null)
          echo "$RESPONSE" | jq -r '.[] | select(.type == "file") | .name + ":" + .sha' 2>/dev/null | while IFS=':' read -r name sha; do
            if [ -n "$name" ] && [ -n "$sha" ]; then
              curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/contents/workers/${name}" \
                -d "{\"message\":\"cleanup\",\"sha\":\"${sha}\"}" || true
            fi
          done

          echo "👑 Waiting for $WORKER_COUNT workers..."
          for attempt in {1..90}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null)
            if [ "$(echo "$RESPONSE" | jq -r '.message' 2>/dev/null)" = "Not Found" ]; then
              COUNT=0
            else
              FILES=$(echo "$RESPONSE" | jq -r '.[] | select(.type == "file") | .name' 2>/dev/null)
              COUNT=$(echo "$FILES" | grep -c . || echo 0)
            fi
            echo "  Attempt $attempt: $COUNT/$WORKER_COUNT registered"
            if [ "$COUNT" -ge $WORKER_COUNT ]; then break; fi
            sleep 5
          done
          if [ "$COUNT" -lt $WORKER_COUNT ]; then
            echo "❌ Timeout waiting for workers"
            exit 1
          fi

      - name: Connect to workers and build adaptive RPC list
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🔗 Connecting to $WORKER_COUNT workers..."
          BASE_PORT=60000
          RPC_ADDRS=""
          for i in $(seq 1 $WORKER_COUNT); do
            file="worker${i}.json"
            curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${REPO}/contents/workers/${file}" > /tmp/worker.json
            URL=$(jq -r '.content' /tmp/worker.json | base64 -d | jq -r '.url')
            if [ -z "$URL" ] || [ "$URL" = "null" ]; then
              echo "❌ Worker $i URL missing"
              exit 1
            fi
            PORT=$((BASE_PORT + i - 1))
            holesail --connect "$URL" --port $PORT &
            if [ -z "$RPC_ADDRS" ]; then
              RPC_ADDRS="127.0.0.1:${PORT}"
            else
              RPC_ADDRS="${RPC_ADDRS},127.0.0.1:${PORT}"
            fi
          done
          echo "RPC_ADDRS=$RPC_ADDRS" >> $GITHUB_ENV
          echo "✅ All workers connected. RPC list: $RPC_ADDRS"
          sleep 10  # let tunnels stabilise

      - name: Start llama-server with adaptive speculation and micro‑batching
        env:
          RPC_ADDRS: ${{ env.RPC_ADDRS }}
        run: |
          echo "🚀 Starting llama-server with adaptive RPC + speculation..."
          nohup ./llama-server \
            -m main.gguf \
            -md draft.gguf \
            --draft 8 \
            -t 2 \
            -tb 4 \
            --rpc ${RPC_ADDRS} \
            -fa on \
            -ngl 0 \
            -c 2048 \
            --no-mmap \
            > server.log 2>&1 &

          # Health check with retry
          for i in {1..120}; do
            if curl -s http://localhost:8080/health > /dev/null; then
              echo "✅ llama-server ready"
              break
            fi
            echo "⏳ Waiting for server... ($i/120)"
            sleep 2
          done
          if ! curl -s http://localhost:8080/health > /dev/null; then
            echo "❌ llama-server failed – showing log:"
            cat server.log
            exit 1
          fi

          # Cloudflare tunnel
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > tunnel.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "✅ Public API: $TUNNEL_URL"
            echo "::notice::API available at $TUNNEL_URL"
          else
            echo "⚠️ Tunnel not ready – check tunnel.log"
          fi

          # Keep alive
          sleep infinity
