name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119
  NGINX_PROXY_PORT: 8080

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Provision system binaries, Nginx, and cloudflared
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip python3-venv netcat-openbsd nginx
          
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Setup Ollama runtime engine
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required weight files natively
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Install official hermes-agent
      - name: Install Official Hermes Agent
        run: |
          python3 -m pip install --upgrade pip
          pip install "hermes-agent[web,pty]"

      # 5. Pre-seed local environment configurations
      - name: Pre-configure Hermes Runtime Environment
        run: |
          mkdir -p ~/.hermes
          cat << 'EOF' > ~/.hermes/config.yaml
          provider: "ollama"
          model: "granite4:tiny-h"
          providers:
            ollama:
              base_url: "http://127.0.0.1:11434"
          EOF

      # 6. Configure Nginx with Buffering Disabled for Streaming Data
      - name: Configure Nginx Reverse Proxy
        run: |
          cat << 'EOF' | sudo tee /etc/nginx/sites-available/default > /dev/null
          server {
              listen 8080 default_server;
              listen [::]:8080 default_server;

              location / {
                  proxy_pass http://127.0.0.1:9119;
                  
                  # Force host header matching loopback targets
                  proxy_set_header Host 127.0.0.1:9119;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;

                  # Seamless WebSocket pipeline parameters
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  
                  # CRITICAL: Disable response buffering for Server-Sent Events (SSE) & Streams
                  proxy_buffering off;
                  proxy_cache off;
                  chunked_transfer_encoding off;
                  
                  # Keep connections active without aggressive timeouts
                  proxy_read_timeout 86400s;
                  proxy_send_timeout 86400s;
              }
          }
          EOF
          sudo systemctl restart nginx

      # 7. Start Hermes Dashboard completely vanilla on local loopback
      - name: Start Hermes Native Dashboard
        run: |
          nohup hermes dashboard \
            --host 127.0.0.1 \
            --port ${{ env.HERMES_DASHBOARD_PORT }} \
            --no-open \
            --skip-build > hermes_dashboard.log 2>&1 &
          
          echo "⏳ Waiting for dashboard to bind to 127.0.0.1:${{ env.HERMES_DASHBOARD_PORT }}..."
          for i in {1..30}; do
            if nc -z 127.0.0.1 ${{ env.HERMES_DASHBOARD_PORT }}; then
              echo "✅ Dashboard is online!"
              break
            fi
            sleep 3
          done

      # 8. Point Cloudflare Tunnel directly to the Nginx Edge Proxy
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel \
            --url http://127.0.0.1:${{ env.NGINX_PROXY_PORT }} \
            --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 3
          done
          sleep 5

      # 9. Print access route and maintain keep-alive
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "================================================================="
          sleep infinity
