name: Server

on:
  workflow_dispatch:

permissions:
  actions: write   

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360   

    steps:
      # --------------------------------------------------------------------
      # 1. Check out the backend repository
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/backend
          token: ${{ secrets.TOKEN }}
          path: backend

      # --------------------------------------------------------------------
      # 2. Restore caches (if they exist from previous runs)
      - uses: actions/cache@v4
        id: binary-cache
        with:
          path: backend/target/release/unified-api
          key: rust-binary-${{ runner.os }}-${{ hashFiles('backend/Cargo.toml', 'backend/src/**') }}
          restore-keys: rust-binary-${{ runner.os }}-

      - uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ hashFiles('.github/workflows/server.yml') }}
          restore-keys: ollama-models-

      - uses: actions/cache@v4
        id: cloudflared-cache
        with:
          path: ./cloudflared
          key: cloudflared-${{ runner.os }}-v1

      # --------------------------------------------------------------------
      # 3. Set up Rust and build (only on cache miss)
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Build Rust binary (if cache miss)
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cd backend
          cargo build --release
          cp target/release/unified-api ./

      # --------------------------------------------------------------------
      # 4. Save binary cache (only if we built it)
      - name: Save binary cache
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: backend/target/release/unified-api
          key: rust-binary-${{ runner.os }}-${{ hashFiles('backend/Cargo.toml', 'backend/src/**') }}

      # --------------------------------------------------------------------
      # 5. Pull Ollama models (cached after first run)
      - uses: ai-action/setup-ollama@v2
      - name: Pull Ollama models
        run: |
          ollama pull gemma3:1b
          ollama pull qwen3-embedding:0.6b

      # --------------------------------------------------------------------
      # 6. Save Ollama cache (always – it will skip if key already exists)
      - name: Save Ollama cache
        uses: actions/cache/save@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ hashFiles('.github/workflows/server.yml') }}

      # --------------------------------------------------------------------
      # 7. Download cloudflared (if not cached)
      - name: Download cloudflared
        if: steps.cloudflared-cache.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      # --------------------------------------------------------------------
      # 8. Save cloudflared cache (only if we downloaded it)
      - name: Save cloudflared cache
        if: steps.cloudflared-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./cloudflared
          key: cloudflared-${{ runner.os }}-v1

      # --------------------------------------------------------------------
      # 9. Start the server, create tunnel, update config, and self‑replicate
      #    This step runs forever – the caches were already saved above.
      - name: Run server & self‑replicate
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          cd backend

          # Start the server
          chmod +x ./unified-api
          pkill -f unified-api 2>/dev/null || true
          ./unified-api &

          # Wait for health
          for i in {1..10}; do
            if curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              break
            fi
            sleep 2
          done
          curl -s http://localhost:8000/health | grep -q '"status":"ok"' || exit 1

          # Start Cloudflare tunnel
          if [ ! -f ../cloudflared ]; then
            curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ../cloudflared
            chmod +x ../cloudflared
          fi
          pkill -f cloudflared 2>/dev/null || true
          ../cloudflared tunnel --protocol http2 --url http://localhost:8000 2>&1 | tee tunnel.log &

          # Extract tunnel URL
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 1
          done
          echo "::notice::Tunnel URL: ${TUNNEL_URL}"

          # Update config.js in the chat repository
          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG="const API_URL = \"${TUNNEL_URL}\";"
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)

          FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.js")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')

          if [ "$SHA" != "null" ]; then
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"update API URL\",\"content\":\"${ENCODED}\",\"sha\":\"${SHA}\"}"
          else
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"add API URL\",\"content\":\"${ENCODED}\"}"
          fi
          echo "::notice::Frontend URL: https://${{ github.repository_owner }}.github.io/chat/"

          # Self‑replication: trigger a new run ~5 minutes before timeout
          START_TIME=$(date +%s)
          TRIGGER_AT=$(( 350 * 60 ))   # 5 hours 50 minutes
          TRIGGERED=false

          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))

            if [ $ELAPSED -ge $TRIGGER_AT ] && [ "$TRIGGERED" = "false" ]; then
              echo "Triggering replacement workflow..."
              curl -X POST \
                -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"${{ github.ref }}"}'
              TRIGGERED=true
            fi

            # Health checks – restart if needed
            if ! curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Server down – restarting..."
              pkill -f unified-api 2>/dev/null || true
              ./unified-api &
            fi
            if ! pgrep -f cloudflared > /dev/null; then
              echo "Tunnel down – restarting..."
              ../cloudflared tunnel --protocol http2 --url http://localhost:8000 2>&1 | tee -a tunnel.log &
            fi

            sleep 30
          done
