name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  GATEWAY_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install Queen Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm jq
          curl -fsSL https://ollama.com/install.sh | sh
          sudo npm install -g openclaw holesail
          
          # Fetch cloudflared binary
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Start Ollama Engine
        run: |
          ollama serve &
          sleep 5
          ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Configure OpenClaw File Architecture
        run: |
          # 1. Generate core openclaw configuration directories
          mkdir -p ~/.openclaw
          mkdir -p ~/.openclaw/workspace/skills/run_worker
          
          # 2. Inject configuration structure with wide-open CORS for the dynamic tunnel URLs
          cat << 'EOF' > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "port": 18789,
              "bind": "loopback",
              "auth": {
                "mode": "none"
              },
              "controlUi": {
                "allowedOrigins": ["*"]
              },
              "cors": {
                "origin": "*",
                "methods": ["GET", "POST", "PUT", "DELETE", "OPTIONS"],
                "allowedHeaders": ["Content-Type", "Authorization"]
              }
            },
            "agents": {
              "defaults": {
                "model": "ollama/granite4:tiny-h"
              }
            },
            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "http://localhost:11434",
                  "models": [
                    { 
                      "id": "granite4:tiny-h", 
                      "name": "granite4:tiny-h",
                      "api": "ollama" 
                    }
                  ]
                }
              }
            }
          }
          EOF

          # 3. Create the markdown tool registration manifest for OpenClaw
          cat << 'EOF' > ~/.openclaw/workspace/skills/run_worker/SKILL.md
          # run_worker
          
          Execute a query in an autonomous, temporary GitHub Actions worker over Holesail.
          
          ## Configuration
          - type: command
          - command: /home/runner/work/runner/runner/scripts/worker_launcher.sh
          
          ## Parameters
          - query (string): The precise task query to be executed by the worker.
          EOF

          # 4. Enforce execution permissions on the worker orchestrator script
          chmod +x $GITHUB_WORKSPACE/scripts/worker_launcher.sh
          
          
      - name: Start Gateway Engine
        run: |
          openclaw gateway start &
          sleep 5
          for i in {1..20}; do
            if curl -s http://localhost:${{ env.GATEWAY_PORT }} > /dev/null || [ $? -eq 52 ]; then
              echo "✅ Gateway active and listening on port ${{ env.GATEWAY_PORT }}"
              break
            fi
            sleep 2
          done

      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://localhost:${{ env.GATEWAY_PORT }} > tunnel.log 2>&1 &
          for i in {1..30}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 3
          done

      - name: Print Orchestration Access Route
        run: |
          echo "================================================================="
          echo "🌐 OpenClaw Web UI: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "================================================================="
          sleep infinity
