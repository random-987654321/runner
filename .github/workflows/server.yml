name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  GATEWAY_PORT: 18789
  SCRIPT_DIR: /tmp/queen

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install Queen Core Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm jq
          curl -fsSL https://ollama.com/install.sh | sh
          sudo npm install -g openclaw holesail
          
          # Fetch Cloudflared
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Boot Ollama & Pull Model
        run: |
          ollama serve &
          sleep 5
          ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Configure OpenClaw Engine
        run: |
          # Use baseline setup to cleanly initialize directories and base files
          openclaw setup --baseline
          
          # Apply your specific runtime configurations
          openclaw config set models.providers.ollama.baseUrl "http://localhost:11434"
          openclaw config set models.providers.ollama.models '[{"id":"granite4:tiny-h","api":"ollama"}]'
          openclaw config set agents.default.model "ollama/granite4:tiny-h"
          openclaw config set agents.default.skills '["run_worker"]'
          
          # Map OpenClaw skill to our custom API launcher script
          openclaw config set skills.run_worker.type "command"
          openclaw config set skills.run_worker.command "$GITHUB_WORKSPACE/scripts/worker_launcher.sh"
          openclaw config set skills.run_worker.description "Deploys a secure standalone worker runner over Holesail"
          openclaw config set skills.run_worker.parameters.query.type "string"
          openclaw config set skills.run_worker.parameters.query.description "Task for the worker execution"
          openclaw config set gateway.port ${{ env.GATEWAY_PORT }}

      - name: Start Gateway & Expose via Cloudflare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          openclaw gateway start &
          sleep 5
          
          # Start Tunneling for Remote Access
          nohup ./cloudflared tunnel --url http://localhost:${{ env.GATEWAY_PORT }} > tunnel.log 2>&1 &
          sleep 5
          
          URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          echo "================================================================="
          echo "🌐 QUEEN WEB UI PORTAL: $URL"
          echo "================================================================="
          
          # Keep runner alive to process jobs
          sleep infinity
