name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip netcat-openbsd
          pip install "hermes-agent[web,pty]"
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2
      - run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Launch Hermes Dashboard
        run: |
          mkdir -p ~/.hermes
          # Start dashboard in the background
          # Note: Using 0.0.0.0 ensures it binds to all network interfaces
          nohup hermes dashboard \
            --host 0.0.0.0 \
            --port ${{ env.HERMES_DASHBOARD_PORT }} \
            --no-open \
            --skip-build > hermes.log 2>&1 &
          
          # CRITICAL: Wait until the port is actually responding
          echo "Waiting for Hermes Dashboard to be responsive..."
          for i in {1..40}; do
            if curl -s http://127.0.0.1:${{ env.HERMES_DASHBOARD_PORT }} > /dev/null; then
              echo "Dashboard is live!"
              break
            fi
            echo "Waiting ($i/40)..."
            sleep 5
          done

      - name: Start Cloudflare Tunnel
        id: tunnel
        run: |
          # Start tunnel WITHOUT host header overrides to prevent gateway errors
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.HERMES_DASHBOARD_PORT }} > tunnel.log 2>&1 &
          
          # Capture the URL
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 3
          done

      - name: Access Endpoint
        run: |
          echo "🌐 PORTAL READY: ${{ steps.tunnel.outputs.tunnel_url }}"
          sleep infinity

      - name: Debug Logs
        if: always()
        run: |
          echo "--- Hermes Logs ---"
          cat hermes.log
          echo "--- Tunnel Logs ---"
          cat tunnel.log
