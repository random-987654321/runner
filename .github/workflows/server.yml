name: Queen (Hermes Agent + Ollama)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Install dependencies ----------
      - name: Install Ollama & Hermes Agent
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl
          curl -fsSL https://ollama.com/install.sh | sh
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          # Add Hermes to PATH
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"
          # Install Cloudflared
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # ---------- Start Ollama ----------
      - name: Start Ollama & pull model
        run: |
          pkill -f ollama || true
          sleep 2
          ollama serve &
          sleep 10
          ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Configure Hermes Agent ----------
      - name: Configure Hermes
        run: |
          mkdir -p ~/.hermes
          cat > ~/.hermes/config.yaml << EOF
          model:
            provider: ollama
            model: ${{ env.OLLAMA_MODEL }}
            baseUrl: http://localhost:11434
          gateway:
            port: ${{ env.HERMES_PORT }}
            host: 0.0.0.0
            controlUi:
              enabled: true
              allowedOrigins:
                - "*"
          EOF

      # ---------- Start Hermes Gateway ----------
      - name: Start Hermes Gateway
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          hermes gateway start --host 0.0.0.0 --port ${{ env.HERMES_PORT }} &
          sleep 10
          # Verify it's running
          for i in {1..20}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/health > /dev/null; then
              echo "✅ Gateway ready"
              break
            fi
            sleep 2
          done

      # ---------- Start Cloudflare Tunnel ----------
      - name: Start Cloudflare Tunnel
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://localhost:${{ env.HERMES_PORT }} > tunnel.log 2>&1 &
          TUNNEL_URL=""
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            sleep 3
          done
          if [ -z "$TUNNEL_URL" ]; then
            cat tunnel.log
            exit 1
          fi
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      # ---------- Print access ----------
      - name: Print access
        env:
          TUNNEL_URL: ${{ steps.tunnel.outputs.tunnel_url }}
        run: |
          echo "================================================================="
          echo "🌐 Hermes Agent Web UI is available at:"
          echo "   $TUNNEL_URL"
          echo ""
          echo "💡 Open this URL in your browser and start chatting!"
          echo "================================================================="
          # Keep runner alive
          sleep infinity
