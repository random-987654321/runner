name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_UI_PORT: 8787  

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Update package managers and provision system environment binaries
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git python3-pip netcat-openbsd
          
          # Fetch cloudflared binary directly for external connection routes
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Setup Ollama runtime environment
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required weight files natively
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Clone and launch the official Hermes WebUI Server with Provider variables
      - name: Deploy Hermes WebUI Workspace
        run: |
          git clone https://github.com/nesquena/hermes-webui.git hermes-ui-repo
          cd hermes-ui-repo
          
          # 🔗 CRITICAL FIX: Explicitly passing provider variables forces the UI 
          # to pick up your local Ollama runtime and map its pulled models.
          export HERMES_PROVIDER="ollama"
          export OLLAMA_HOST="http://127.0.0.1:11434"
          
          nohup bash start.sh > ../hermes_ui.log 2>&1 &
          cd ..
          
          echo "⏳ Waiting for Hermes WebUI server to bind to port ${{ env.HERMES_UI_PORT }}..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:${{ env.HERMES_UI_PORT }} > /dev/null || [ $? -eq 52 ]; then
              echo "✅ Hermes Community WebUI successfully verified online!"
              break
            fi
            sleep 3
          done

      # 5. Connect Cloudflare Tunnel straight to the native Hermes UI port (8787)
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.HERMES_UI_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      # 6. Print accurate access route guidelines and maintain loop persistence
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          BASE_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES WEBUI PORTAL READY:"
          echo "👉 ${BASE_URL}"
          echo "================================================================="
          echo ""
          echo "--- DASHBOARD STATUS (Previewing WebUI Workspace Boot Log) ---"
          head -n 25 hermes_ui.log || true
          echo "================================================================="
          sleep infinity
