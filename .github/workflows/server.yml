name: Queen (Hermes + Ollama) with Holesail Shell

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  SHELL_PORT: 2222

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install socat & Holesail ----------
      - name: Install socat and Holesail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y socat nodejs npm
          sudo npm install -g holesail

      # ---------- Start Ollama service ----------
      - name: Start Ollama
        run: ollama serve &

      # ---------- Start shell server via socat ----------
      - name: Start shell server
        run: |
          # socat listens on port 2222 and spawns a bash shell for each connection
          socat TCP-LISTEN:${{ env.SHELL_PORT }},fork EXEC:/bin/bash,pty,stderr,setsid,sigint,sane &
          sleep 2

      # ---------- Expose shell port via Holesail ----------
      - name: Expose shell with Holesail
        id: holesail
        run: |
          # Start Holesail server exposing port 2222
          holesail --live ${{ env.SHELL_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      # ---------- Print instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To get a shell on the runner:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Connect to the runner's shell port:"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.SHELL_PORT }}"
          echo ""
          echo "   3. In another terminal, connect to the local forwarded port:"
          echo "      nc localhost ${{ env.SHELL_PORT }}"
          echo ""
          echo "   4. You now have a bash shell on the runner!"
          echo "      Run 'hermes chat --model ${{ env.OLLAMA_MODEL }}' to start chatting."
          echo ""
          echo "💡 The connection is direct P2P – no lag!"
          echo "================================================================="
          sleep infinity
