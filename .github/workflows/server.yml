name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm python3 python3-pip jq
          # Install Holesail
          sudo npm install -g holesail
          # Install Ollama
          curl -fsSL https://ollama.com/install.sh | sh
          # Install OpenClaw
          npm install -g openclaw
          echo "$(npm root -g)/bin" >> $GITHUB_PATH
          # Install cloudflared
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Start Ollama and pull model
        run: |
          ollama serve &
          sleep 5
          ollama pull granite4:tiny-h

      - name: Create result server (Python)
        run: |
          cat > /tmp/result_server.py << 'EOF'
          import os
          import json
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import threading

          RESULTS_FILE = "results.json"
          lock = threading.Lock()

          class ResultHandler(BaseHTTPRequestHandler):
              def do_POST(self):
                  if self.path == '/result':
                      length = int(self.headers.get('Content-Length', 0))
                      body = self.rfile.read(length).decode()
                      try:
                          data = json.loads(body)
                          task_id = data.get('task_id')
                          result = data.get('result')
                          secret = data.get('secret')
                          with lock:
                              if os.path.exists(RESULTS_FILE):
                                  with open(RESULTS_FILE, 'r') as f:
                                      results = json.load(f)
                              else:
                                  results = {}
                              results[task_id] = {'result': result, 'secret': secret}
                              with open(RESULTS_FILE, 'w') as f:
                                  json.dump(results, f, indent=2)
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b'OK')
                      except Exception as e:
                          self.send_response(400)
                          self.end_headers()
                          self.wfile.write(str(e).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()

              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  else:
                      self.send_response(404)
                      self.end_headers()

          def run():
              server = HTTPServer(('0.0.0.0', 8000), ResultHandler)
              print("✅ Result server listening on port 8000")
              server.serve_forever()

          if __name__ == '__main__':
              run()
          EOF
          python3 /tmp/result_server.py &
          sleep 2

      - name: Generate Holesail key and expose result server
        id: holesail
        run: |
          # Generate a random 16-byte key as hex
          KEY=$(openssl rand -hex 16)
          echo "key=$KEY" >> $GITHUB_OUTPUT
          echo "🚀 Holesail key: $KEY"
          # Start Holesail server exposing port 8000
          holesail --live 8000 --key "$KEY" &
          sleep 5

      - name: Configure OpenClaw with tools
        run: |
          mkdir -p ~/.openclaw
          cat > ~/.openclaw/openclaw.json << 'EOF'
          {
            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "http://localhost:11434",
                  "models": [{"id": "granite4:tiny-h", "api": "ollama"}]
                }
              }
            },
            "agents": {
              "defaults": {
                "model": { "primary": "ollama/granite4:tiny-h" },
                "tools": ["spawn_workers", "check_results"]
              }
            },
            "tools": {
              "spawn_workers": {
                "type": "command",
                "command": "bash /tmp/spawn_workers.sh",
                "description": "Spawn GitHub Actions workers with Holesail key.",
                "parameters": {
                  "subtasks": {
                    "type": "string",
                    "description": "JSON array of objects with 'id' and 'description'."
                  }
                }
              },
              "check_results": {
                "type": "command",
                "command": "bash /tmp/check_results.sh",
                "description": "Show aggregated results from all workers.",
                "parameters": {}
              }
            }
          }
          EOF

      - name: Create helper scripts
        env:
          HOLESAIL_KEY: ${{ steps.holesail.outputs.key }}
          REPO: ${{ github.repository }}
        run: |
          # spawn_workers.sh
          cat > /tmp/spawn_workers.sh << 'SCRIPT'
          #!/bin/bash
          SUBTASKS="$1"
          echo "$SUBTASKS" | jq -c '.[]' | while read -r item; do
            id=$(echo "$item" | jq -r '.id')
            desc=$(echo "$item" | jq -r '.description')
            echo "Spawning worker for task: $id"
            gh workflow run worker.yaml -f task_id="$id" -f task_description="$desc" -f holesail_key="$HOLESAIL_KEY" --repo ${{ github.repository }}
            sleep 1
          done
          echo "✅ Workers spawned."
          SCRIPT
          chmod +x /tmp/spawn_workers.sh

          # check_results.sh
          cat > /tmp/check_results.sh << 'SCRIPT'
          #!/bin/bash
          if [ ! -f results.json ]; then
            echo "No results yet. Wait for workers to finish."
            exit 0
          fi
          cat results.json | jq .
          SCRIPT
          chmod +x /tmp/check_results.sh

      - name: Start OpenClaw Gateway
        run: |
          openclaw gateway start --port 18789 &
          for i in {1..30}; do
            if curl -s http://localhost:18789/health > /dev/null; then
              echo "✅ Gateway ready"
              break
            fi
            sleep 2
          done

      - name: Start Cloudflare Tunnel
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://localhost:18789 > tunnel.log 2>&1 &
          for i in {1..30}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then echo "tunnel_url=$URL" >> $GITHUB_OUTPUT; break; fi
            sleep 3
          done

      - name: Allow tunnel origin
        env:
          TUNNEL_URL: ${{ steps.tunnel.outputs.tunnel_url }}
        run: |
          openclaw config set gateway.controlUi.allowedOrigins '["'"$TUNNEL_URL"'"]'
          pkill -f "openclaw gateway" || true
          sleep 2
          openclaw gateway start --port 18789 &
          sleep 5

      - name: Print access
        run: |
          echo "🌐 OpenClaw Web UI: ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "🔑 Holesail key: ${{ steps.holesail.outputs.key }}"
          echo "💡 Ask the Queen to spawn workers with a JSON list of sub‑tasks."
          sleep infinity
