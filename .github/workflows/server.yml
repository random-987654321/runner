name: Hive-Queen

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  # =====================================================================
  # QUEEN JOB – Orchestrates everything + serves llama-server
  # =====================================================================
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake socat openssl

      # ----- Generate SSL Certificate for secure tunnels -----
      - name: Generate SSL certificate
        run: |
          openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem \
            -days 365 -nodes -subj "/CN=localhost"

      - name: Build llama-cli and llama-server with RPC support
        run: |
          curl -Lo llama.cpp.zip https://github.com/ggml-org/llama.cpp/archive/refs/heads/master.zip
          unzip -q llama.cpp.zip
          cd llama.cpp-master
          mkdir build && cd build
          cmake .. -DGGML_RPC=ON -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target llama-cli --target llama-server
          cp bin/llama-cli bin/llama-server ../../
          cd ../..
          chmod +x llama-cli llama-server
          if ./llama-server --help 2>&1 | grep -q rpc; then
            echo "✅ llama-server RPC support enabled"
          else
            echo "❌ llama-server RPC support missing"
            exit 1
          fi

      - name: Download model (GGUF)
        run: |
          MODEL_URL="https://huggingface.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF/resolve/main/granite-4.0-h-tiny-DISTILL-4.5-opus-high-think-q4_k_m.gguf"
          echo "📦 Downloading model from: $MODEL_URL"
          curl -L -o model.gguf "$MODEL_URL" -f --retry 3 --retry-delay 2
          if [ "$(head -c 4 model.gguf)" = "GGUF" ]; then
            echo "✅ Valid GGUF file downloaded"
            ls -lh model.gguf
          else
            echo "❌ Invalid GGUF file"
            exit 1
          fi

      # ----- Start socat tunnels to workers -----
      - name: Start secure tunnels to workers
        env:
          WORKER1: "100.64.0.10"
          WORKER2: "100.64.0.20"
          WORKER1_PORT: "4443"
          WORKER2_PORT: "4443"
        run: |
          echo "🔐 Starting secure tunnels to workers..."
          
          # Tunnel to Worker 1
          nohup socat openssl-listen:${WORKER1_PORT},reuseaddr,fork,cert=cert.pem,key=key.pem,verify=0 \
            tcp:${WORKER1}:50052 > tunnel1.log 2>&1 &
          
          # Tunnel to Worker 2
          nohup socat openssl-listen:${WORKER2_PORT},reuseaddr,fork,cert=cert.pem,key=key.pem,verify=0 \
            tcp:${WORKER2}:50052 > tunnel2.log 2>&1 &
          
          sleep 5
          echo "✅ Secure tunnels started"

      # ----- Start llama-server with RPC via secure tunnels -----
      - name: Start llama-server and Cloudflare tunnel
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          WORKER1: "localhost"
          WORKER2: "localhost"
          WORKER1_PORT: "4443"
          WORKER2_PORT: "4443"
        run: |
          echo "🌐 Starting llama-server with RPC workers via secure tunnels..."
          RPC_ADDRS="${WORKER1}:${WORKER1_PORT},${WORKER2}:${WORKER2_PORT}"
          echo "RPC_ADDRS: ${RPC_ADDRS}"

          # Start llama-server with RPC
          nohup ./llama-server \
            -m model.gguf \
            --rpc ${RPC_ADDRS} \
            --split-mode layer \
            -c 4096 \
            --host 0.0.0.0 \
            --port 8080 \
            > server.log 2>&1 &

          # Wait for server to be ready
          for i in {1..20}; do
            if curl -s http://localhost:8080/health > /dev/null; then
              echo "✅ llama-server is ready"
              break
            fi
            echo "⏳ Waiting for llama-server... ($i/20)"
            sleep 2
          done
          if ! curl -s http://localhost:8080/health > /dev/null; then
            echo "❌ llama-server failed to start"
            cat server.log
            exit 1
          fi

          # Start Cloudflare tunnel to port 8080
          echo "🌐 Starting Cloudflare tunnel..."
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > tunnel.log 2>&1 &

          # Extract tunnel URL
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            echo "⏳ Waiting for tunnel... ($i/30)"
            sleep 3
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            tail -50 tunnel.log
            exit 1
          fi

          # Update config.json in the chat repo
          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG=$(jq -n --arg url "$TUNNEL_URL" '{apiUrl: $url}')
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)
          FILE_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')
          if [ "$SHA" != "null" ]; then
            PAYLOAD=$(jq -n --arg msg "update API URL" --arg content "$ENCODED" --arg sha "$SHA" \
              '{message: $msg, content: $content, sha: $sha}')
            curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" \
              -d "$PAYLOAD"
          fi
          echo "::notice::Frontend URL: https://$CHAT_REPO"

          # Keep alive
          echo "🔄 Queen is serving. Keeping alive..."
          sleep infinity

  # =====================================================================
  # WORKER JOB – Runs on self‑hosted runners (VPS/cloud instances)
  # =====================================================================
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2]

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl build-essential cmake socat openssl

      - name: Generate SSL certificate
        run: |
          openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem \
            -days 365 -nodes -subj "/CN=localhost"

      - name: Build ggml-rpc-server
        run: |
          curl -Lo llama.cpp.zip https://github.com/ggml-org/llama.cpp/archive/refs/heads/master.zip
          unzip -q llama.cpp.zip
          cd llama.cpp-master
          mkdir build && cd build
          cmake .. -DGGML_RPC=ON -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target ggml-rpc-server
          cp bin/ggml-rpc-server ../../
          cd ../..
          chmod +x ggml-rpc-server

      - name: Start ggml-rpc-server and secure tunnel
        env:
          INSTANCE_ID: ${{ matrix.instance }}
        run: |
          echo "🐝 Worker $INSTANCE_ID starting..."

          PORT=50052
          WORKER_IP="0.0.0.0"  # Bind to all interfaces

          # Start ggml-rpc-server
          ./ggml-rpc-server -H ${WORKER_IP} -p ${PORT} -c &
          sleep 5

          # Start socat tunnel to forward encrypted traffic to the RPC server
          # The Queen will connect to this tunnel
          nohup socat openssl-listen:4443,reuseaddr,fork,cert=cert.pem,key=key.pem,verify=0 \
            tcp:127.0.0.1:${PORT} > tunnel.log 2>&1 &

          echo "✅ Worker $INSTANCE_ID is ready"
          echo "   RPC server: ${WORKER_IP}:${PORT}"
          echo "   Secure tunnel: port 4443 (SSL)"

          # Keep alive
          while true; do
            if ! pgrep -f "ggml-rpc-server" > /dev/null; then
              echo "⚠️ RPC server died, restarting..."
              ./ggml-rpc-server -H ${WORKER_IP} -p ${PORT} -c &
            fi
            if ! pgrep -f "socat" > /dev/null; then
              echo "⚠️ Socat tunnel died, restarting..."
              nohup socat openssl-listen:4443,reuseaddr,fork,cert=cert.pem,key=key.pem,verify=0 \
                tcp:127.0.0.1:${PORT} > tunnel.log 2>&1 &
            fi
            sleep 30
          done
