name: Hermes + Web Dashboard + Holesail

on:
  workflow_dispatch:

jobs:
  agent-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq build-essential cmake git wget python3-pip
          pip3 install --upgrade pip
          sudo npm install -g holesail

      - name: Download llama.cpp
        run: |
          wget https://github.com/ggml-org/llama.cpp/releases/download/b9945/llama-b9945-bin-ubuntu-x64.tar.gz
          tar -xzf llama-b9945-bin-ubuntu-x64.tar.gz
          cd llama-b9945-bin-ubuntu-x64
          chmod +x llama-server

      - name: Download model (Qwen2.5-7B Q4_K_M)
        run: |
          MODEL_URL="https://huggingface.co/Qwen/Qwen2.5-7B-Instruct-GGUF/resolve/main/qwen2.5-7b-instruct-q4_k_m-00001-of-00002.gguf"
          curl -L -o model.gguf "$MODEL_URL" -f --retry 3
          if [ "$(head -c 4 model.gguf)" != "GGUF" ]; then
            echo "❌ Invalid GGUF"
            exit 1
          fi

      - name: Start llama-server
        run: |
          cd llama-b9945-bin-ubuntu-x64
          nohup ./llama-server \
            -m ../model.gguf \
            -t 4 -tb 4 -fa -np 1 -c 4096 \
            --no-mmap --cpu-strict 1 --cpu-range 0-3 \
            --host 127.0.0.1 --port 8080 \
            > server.log 2>&1 &
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080/health > /dev/null; then
              echo "✅ llama-server ready"
              break
            fi
            sleep 2
          done

      - name: Install Hermes Agent
        run: |
          pip3 install hermes-agent

      - name: Configure Hermes
        run: |
          mkdir -p ~/.hermes
          cat > ~/.hermes/config.yaml << 'EOF'
          model:
            default: "local-model"
            provider: "custom"
            base_url: "http://127.0.0.1:8080/v1"
            api_key: "sk-no-api-key"
          skills:
            enabled:
              - terminal
              - file_editor
              - web_browser
          EOF

      - name: Install Hermes web dependencies and start dashboard
        run: |
          # Install web + pty extras
          cd ~/.hermes/hermes-agent
          uv pip install -e ".[web,pty]" || pip3 install fastapi uvicorn ptyprocess
          # Start the dashboard
          nohup hermes dashboard --host 0.0.0.0 --port 9119 > dashboard.log 2>&1 &
          sleep 3

      - name: Expose via Holesail (llama API + dashboard)
        run: |
          # Expose llama.cpp API (port 8080)
          holesail --live 8080 > /tmp/holesail_llama.txt 2>&1 &
          sleep 2
          LLAMA_URL=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_llama.txt | head -1)

          # Expose Hermes dashboard (port 9119)
          holesail --live 9119 > /tmp/holesail_dashboard.txt 2>&1 &
          sleep 2
          DASHBOARD_URL=$(grep -oE 'hs://[a-zA-Z0-9]+' /tmp/holesail_dashboard.txt | head -1)

          echo "✅ llama.cpp API: $LLAMA_URL"
          echo "✅ Hermes Dashboard: $DASHBOARD_URL"
          echo "::notice::llama API: $LLAMA_URL"
          echo "::notice::Hermes Dashboard: $DASHBOARD_URL"

      - name: Keep alive
        run: tail -f /dev/null
