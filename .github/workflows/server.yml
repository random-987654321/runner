name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_PORT: 11434
  PROXY_PORT: 19000

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Update package managers and provision system binaries
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git nodejs npm jq netcat-openbsd python3-pip
          pip install websockets
          
          # Pull down the cloudflared edge routing daemon
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Setup Ollama server runtime
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required Granite weight models natively
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Boot up the local Python Proxy Layer
      - name: Start Python CORS Handshake Proxy
        run: |
          python3 scripts/cors_proxy.py &
          sleep 2

      # 5. Launch Hermes Web UI and Agent Core natively
      - name: Launch Hermes Agent Workspace
        run: |
          # Spin up the native web environment using the pulled model weights
          nohup ollama launch hermes --model ${{ env.OLLAMA_MODEL }} --yes > hermes.log 2>&1 &
          
          echo "⏳ Waiting for Hermes Web UI to bind..."
          for i in {1..20}; do
            if curl -s http://127.0.0.1:${{ env.HERMES_PORT }} > /dev/null || [ $? -eq 52 ]; then
              echo "✅ Hermes Web Interface is online!"
              break
            fi
            echo "Keep waiting... ($i/20)"
            sleep 3
          done

      # 6. Connect Cloudflare Tunnel to the Python Proxy instead of directly to Hermes
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.PROXY_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      # 7. Print public entry URL and hold job execution alive
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          BASE_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          
          echo "================================================================="
          echo "🌐 HERMES PROXIED INTERFACE PORTAL READY:"
          echo "👉 ${BASE_URL}"
          echo "================================================================="
          echo ""
          echo "--- LOG DIAGNOSTICS (Hermes Initialization Preview) ---"
          head -n 25 hermes.log || true
          echo "================================================================="
          sleep infinity
