name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  QUEEN_MODEL: "bartowski/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.gguf"
  MCP_PROXY_PORT: 8001
  LLAMA_PORT: 8080

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl git build-essential cmake python3 python3-pip nodejs npm
          sudo npm install -g holesail
          # Install uv
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"
          # Install mcp-proxy
          pip3 install mcp-proxy

      - name: Build llama.cpp with MCP support
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          mkdir build && cd build
          cmake .. -DGGML_NATIVE=ON -DLLAMA_MCP=ON -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target llama-server
          cp bin/llama-server ../../
          cd ../..
          chmod +x llama-server

      - name: Download model
        run: |
          curl -L -o model.gguf "https://huggingface.co/${{ env.QUEEN_MODEL }}" -f --retry 3

      - name: Wait for workers and collect Holesail URLs
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "👑 Queen waiting for workers..."
          EXPECTED=$(ls -1 skills/*.yaml 2>/dev/null | wc -l)
          [ $EXPECTED -eq 0 ] && echo "No skills found" && exit 1
          echo "Expecting $EXPECTED workers (one per skill)."
          HOLESAIL_URLS=""
          for attempt in {1..120}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/workers" 2>/dev/null)
            REGISTERED_FILES=$(echo "$RESPONSE" | jq -r '.[] | select(.type == "file" and (.name | endswith(".json"))) | .name' 2>/dev/null)
            REGISTERED_COUNT=$(echo "$REGISTERED_FILES" | grep -c . || echo 0)
            echo "  Attempt $attempt: $REGISTERED_COUNT / $EXPECTED workers registered"
            if [ "$REGISTERED_COUNT" -ge "$EXPECTED" ]; then
              echo "✅ All workers registered!"
              break
            fi
            sleep 5
          done

          for file in $REGISTERED_FILES; do
            curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${REPO}/contents/workers/${file}" \
              > /tmp/worker.json
            URL=$(jq -r '.content' /tmp/worker.json | base64 -d | jq -r '.url' 2>/dev/null)
            SKILL=$(jq -r '.content' /tmp/worker.json | base64 -d | jq -r '.skill' 2>/dev/null)
            if [ -n "$URL" ] && [ "$URL" != "null" ] && [ -n "$SKILL" ] && [ "$SKILL" != "null" ]; then
              HOLESAIL_URLS="${HOLESAIL_URLS} ${SKILL}:$URL"
            fi
          done
          if [ -z "$HOLESAIL_URLS" ]; then
            echo "❌ No valid worker URLs"
            exit 1
          fi
          echo "HOLESAIL_URLS=$HOLESAIL_URLS" >> $GITHUB_ENV

      - name: Connect workers and create mcp-proxy config
        env:
          HOLESAIL_URLS: ${{ env.HOLESAIL_URLS }}
        run: |
          echo "🔗 Connecting workers and building mcp-proxy config..."
          CONFIG_JSON='{"mcpServers": {}}'
          IFS=' ' read -ra PAIRS <<< "${HOLESAIL_URLS}"
          LOCAL_PORT=6000
          for pair in "${PAIRS[@]}"; do
            SKILL="${pair%:*}"
            URL="${pair#*:}"
            echo "Connecting $SKILL -> $URL to localhost:$LOCAL_PORT"
            holesail "$URL" --port $LOCAL_PORT &
            CONFIG_JSON=$(echo "$CONFIG_JSON" | jq ".mcpServers[\"$SKILL\"] = {\"url\": \"http://localhost:$LOCAL_PORT/mcp\"}")
            LOCAL_PORT=$((LOCAL_PORT + 1))
          done
          echo "$CONFIG_JSON" > mcp_config.json
          echo "✅ mcp-proxy config created."
          cat mcp_config.json

      - name: Start mcp-proxy aggregator
        run: |
          echo "Starting mcp-proxy on port ${{ env.MCP_PROXY_PORT }}..."
          mcp-proxy \
            --named-server-config mcp_config.json \
            --allow-origin "*" \
            --port ${{ env.MCP_PROXY_PORT }} \
            --stateless \
            &
          sleep 10
          echo "✅ mcp-proxy running."

      - name: Start llama-server with WebUI and MCP proxy
        run: |
          echo "🌐 Starting llama-server with WebUI"
          ./llama-server \
            -m model.gguf \
            -c 4096 \
            -ngl 0 \
            --host 0.0.0.0 \
            --port ${{ env.LLAMA_PORT }} \
            --webui-mcp-proxy \
            &

          for i in {1..60}; do
            if curl -s http://localhost:${{ env.LLAMA_PORT }}/health > /dev/null; then
              echo "✅ Server ready"
              break
            fi
            sleep 2
          done
          if ! curl -s http://localhost:${{ env.LLAMA_PORT }}/health > /dev/null; then
            echo "❌ Server failed"
            exit 1
          fi

      - name: Start Cloudflare tunnel and capture URL
        id: tunnel
        run: |
          # Start tunnel in background
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:${{ env.LLAMA_PORT }} > tunnel.log 2>&1 &
          # Wait for the URL (retry up to 60 seconds)
          TUNNEL_URL=""
          for i in {1..20}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            echo "⏳ Waiting for tunnel... ($i/20)"
            sleep 3
          done
          if [ -z "$TUNNEL_URL" ]; then
            echo "⚠️ Could not extract tunnel URL from logs. Displaying log content:"
            cat tunnel.log
            # As a fallback, try to get from cloudflared's API or just wait longer
            sleep 30
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          fi
          if [ -n "$TUNNEL_URL" ]; then
            echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
            echo "✅ Tunnel URL captured: $TUNNEL_URL"
          else
            echo "❌ Failed to capture tunnel URL after multiple attempts."
            exit 1
          fi

      - name: Print instructions
        env:
          TUNNEL_URL: ${{ steps.tunnel.outputs.tunnel_url }}
        run: |
          echo "::notice::Frontend URL: $TUNNEL_URL"
          echo "::notice::MCP servers available at: $TUNNEL_URL/servers/<skill>/mcp"
          echo "----------------------------------------------------------------"
          echo "📋 MANUAL STEP: In the WebUI, go to Settings → MCP → Add New Server"
          echo "   For each skill, add: $TUNNEL_URL/servers/<skill>/mcp"
          echo "   Example: $TUNNEL_URL/servers/calculate/mcp"
          echo "   Then toggle each server to 'active'."
          echo "----------------------------------------------------------------"
          # Keep the workflow alive
          sleep infinity
