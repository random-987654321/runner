name: Server

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ================================================================
      # STEP 1: AGGRESSIVE DISK CLEANUP ("Surgical Strikes")
      # ================================================================
      - name: Aggressive Disk Cleanup (Surgical Strikes)
        run: |
          echo "🔄 Starting aggressive disk cleanup (max space recovery)..."

          # 1. System Update & Package Cleanup
          sudo apt-get update -qq
          echo "Removing large package groups..."
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' azure-cli google-cloud-cli || true
          sudo apt-get autoremove -y
          sudo apt-get clean

          # 2. Remove Android SDK, .NET, and Haskell (the biggest space hogs)
          echo "Removing Android SDK (~10 GB)..."
          sudo rm -rf /usr/local/lib/android
          echo "Removing .NET SDK (~2 GB)..."
          sudo rm -rf /usr/share/dotnet
          echo "Removing Haskell/GHC (~2 GB)..."
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/ghc

          # 3. Clean Homebrew, Docker Images, and Browsers
          echo "Removing Homebrew (~1-2 GB)..."
          sudo rm -rf /home/linuxbrew
          echo "Pruning Docker images..."
          docker system prune -af --volumes
          echo "Removing browsers and web drivers (~1.5 GB)..."
          sudo rm -rf /usr/share/chromium /usr/local/share/chrome* /usr/local/share/edge* /usr/local/share/gecko* /usr/local/share/firefox*

          # 4. Nuke Snap and Swap
          echo "Removing Snap packages..."
          sudo snap remove --purge lxd core20 snapd 2>/dev/null || true
          echo "Removing swap file..."
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile

          # 5. Final cleanup
          echo "Cleaning up temporary files..."
          sudo rm -rf /tmp/* /var/tmp/*
          sudo journalctl --rotate
          sudo journalctl --vacuum-time=1s
          sudo apt-get autoremove -y --purge

          # 6. Sync and check available space
          sync
          echo "✅ Cleanup complete. Disk usage:"
          df -h /

      # Fallback: use the standard free-disk-space action (extra safety)
      - name: Free disk space (fallback)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # Debug: check free space again
      - name: Check available space
        run: df -h /

      # ================================================================
      # STEP 2: CACHING
      # ================================================================
      - uses: actions/cache@v4
        id: ollama
        with:
          path: ~/.ollama/models
          key: ollama-distilled-tiny-q4km-v2
          restore-keys: ollama-

      - uses: actions/cache@v4
        id: cloudflared
        with:
          path: ./cloudflared
          key: cloudflared-v1
          restore-keys: cloudflared-

      # ================================================================
      # STEP 3: OLLAMA SETUP & MODEL PULL
      # ================================================================
      - if: steps.ollama.outputs.cache-hit != 'true'
        uses: ai-action/setup-ollama@v2

      - if: steps.ollama.outputs.cache-hit != 'true'
        run: ollama pull hf.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF:Q4_K_M

      - if: steps.ollama.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.ollama/models
          key: ollama-distilled-tiny-q4km-v2

      # ================================================================
      # STEP 4: CLOUDFLARED
      # ================================================================
      - if: steps.cloudflared.outputs.cache-hit != 'true'
        run: |
          curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - if: steps.cloudflared.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./cloudflared
          key: cloudflared-v1

      # ================================================================
      # STEP 5: MAIN SERVICE – OLLAMA, OPEN WEBUI, TUNNEL, SELF‑REPLICATE
      # ================================================================
      - name: Run and Replicate
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          OLLAMA_HOST: 0.0.0.0:11434
        run: |
          set -e

          echo "🚀 Starting Ollama server..."
          pkill -f ollama 2>/dev/null || true
          ollama serve &

          # Wait for Ollama to become ready
          echo "⏳ Waiting for Ollama to be ready..."
          for i in {1..20}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "✅ Ollama is ready"
              break
            fi
            echo "⏳ Attempt $i/20 ..."
            sleep 2
          done

          if ! curl -s http://localhost:11434/api/tags > /dev/null; then
            echo "❌ Ollama failed to start"
            ps aux | grep ollama || true
            exit 1
          fi

          # Ensure model is pulled (idempotent)
          echo "📦 Pulling model..."
          ollama pull hf.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF:Q4_K_M

          # ----- Start Open WebUI in Docker (fast) -----
          echo "🐳 Starting Open WebUI in Docker..."
          docker rm -f open-webui 2>/dev/null || true

          docker run -d \
            --name open-webui \
            --network host \
            -e OLLAMA_BASE_URL=http://localhost:11434 \
            -v open-webui-data:/app/backend/data \
            ghcr.io/open-webui/open-webui:main

          # Wait for Open WebUI to be ready
          echo "⏳ Waiting for Open WebUI..."
          for i in {1..10}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "✅ Open WebUI is ready"
              break
            fi
            echo "⏳ Attempt $i/10 ..."
            sleep 2
          done

          if ! curl -s http://localhost:3000 > /dev/null; then
            echo "❌ Open WebUI failed to start"
            docker logs open-webui --tail 20
            exit 1
          fi

          # ----- Start Cloudflare tunnel (pointing to Open WebUI on port 3000) -----
          echo "🌐 Starting Cloudflare tunnel..."
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          pkill -f cloudflared 2>/dev/null || true
          ./cloudflared tunnel --protocol http2 --url http://localhost:3000 2>&1 | tee tunnel.log &

          # Extract tunnel URL
          echo "⏳ Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL: ${TUNNEL_URL}"
              break
            fi
            echo "⏳ Attempt $i/30 ..."
            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            tail -20 tunnel.log
            exit 1
          fi

          echo "::notice::Tunnel URL: ${TUNNEL_URL}"

          # ----- Update config.json in the chat repository -----
          echo "📝 Updating frontend config..."
          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG=$(jq -n --arg url "$TUNNEL_URL" '{apiUrl: $url}')
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)

          FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')

          if [ "$SHA" != "null" ]; then
            PAYLOAD=$(jq -n \
              --arg msg "update API URL" \
              --arg content "$ENCODED" \
              --arg sha "$SHA" \
              --arg name "github-actions[bot]" \
              --arg email "github-actions[bot]@users.noreply.github.com" \
              '{message: $msg, content: $content, sha: $sha, author: {name: $name, email: $email}, committer: {name: $name, email: $email}}')
          else
            PAYLOAD=$(jq -n \
              --arg msg "add API URL" \
              --arg content "$ENCODED" \
              --arg name "github-actions[bot]" \
              --arg email "github-actions[bot]@users.noreply.github.com" \
              '{message: $msg, content: $content, author: {name: $name, email: $email}, committer: {name: $name, email: $email}}')
          fi

          curl -s -X PUT -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" \
            -d "$PAYLOAD"

          echo "::notice::Frontend URL: https://${{ github.repository_owner }}.github.io/chat/"

          # ----- Self‑replication loop -----
          echo "🔄 Entering self‑replication loop..."
          START_TIME=$(date +%s)
          TRIGGER_AT=$((350 * 60))
          TRIGGERED=false

          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))

            if [ $ELAPSED -ge $TRIGGER_AT ] && [ "$TRIGGERED" = "false" ]; then
              echo "⏰ Triggering replacement workflow..."
              curl -X POST -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"${{ github.ref }}"}'
              TRIGGERED=true
            fi

            # Health checks – restart if needed
            if ! curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "⚠️ Ollama down – restarting..."
              pkill -f ollama 2>/dev/null || true
              ollama serve &
              sleep 5
            fi

            if ! pgrep -f cloudflared > /dev/null; then
              echo "⚠️ Tunnel down – restarting..."
              ./cloudflared tunnel --protocol http2 --url http://localhost:3000 2>&1 | tee -a tunnel.log &
            fi

            if ! curl -s http://localhost:3000 > /dev/null; then
              echo "⚠️ Open WebUI down – restarting container..."
              docker rm -f open-webui 2>/dev/null || true
              docker run -d --name open-webui --network host \
                -e OLLAMA_BASE_URL=http://localhost:11434 \
                -v open-webui-data:/app/backend/data \
                ghcr.io/open-webui/open-webui:main
              sleep 5
            fi

            sleep 30
          done
